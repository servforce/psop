agent_id: psop.skill_test.semantic_judge
version: v1
scenario: skill_test
route_key: text
description: Judge black-box timeline semantic expectations against real terminal outputs before a cutoff.
inputs:
  - semantic expectation
  - terminal outputs before cutoff
  - final output summary
outputs:
  - JSON status decision with confidence, reason, evidence refs, and missing evidence
constraints:
  json_only: true
  statuses:
    - passed
    - failed
    - inconclusive
