<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSOP Studio</title>
    <link rel="stylesheet" href="/assets/css/material-symbols.css" />
    <link rel="stylesheet" href="/assets/css/style.compiled.css" />
    <script defer src="/assets/js/runtime-config.js"></script>
    <script defer src="/assets/js/utils/skill-key.js"></script>
    <script defer src="/assets/js/app.js"></script>
    <script defer src="/node_modules/alpinejs/dist/cdn.min.js"></script>
  </head>
  <body class="h-dvh overflow-hidden bg-stone-50 text-slate-800">
    <div x-data="skillsConsole()" x-init="boot()" class="h-dvh overflow-hidden" x-cloak>
      <div class="flex h-dvh overflow-hidden bg-[linear-gradient(135deg,#f8fafc_0%,#ecfeff_44%,#f7f3ea_100%)]">
        <aside
            class="hidden h-full shrink-0 flex-col overflow-hidden border-r border-slate-200 bg-white shadow-sm transition-all duration-200 lg:flex"
            :class="sidebarCollapsed ? 'w-14' : 'w-48'"
          >
            <div class="h-14 shrink-0 border-b border-slate-200 px-3">
              <div class="flex h-full min-w-0 items-center gap-3" :class="sidebarCollapsed ? 'justify-center' : ''">
                <span class="material-symbols-outlined flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-slate-950 text-[20px] text-white">hub</span>
                <p class="truncate text-sm font-semibold text-slate-950" x-show="!sidebarCollapsed" x-transition.opacity>
                  PSOP Studio
                </p>
              </div>
            </div>

            <nav class="min-h-0 flex-1 space-y-1 overflow-y-auto px-2 py-3">
              <button
                type="button"
                class="sidebar-link"
                :class="[route.name === 'skills-list' ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Skills"
                @click="navigate('/admin/skills')"
              >
                <span class="material-symbols-outlined text-[20px]">handyman</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Skills</span>
              </button>
              <button
                type="button"
                class="sidebar-link opacity-55"
                :class="sidebarCollapsed ? 'justify-center px-0' : ''"
                title="发布记录"
                disabled
              >
                <span class="material-symbols-outlined text-[20px]">rocket_launch</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>发布记录</span>
              </button>
              <button
                type="button"
                class="sidebar-link opacity-55"
                :class="sidebarCollapsed ? 'justify-center px-0' : ''"
                title="运行回放"
                disabled
              >
                <span class="material-symbols-outlined text-[20px]">history</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>运行回放</span>
              </button>
            </nav>

            <div class="shrink-0 border-t border-slate-200 px-2 py-2">
              <button
                type="button"
                class="sidebar-link"
                :class="sidebarCollapsed ? 'justify-center px-0' : ''"
                :title="sidebarCollapsed ? '展开菜单' : '收起菜单'"
                @click="toggleSidebar()"
              >
                <span class="material-symbols-outlined text-[20px]">menu_open</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>收起菜单</span>
              </button>
            </div>
        </aside>

        <main class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
            <header class="z-20 h-14 shrink-0 border-b border-slate-200 bg-white/90 backdrop-blur">
              <div class="flex h-full items-center justify-between px-4">
                <h1 class="truncate text-sm font-semibold text-slate-950" x-text="routeTitle()"></h1>
              </div>
            </header>

            <section class="relative min-h-0 flex-1 overflow-hidden">
              <template x-if="notice">
                <div class="absolute left-4 right-4 top-4 z-40 flex items-start justify-between gap-4 rounded-2xl border px-4 py-3 text-sm shadow-lg" :class="noticeClass()">
                  <p class="min-w-0 flex-1" x-text="notice.text"></p>
                  <button
                    type="button"
                    class="inline-flex h-7 w-7 shrink-0 items-center justify-center rounded-lg border border-current/20 transition hover:bg-white/40"
                    aria-label="关闭提示"
                    @click="clearNotice()"
                  >
                    <span class="material-symbols-outlined text-[16px]">close</span>
                  </button>
                </div>
              </template>

              <template x-if="centerToast">
                <div class="pointer-events-none fixed inset-0 z-[70] flex items-center justify-center px-4">
                  <div
                    class="rounded-2xl border px-6 py-4 text-sm font-semibold shadow-[0_24px_70px_rgba(15,23,42,0.22)]"
                    :class="centerToastClass()"
                    x-transition.opacity.scale
                  >
                    <div class="flex items-center gap-3">
                      <span class="material-symbols-outlined text-[20px]" x-text="centerToast.kind === 'error' ? 'error' : 'check_circle'"></span>
                      <span x-text="centerToast.text"></span>
                    </div>
                  </div>
                </div>
              </template>

              <template x-if="loadingPage">
                <div class="h-full p-4">
                  <div class="h-full animate-pulse rounded-xl border border-slate-200 bg-white/80"></div>
                </div>
              </template>

              <div id="skills-list-page" class="h-full" x-show="!loadingPage && route.name === 'skills-list'"></div>
              <div id="skill-detail-page" class="h-full" x-show="!loadingPage && route.name === 'skill-detail' && currentSkill"></div>
            </section>
        </main>

        <div id="create-skill-modal-page"></div>
        <div id="delete-skill-modal-page"></div>
      </div>
    </div>
  </body>
</html>
