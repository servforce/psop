<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSOP Studio</title>
    <link rel="stylesheet" href="/assets/css/material-symbols.css" />
    <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/diagram-js.css" />
    <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/bpmn-js.css" />
    <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/bpmn-font/css/bpmn-embedded.css" />
    <link rel="stylesheet" href="/assets/css/style.compiled.css" />
    <script defer src="/assets/js/runtime-config.js"></script>
    <script defer src="/assets/js/utils/skill-key.js"></script>
    <script defer src="/assets/js/utils/runtime-events.js"></script>
    <script defer src="/assets/js/utils/eg-bpmn.js"></script>
    <script defer src="/node_modules/bpmn-js/dist/bpmn-navigated-viewer.production.min.js"></script>
    <script defer src="/assets/js/app.js"></script>
    <script defer src="/node_modules/alpinejs/dist/cdn.min.js"></script>
  </head>
  <body class="psop-dark h-dvh overflow-hidden bg-slate-950 text-slate-200">
    <div x-data="skillsConsole()" x-init="boot()" class="h-dvh overflow-hidden" x-cloak>
      <div class="flex h-dvh overflow-hidden bg-[#09090b]">
        <aside
            class="hidden h-full shrink-0 flex-col overflow-hidden border-r border-slate-800 bg-slate-950/95 shadow-none transition-all duration-200 lg:flex"
            :class="sidebarCollapsed ? 'w-14' : 'w-48'"
          >
            <div class="h-14 shrink-0 border-b border-slate-800 px-3">
              <div class="flex h-full min-w-0 items-center gap-3" :class="sidebarCollapsed ? 'justify-center' : ''">
                <button
                  type="button"
                  class="flex h-9 w-9 shrink-0 items-center justify-center rounded-md border border-orange-500/30 bg-orange-500/10 text-orange-200 transition hover:border-orange-400/50 hover:bg-orange-500/15 hover:text-orange-100 focus:outline-none focus:ring-2 focus:ring-orange-500/30"
                  :title="sidebarCollapsed ? '展开菜单' : '收起菜单'"
                  :aria-label="sidebarCollapsed ? '展开菜单' : '收起菜单'"
                  @click="toggleSidebar()"
                >
                  <span class="material-symbols-outlined text-[20px]">hub</span>
                </button>
                <p class="truncate text-sm font-semibold text-slate-100" x-show="!sidebarCollapsed" x-transition.opacity>
                  PSOP Studio
                </p>
              </div>
            </div>

            <nav class="min-h-0 flex-1 space-y-1 overflow-y-auto px-2 py-3">
              <button
                type="button"
                class="sidebar-link"
                :class="[['skills-list', 'skill-detail', 'skill-run-live', 'skill-replay-detail', 'skill-test-new', 'skill-test-case', 'skill-test-live'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Skills"
                @click="navigate('/admin/skills')"
              >
                <span class="material-symbols-outlined text-[20px]">handyman</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Skills</span>
              </button>
            </nav>
        </aside>

        <main class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
            <header class="z-20 h-14 shrink-0 border-b border-slate-800 bg-slate-950/70 backdrop-blur">
              <div class="flex h-full items-center justify-between px-4">
                <h1 class="truncate text-sm font-semibold text-slate-100" x-text="routeTitle()"></h1>
              </div>
            </header>

            <section class="relative min-h-0 flex-1 overflow-hidden">
              <template x-if="notice">
                <div class="absolute left-4 right-4 top-4 z-40 flex items-start justify-between gap-4 rounded-2xl border px-4 py-3 text-sm shadow-lg" :class="noticeClass()">
                  <p class="min-w-0 flex-1" x-text="notice.text"></p>
                  <button
                    type="button"
                    class="inline-flex h-7 w-7 shrink-0 items-center justify-center rounded-lg border border-current/20 transition hover:bg-white/40"
                    aria-label="关闭提示"
                    @click="clearNotice()"
                  >
                    <span class="material-symbols-outlined text-[16px]">close</span>
                  </button>
                </div>
              </template>

              <template x-if="centerToast">
                <div class="pointer-events-none fixed inset-0 z-[70] flex items-center justify-center px-4">
                  <div
                    class="rounded-2xl border px-6 py-4 text-sm font-semibold shadow-[0_24px_70px_rgba(15,23,42,0.22)]"
                    :class="centerToastClass()"
                    x-transition.opacity.scale
                  >
                    <div class="flex items-center gap-3">
                      <span class="material-symbols-outlined text-[20px]" x-text="centerToast.kind === 'error' ? 'error' : 'check_circle'"></span>
                      <span x-text="centerToast.text"></span>
                    </div>
                  </div>
                </div>
              </template>

              <template x-if="loadingPage">
                <div class="h-full p-4">
                  <div class="h-full animate-pulse rounded-md border border-slate-800 bg-slate-900/40"></div>
                </div>
              </template>

              <div id="skills-list-page" class="h-full" x-show="!loadingPage && route.name === 'skills-list'"></div>
              <div id="skill-detail-page" class="h-full" x-show="!loadingPage && ['skill-detail', 'skill-test-new'].includes(route.name) && currentSkill"></div>
              <div id="compiler-list-page" class="h-full" x-show="!loadingPage && route.name === 'compiler-list'"></div>
              <div id="compiler-artifact-page" class="h-full" x-show="!loadingPage && route.name === 'compiler-artifact' && compilerArtifact"></div>
              <div id="invocations-list-page" class="h-full" x-show="!loadingPage && route.name === 'invocations-list'"></div>
              <div id="run-live-page" class="h-full" x-show="!loadingPage && ['run-live', 'skill-run-live'].includes(route.name) && liveRun"></div>
              <div id="skill-test-case-page" class="h-full" x-show="!loadingPage && route.name === 'skill-test-case' && currentSkill && skillTestCase"></div>
              <div id="skill-test-live-page" class="h-full" x-show="!loadingPage && route.name === 'skill-test-live' && currentSkill && skillTestCase && skillTestRun"></div>
              <div id="replay-list-page" class="h-full" x-show="!loadingPage && route.name === 'replay-list'"></div>
              <div id="replay-detail-page" class="h-full" x-show="!loadingPage && ['replay-detail', 'skill-replay-detail'].includes(route.name) && replayDetail"></div>
            </section>
        </main>

        <div id="create-skill-modal-page"></div>
        <div id="publish-skill-drawer-page"></div>
        <div id="delete-skill-modal-page"></div>
      </div>
    </div>
  </body>
</html>
