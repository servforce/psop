<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSOP Arena</title>
    <link rel="stylesheet" href="/css/material-symbols.css" />
    <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/diagram-js.css" />
    <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/bpmn-js.css" />
    <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/bpmn-font/css/bpmn-embedded.css" />
    <link rel="stylesheet" href="/css/style.compiled.css" />
    <script defer src="/js/runtime-config.js"></script>
    <script defer src="/js/utils/skill-key.js"></script>
    <script defer src="/js/utils/runtime-events.js"></script>
    <script defer src="/js/utils/eg-bpmn.js"></script>
    <script defer src="/node_modules/bpmn-js/dist/bpmn-navigated-viewer.production.min.js"></script>
    <script defer src="/js/app.js"></script>
    <script defer src="/js/app/core.js"></script>
    <script defer src="/js/app/dashboard.js"></script>
    <script defer src="/js/app/skill-detail.js"></script>
    <script defer src="/js/app/compiler.js"></script>
    <script defer src="/js/app/agent-prompts.js"></script>
    <script defer src="/js/app/skill-test.js"></script>
    <script defer src="/js/app/tasks.js"></script>
    <script defer src="/js/app/evaluations.js"></script>
    <script defer src="/js/app/governance.js"></script>
    <script defer src="/js/app/platform.js"></script>
    <script defer src="/js/app/runtime.js"></script>
    <script defer src="/js/app/formatters.js"></script>
    <script defer src="/node_modules/alpinejs/dist/cdn.min.js"></script>
  </head>
  <body class="psop-dark h-dvh overflow-hidden bg-slate-950 text-slate-200">
    <div x-data="skillsConsole()" x-init="boot()" class="h-dvh overflow-hidden" @keydown.window="handleSkillTestTimelineKeyboardShortcut($event)" x-cloak>
      <div class="flex h-dvh overflow-hidden bg-[#09090b]">
        <aside
            class="hidden h-full shrink-0 flex-col overflow-hidden border-r border-slate-800 bg-slate-950/95 shadow-none transition-all duration-200 lg:flex"
            :class="sidebarCollapsed ? 'w-14' : 'w-48'"
          >
            <div class="h-14 shrink-0 border-b border-slate-800 px-3">
              <div class="flex h-full min-w-0 items-center gap-3" :class="sidebarCollapsed ? 'justify-center' : ''">
                <button
                  type="button"
                  class="flex h-9 w-9 shrink-0 items-center justify-center rounded-md border border-orange-500/30 bg-orange-500/10 text-orange-200 transition hover:border-orange-400/50 hover:bg-orange-500/15 hover:text-orange-100 focus:outline-none focus:ring-2 focus:ring-orange-500/30"
                  :title="sidebarCollapsed ? '展开菜单' : '收起菜单'"
                  :aria-label="sidebarCollapsed ? '展开菜单' : '收起菜单'"
                  @click="toggleSidebar()"
                >
                  <span class="material-symbols-outlined text-[20px]">hub</span>
                </button>
                <p class="truncate text-sm font-semibold text-slate-100" x-show="!sidebarCollapsed" x-transition.opacity>
                  PSOP Arena
                </p>
              </div>
            </div>

            <nav class="min-h-0 flex-1 space-y-1 overflow-y-auto px-2 py-3">
              <button
                type="button"
                class="sidebar-link"
                :class="[route.name === 'dashboard' ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Dashboard"
                @click="navigate('/admin/dashboard')"
              >
                <span class="material-symbols-outlined text-[20px]">monitoring</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Dashboard</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[['skills-list', 'skill-detail', 'skill-compiler-artifact', 'skill-run-live', 'skill-debug-live', 'skill-test-scenario-new', 'skill-test-scenario', 'skill-test-scenario-review'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Skills"
                @click="navigate('/admin/skills')"
              >
                <span class="material-symbols-outlined text-[20px]">handyman</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Skills</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[['agent-prompts-list', 'agent-prompt-detail'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="智能体"
                @click="navigate('/admin/agent-prompts')"
              >
                <span class="material-symbols-outlined text-[20px]">smart_toy</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>智能体</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[['platform-agent-runs', 'platform-agent-run'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Agent Runs"
                @click="navigate('/admin/platform/agent-runs')"
              >
                <span class="material-symbols-outlined text-[20px]">manage_history</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Agent Runs</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[['platform-skills', 'platform-skill'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Skill Packages"
                @click="navigate('/admin/platform/skills')"
              >
                <span class="material-symbols-outlined text-[20px]">extension</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Skill Packages</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[route.name === 'tasks-list' ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="任务"
                @click="navigate('/admin/tasks')"
              >
                <span class="material-symbols-outlined text-[20px]">task_alt</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>任务</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[['evaluation-reports', 'evaluation-report', 'evaluation-findings'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Evaluations"
                @click="navigate('/admin/evaluations')"
              >
                <span class="material-symbols-outlined text-[20px]">rule_settings</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Evaluations</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[['governance-proposals', 'governance-proposal', 'governance-experiments'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Governance"
                @click="navigate('/admin/governance/proposals')"
              >
                <span class="material-symbols-outlined text-[20px]">account_tree</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Governance</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[route.name === 'tool-authorizations' ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="工具授权"
                @click="navigate('/admin/platform/tool-authorizations')"
              >
                <span class="material-symbols-outlined text-[20px]">admin_panel_settings</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>工具授权</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[['platform-tools', 'platform-tool'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Tools"
                @click="navigate('/admin/platform/tools')"
              >
                <span class="material-symbols-outlined text-[20px]">build</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Tools</span>
              </button>
              <button
                type="button"
                class="sidebar-link"
                :class="[['platform-memory', 'platform-memory-entry'].includes(route.name) ? 'sidebar-link-active' : '', sidebarCollapsed ? 'justify-center px-0' : '']"
                title="Memory"
                @click="navigate('/admin/platform/memory')"
              >
                <span class="material-symbols-outlined text-[20px]">memory</span>
                <span x-show="!sidebarCollapsed" x-transition.opacity>Memory</span>
              </button>
            </nav>
        </aside>

        <main class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
            <header class="z-20 h-14 shrink-0 border-b border-slate-800 bg-slate-950/70 backdrop-blur">
              <div class="flex h-full items-center justify-between px-4">
                <h1 class="truncate text-sm font-semibold text-slate-100" x-text="routeTitle()"></h1>
              </div>
            </header>

            <section class="relative min-h-0 flex-1 overflow-hidden">
              <template x-if="notice">
                <div class="absolute left-4 right-4 top-4 z-40 flex items-start justify-between gap-4 rounded-2xl border px-4 py-3 text-sm shadow-lg" :class="noticeClass()">
                  <p class="min-w-0 flex-1" x-text="notice.text"></p>
                  <button
                    type="button"
                    class="inline-flex h-7 w-7 shrink-0 items-center justify-center rounded-lg border border-current/20 transition hover:bg-white/40"
                    aria-label="关闭提示"
                    @click="clearNotice()"
                  >
                    <span class="material-symbols-outlined text-[16px]">close</span>
                  </button>
                </div>
              </template>

              <template x-if="centerToast">
                <div class="pointer-events-none fixed inset-0 z-[70] flex items-center justify-center px-4">
                  <div
                    class="rounded-2xl border px-6 py-4 text-sm font-semibold shadow-[0_24px_70px_rgba(15,23,42,0.22)]"
                    :class="centerToastClass()"
                    x-transition.opacity.scale
                  >
                    <div class="flex items-center gap-3">
                      <span class="material-symbols-outlined text-[20px]" x-text="centerToast.kind === 'error' ? 'error' : 'check_circle'"></span>
                      <span x-text="centerToast.text"></span>
                    </div>
                  </div>
                </div>
              </template>

              <template x-if="loadingPage">
                <div class="h-full p-4">
                  <div class="h-full animate-pulse rounded-md border border-slate-800 bg-slate-900/40"></div>
                </div>
              </template>

              <div id="dashboard-page" class="h-full" x-show="!loadingPage && route.name === 'dashboard'"></div>
              <div id="skills-list-page" class="h-full" x-show="!loadingPage && route.name === 'skills-list'"></div>
              <div id="tasks-page" class="h-full" x-show="!loadingPage && route.name === 'tasks-list'"></div>
              <div id="evaluation-reports-page" class="h-full" x-show="!loadingPage && ['evaluation-reports', 'evaluation-report'].includes(route.name)"></div>
              <div id="evaluation-findings-page" class="h-full" x-show="!loadingPage && route.name === 'evaluation-findings'"></div>
              <div id="governance-proposals-page" class="h-full" x-show="!loadingPage && ['governance-proposals', 'governance-proposal'].includes(route.name)"></div>
              <div id="governance-experiments-page" class="h-full" x-show="!loadingPage && route.name === 'governance-experiments'"></div>
              <div id="tool-authorizations-page" class="h-full" x-show="!loadingPage && route.name === 'tool-authorizations'"></div>
              <div id="platform-agent-runs-page" class="h-full" x-show="!loadingPage && ['platform-agent-runs', 'platform-agent-run'].includes(route.name)"></div>
              <div id="platform-skills-page" class="h-full" x-show="!loadingPage && ['platform-skills', 'platform-skill'].includes(route.name)"></div>
              <div id="platform-tools-page" class="h-full" x-show="!loadingPage && ['platform-tools', 'platform-tool'].includes(route.name)"></div>
              <div id="platform-memory-page" class="h-full" x-show="!loadingPage && ['platform-memory', 'platform-memory-entry'].includes(route.name)"></div>
              <div id="skill-detail-page" class="h-full" x-show="!loadingPage && route.name === 'skill-detail' && currentSkill"></div>
              <div id="compiler-list-page" class="h-full" x-show="!loadingPage && route.name === 'compiler-list'"></div>
              <div id="compiler-artifact-page" class="h-full" x-show="!loadingPage && ['compiler-artifact', 'skill-compiler-artifact'].includes(route.name) && compilerArtifact"></div>
              <div id="agent-prompts-list-page" class="h-full" x-show="!loadingPage && route.name === 'agent-prompts-list'"></div>
              <div id="agent-prompt-detail-page" class="h-full" x-show="!loadingPage && route.name === 'agent-prompt-detail' && agentPromptDetail"></div>
              <div id="invocations-list-page" class="h-full" x-show="!loadingPage && route.name === 'invocations-list'"></div>
              <div id="run-live-page" class="h-full" x-show="!loadingPage && ['run-live', 'skill-run-live', 'skill-debug-live'].includes(route.name) && liveRun"></div>
              <div id="skill-test-scenario-page" class="h-full" x-show="!loadingPage && ['skill-test-scenario', 'skill-test-scenario-new'].includes(route.name) && currentSkill && (skillTestCase || route.name === 'skill-test-scenario-new')"></div>
              <div id="skill-test-scenario-review-page" class="h-full" x-show="!loadingPage && route.name === 'skill-test-scenario-review' && currentSkill && skillTestReview"></div>
              <div id="replay-list-page" class="h-full" x-show="!loadingPage && route.name === 'replay-list'"></div>
            </section>
        </main>

        <div id="create-skill-modal-page"></div>
        <div id="publish-skill-drawer-page"></div>
        <div id="delete-skill-modal-page"></div>
      </div>
    </div>
  </body>
</html>
