<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950/70 px-4 py-3">
      <nav class="breadcrumb-bar border-0 pb-0" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-100" @click="navigate('/admin/compiler')">编译</button>
      </nav>
    </div>

    <div class="shrink-0 border-b border-slate-800 bg-slate-950/50 px-4 py-3">
      <div class="flex items-end gap-2 overflow-x-auto whitespace-nowrap">
        <label class="field-block min-w-56 flex-1">
          <span class="field-label">Skill 名称</span>
          <input
            x-model="compilerFilters.skill_search"
            class="input-field h-11"
            placeholder="按 Skill 名称模糊搜索"
          />
        </label>
        <label class="field-block w-40 shrink-0">
          <span class="field-label">状态</span>
          <select x-model="compilerFilters.status" class="input-field h-11">
            <option value="">全部</option>
            <option value="pending">待处理</option>
            <option value="running">运行中</option>
            <option value="succeeded">成功</option>
            <option value="failed">失败</option>
          </select>
        </label>
        <label class="field-block shrink-0">
          <span class="field-label">时间</span>
          <span class="flex items-center gap-2">
            <input x-model="compilerFilters.requested_from" type="date" class="input-field h-11 w-40" />
            <span class="text-xs text-slate-500">至</span>
            <input x-model="compilerFilters.requested_to" type="date" class="input-field h-11 w-40" />
          </span>
        </label>
      </div>
    </div>

    <div class="grid min-w-[82rem] grid-cols-[1.15fr_1fr_120px_160px_160px_1fr] gap-4 border-b border-slate-800 bg-slate-950/70 px-5 py-3 text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">
      <span>Skill</span>
      <span>编译任务</span>
      <span>状态</span>
      <span>冻结 Commit</span>
      <span>Artifact</span>
      <span>时间</span>
    </div>

    <div class="min-h-0 flex-1 overflow-auto">
      <template x-if="filteredCompilerRequests().length === 0">
        <div class="empty-state h-full min-h-80">
          <span class="material-symbols-outlined text-[32px] text-slate-400">rocket_launch</span>
          <p class="mt-3 text-base font-medium text-slate-100">暂无匹配的编译任务</p>
          <p class="mt-2 text-sm text-slate-500">发布 Skill 后会自动创建编译任务，也可以调整筛选条件。</p>
        </div>
      </template>

      <template x-if="filteredCompilerRequests().length > 0">
        <div class="divide-y divide-slate-800">
          <template x-for="compileRequest in filteredCompilerRequests()" :key="compileRequest.id">
            <article
              class="grid min-w-[82rem] grid-cols-[1.15fr_1fr_120px_160px_160px_1fr] items-center gap-4 bg-slate-950/20 px-5 py-4 transition"
              :class="compileRequest.artifact_id ? 'cursor-pointer hover:bg-slate-900/60' : 'cursor-default opacity-80'"
              :role="compileRequest.artifact_id ? 'button' : null"
              :tabindex="compileRequest.artifact_id ? 0 : -1"
              :aria-label="compileRequest.artifact_id ? '查看编译详情' : '暂无编译详情'"
              @click="compileRequest.artifact_id && openCompilerArtifact(compileRequest.artifact_id)"
              @keydown.enter.prevent="compileRequest.artifact_id && openCompilerArtifact(compileRequest.artifact_id)"
              @keydown.space.prevent="compileRequest.artifact_id && openCompilerArtifact(compileRequest.artifact_id)"
            >
              <div class="min-w-0">
                <p class="truncate text-sm font-semibold text-slate-100" x-text="skillNameForCompileRequest(compileRequest)"></p>
                <p class="mt-1 mono-field truncate" x-text="compileRequest.skill_definition_id"></p>
              </div>
              <div class="min-w-0">
                <p class="mono-field truncate" x-text="compileRequest.id"></p>
                <p class="mt-1 text-xs text-slate-500" x-text="compileRequest.trigger_type"></p>
              </div>
              <div><span class="status-badge" :class="statusBadgeTone(compileRequest.status)" x-text="formatStatus(compileRequest.status)"></span></div>
              <div class="mono-field" x-text="formatShortId(compileRequest.source_commit_sha)"></div>
              <div>
                <template x-if="compileRequest.artifact_id">
                  <span class="mono-field" x-text="formatShortId(compileRequest.artifact_id)"></span>
                </template>
                <template x-if="!compileRequest.artifact_id">
                  <span class="text-sm text-slate-400">N/A</span>
                </template>
              </div>
              <div class="text-sm text-slate-300">
                <p>请求：<span class="mono-field" x-text="formatDateTime(compileRequest.requested_at)"></span></p>
                <p x-show="compileRequest.finished_at">完成：<span class="mono-field" x-text="formatDateTime(compileRequest.finished_at)"></span></p>
                <p class="mt-1 text-rose-300" x-show="compileRequest.error_message" x-text="compileRequest.error_message"></p>
              </div>
            </article>
          </template>
        </div>
      </template>
    </div>
  </section>
</div>
