<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950/70 px-3 py-2">
      <nav class="breadcrumb-bar border-0 pb-0 text-xs" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link" @click="navigate(governanceProposalsPath())">Governance</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-100" @click="navigate(governanceExperimentsPath())">Experiments</button>
      </nav>
    </div>

    <div class="shrink-0 border-b border-slate-800 bg-slate-950/50 px-3 py-2">
      <div class="flex items-end gap-2 overflow-x-auto whitespace-nowrap">
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="navigate(governanceProposalsPath())">
          <span class="material-symbols-outlined text-[18px]">account_tree</span>
          <span>提案</span>
        </button>
        <label class="field-block min-w-56">
          <span class="field-label">Proposal ID</span>
          <input x-model="governanceExperimentFilters.proposal_id" class="input-field h-9 py-0 font-mono text-xs" placeholder="proposal_id" @input.debounce.300ms="applyGovernanceExperimentFilters()" />
        </label>
        <label class="field-block min-w-44">
          <span class="field-label">状态</span>
          <select x-model="governanceExperimentFilters.status" class="input-field h-9 py-0" @change="applyGovernanceExperimentFilters()">
            <option value="">全部</option>
            <template x-for="option in governanceExperimentStatusOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <label class="field-block min-w-44">
          <span class="field-label">类型</span>
          <select x-model="governanceExperimentFilters.experiment_type" class="input-field h-9 py-0" @change="applyGovernanceExperimentFilters()">
            <option value="">全部</option>
            <template x-for="option in governanceExperimentTypeOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <label class="field-block min-w-72 flex-1">
          <span class="field-label">Experiment ID</span>
          <input x-model="governanceExperimentLookupId" class="input-field h-9 py-0 font-mono text-xs" placeholder="experiment_id" @keydown.enter.prevent="openGovernanceExperiment()" />
        </label>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" :disabled="busy.governanceExperiments" @click="loadGovernanceExperiments()">
          <span class="material-symbols-outlined text-[18px]">refresh</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" :disabled="busy.governanceExperimentLookup" @click="openGovernanceExperiment()">
          <span class="material-symbols-outlined text-[18px]">open_in_new</span>
          <span>打开</span>
        </button>
      </div>
    </div>

    <div class="grid min-h-0 flex-1 grid-cols-1 divide-y divide-slate-800 xl:grid-cols-[minmax(0,1.2fr)_minmax(22rem,0.8fr)] xl:divide-x xl:divide-y-0">
      <section class="min-h-0 overflow-auto">
        <div class="grid min-w-[58rem] grid-cols-[minmax(0,1.2fr)_8rem_7rem_8rem_8rem] gap-3 border-b border-slate-800 bg-slate-950/70 px-3 py-2 text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">
          <span>Experiment</span>
          <span>类型</span>
          <span class="text-center">状态</span>
          <span>Proposal</span>
          <span>时间</span>
        </div>
        <template x-if="governanceExperimentRows.length === 0">
          <div class="empty-state h-full min-h-80">
            <span class="material-symbols-outlined text-[32px] text-slate-400">science</span>
            <p class="mt-3 text-base font-medium text-slate-100">暂无治理实验</p>
          </div>
        </template>
        <template x-if="governanceExperimentRows.length > 0">
          <div class="divide-y divide-slate-800">
            <template x-for="experiment in governanceExperimentRows" :key="experiment.id">
              <article class="grid min-w-[58rem] gap-3 bg-slate-950/20 px-3 py-3 text-sm transition hover:bg-slate-900/50" style="grid-template-columns: minmax(0,1.2fr) 8rem 7rem 8rem 8rem;">
                <button type="button" class="min-w-0 text-left" @click="selectGovernanceExperiment(experiment)">
                  <span class="block truncate font-semibold text-slate-100" x-text="experiment.summary"></span>
                  <span class="mt-1 block truncate font-mono text-[11px] text-slate-500">
                    <span x-text="experiment.id"></span>
                    <span class="text-slate-600"> · </span>
                    <span x-text="governanceProposalStatusLabel(experiment.proposal_status || '')"></span>
                  </span>
                </button>
                <span class="text-slate-300" x-text="governanceExperimentTypeLabel(experiment.experiment_type)"></span>
                <span class="status-badge justify-center" :class="statusBadgeTone(experiment.status)" x-text="governanceExperimentStatusLabel(experiment.status)"></span>
                <button type="button" class="truncate font-mono text-[11px] text-sky-300 hover:text-sky-200" @click="navigate(governanceProposalPath(experiment.proposal_id))" x-text="formatShortId(experiment.proposal_id)"></button>
                <span class="font-mono text-[11px] text-slate-500" x-text="formatDateTime(experiment.created_at)"></span>
              </article>
            </template>
          </div>
        </template>
      </section>

      <aside class="min-h-0 overflow-auto bg-slate-950/20">
        <template x-if="!governanceExperimentDetail">
          <div class="empty-state h-full min-h-80">
            <span class="material-symbols-outlined text-[32px] text-slate-400">analytics</span>
            <p class="mt-3 text-base font-medium text-slate-100">选择一个实验</p>
          </div>
        </template>
        <template x-if="governanceExperimentDetail">
          <div class="divide-y divide-slate-800">
            <header class="p-4">
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div class="min-w-0">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Experiment</p>
                  <p class="mt-1 text-sm font-semibold text-slate-100" x-text="governanceExperimentDetail.summary"></p>
                  <p class="mt-2 truncate font-mono text-[11px] text-slate-500" x-text="governanceExperimentDetail.id"></p>
                </div>
                <span class="status-badge" :class="statusBadgeTone(governanceExperimentDetail.status)" x-text="governanceExperimentStatusLabel(governanceExperimentDetail.status)"></span>
              </div>
              <div class="mt-4 flex flex-wrap gap-2">
                <button type="button" class="button-secondary h-8 px-3" :disabled="busy.governanceProposalAction || !governanceCanRunTests(governanceExperimentProposalContext())" @click="runTestsFromGovernanceExperiment(governanceExperimentDetail)">
                  <span class="material-symbols-outlined text-[17px]">science</span>
                  <span>运行测试</span>
                </button>
                <button type="button" class="button-secondary h-8 px-3" :disabled="busy.governanceProposalAction || !governanceCanActivateCanary(governanceExperimentProposalContext())" @click="activateCanaryFromGovernanceExperiment(governanceExperimentDetail)">
                  <span class="material-symbols-outlined text-[17px]">rocket_launch</span>
                  <span>激活灰度</span>
                </button>
                <button type="button" class="button-danger h-8 px-3" :disabled="busy.governanceProposalAction || !governanceCanRollback(governanceExperimentProposalContext())" @click="rollbackFromGovernanceExperiment(governanceExperimentDetail)">
                  <span class="material-symbols-outlined text-[17px]">settings_backup_restore</span>
                  <span>回滚</span>
                </button>
              </div>
            </header>
            <div class="grid grid-cols-2 divide-x divide-slate-800 text-xs xl:grid-cols-4">
              <div class="p-4">
                <p class="text-slate-500">类型</p>
                <p class="mt-1 text-slate-200" x-text="governanceExperimentTypeLabel(governanceExperimentDetail.experiment_type)"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Proposal 状态</p>
                <p class="mt-1 text-slate-200" x-text="governanceProposalStatusLabel(governanceExperimentProposalContext()?.status || governanceExperimentDetail.proposal_status || '')"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Run</p>
                <button
                  type="button"
                  class="mt-1 inline-flex max-w-full items-center gap-1 truncate font-mono text-sky-300 hover:text-sky-200 disabled:cursor-not-allowed disabled:text-slate-500"
                  :disabled="!governanceExperimentReplayPath(governanceExperimentDetail)"
                  @click="openGovernanceExperimentReplay(governanceExperimentDetail)"
                >
                  <span class="material-symbols-outlined shrink-0 text-[15px]">history</span>
                  <span class="truncate" x-text="governanceExperimentSourceRunId(governanceExperimentDetail) || 'N/A'"></span>
                </button>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Proposal</p>
                <button type="button" class="mt-1 truncate font-mono text-sky-300 hover:text-sky-200" @click="navigate(governanceProposalPath(governanceExperimentDetail.proposal_id))" x-text="governanceExperimentDetail.proposal_id"></button>
              </div>
            </div>
            <div class="p-4">
              <div class="flex items-center justify-between gap-3">
                <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Evidence</p>
                <span class="font-mono text-[11px] text-slate-500" x-text="governanceExperimentEvidenceLinks(governanceExperimentDetail).length"></span>
              </div>
              <template x-if="governanceExperimentEvidenceLinks(governanceExperimentDetail).length === 0">
                <p class="mt-3 text-sm text-slate-500">暂无实验证据链接。</p>
              </template>
              <div class="mt-3 flex flex-wrap gap-2">
                <template x-for="link in governanceExperimentEvidenceLinks(governanceExperimentDetail)" :key="link.key">
                  <button type="button" class="button-secondary h-8 max-w-full px-3 text-xs" @click="navigate(link.href)" :title="link.value || link.label">
                    <span class="material-symbols-outlined shrink-0 text-[17px]" x-text="link.icon"></span>
                    <span x-text="link.label"></span>
                    <span class="max-w-32 truncate font-mono text-[11px] text-slate-500" x-show="link.value" x-text="formatShortId(link.value)"></span>
                  </button>
                </template>
              </div>
            </div>
            <div class="p-4">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Metrics Diff</p>
              <div class="mt-3 overflow-hidden rounded-md border border-slate-800">
                <template x-if="governanceExperimentMetricRows(governanceExperimentDetail).length === 0">
                  <p class="p-3 text-sm text-slate-400">暂无指标对比</p>
                </template>
                <template x-for="row in governanceExperimentMetricRows(governanceExperimentDetail)" :key="row.key">
                  <div class="grid grid-cols-[minmax(0,0.8fr)_minmax(0,1fr)_minmax(0,1fr)] gap-3 border-b border-slate-800 px-3 py-2 text-xs last:border-b-0" :class="row.changed ? 'bg-orange-500/5' : 'bg-slate-950/30'">
                    <span class="truncate font-mono text-slate-400" x-text="row.key"></span>
                    <span class="min-w-0 truncate font-mono text-slate-300" x-text="governanceMetricValueLabel(row.before)"></span>
                    <span class="min-w-0 truncate font-mono text-slate-100" x-text="governanceMetricValueLabel(row.after)"></span>
                  </div>
                </template>
              </div>
            </div>
            <div class="grid grid-cols-1 divide-y divide-slate-800 lg:grid-cols-3 lg:divide-x lg:divide-y-0">
              <div class="p-4">
                <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Regression Result</p>
                <div class="mt-3 space-y-2">
                  <p class="text-sm text-slate-300" x-text="governanceExperimentDetail.result?.outcome || 'N/A'"></p>
                  <template x-if="governanceExperimentRegressionChecks(governanceExperimentDetail).length === 0">
                    <p class="text-sm text-slate-500">暂无检查项</p>
                  </template>
                  <template x-for="check in governanceExperimentRegressionChecks(governanceExperimentDetail)" :key="governanceJsonPreview(check)">
                    <pre class="max-h-24 overflow-auto rounded-md bg-slate-950/60 p-2 font-mono text-[11px] leading-5 text-slate-300" x-text="governanceJsonPreview(check)"></pre>
                  </template>
                </div>
              </div>
              <div class="p-4">
                <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Canary Scope</p>
                <pre class="mt-3 max-h-40 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="governanceJsonPreview(governanceExperimentCanaryScope(governanceExperimentDetail))"></pre>
              </div>
              <div class="p-4">
                <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Rollback Conditions</p>
                <template x-if="governanceExperimentRollbackConditions(governanceExperimentDetail).length === 0">
                  <p class="mt-3 text-sm text-slate-500">暂无回滚条件</p>
                </template>
                <ul class="mt-3 space-y-2 text-sm text-slate-300">
                  <template x-for="condition in governanceExperimentRollbackConditions(governanceExperimentDetail)" :key="governanceJsonPreview(condition)">
                    <li class="rounded-md border border-slate-800 bg-slate-950/40 px-3 py-2" x-text="governanceMetricValueLabel(condition)"></li>
                  </template>
                </ul>
              </div>
            </div>
            <div class="p-4">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Before Metrics</p>
              <pre class="mt-3 max-h-56 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="governanceJsonPreview(governanceExperimentDetail.before_metrics)"></pre>
            </div>
            <div class="p-4">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">After Metrics</p>
              <pre class="mt-3 max-h-56 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="governanceJsonPreview(governanceExperimentDetail.after_metrics)"></pre>
            </div>
            <div class="p-4">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Result</p>
              <pre class="mt-3 max-h-72 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="governanceJsonPreview(governanceExperimentDetail.result)"></pre>
            </div>
          </div>
        </template>
      </aside>
    </div>
  </section>
</div>
