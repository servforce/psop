<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950/70 px-3 py-2">
      <nav class="breadcrumb-bar border-0 pb-0 text-xs" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link" @click="navigate(governanceProposalsPath())">Governance</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-100" @click="navigate(governanceExperimentsPath())">Experiments</button>
      </nav>
    </div>

    <div class="shrink-0 border-b border-slate-800 bg-slate-950/50 px-3 py-2">
      <div class="flex items-end gap-2 overflow-x-auto whitespace-nowrap">
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="navigate(governanceProposalsPath())">
          <span class="material-symbols-outlined text-[18px]">account_tree</span>
          <span>提案</span>
        </button>
        <label class="field-block min-w-56">
          <span class="field-label">Proposal ID</span>
          <input x-model="governanceExperimentFilters.proposal_id" class="input-field h-9 py-0 font-mono text-xs" placeholder="proposal_id" @input.debounce.300ms="applyGovernanceExperimentFilters()" />
        </label>
        <label class="field-block min-w-44">
          <span class="field-label">状态</span>
          <select x-model="governanceExperimentFilters.status" class="input-field h-9 py-0" @change="applyGovernanceExperimentFilters()">
            <option value="">全部</option>
            <template x-for="option in governanceExperimentStatusOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <label class="field-block min-w-44">
          <span class="field-label">类型</span>
          <select x-model="governanceExperimentFilters.experiment_type" class="input-field h-9 py-0" @change="applyGovernanceExperimentFilters()">
            <option value="">全部</option>
            <template x-for="option in governanceExperimentTypeOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <label class="field-block min-w-72 flex-1">
          <span class="field-label">Experiment ID</span>
          <input x-model="governanceExperimentLookupId" class="input-field h-9 py-0 font-mono text-xs" placeholder="experiment_id" @keydown.enter.prevent="openGovernanceExperiment()" />
        </label>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" :disabled="busy.governanceExperiments" @click="loadGovernanceExperiments()">
          <span class="material-symbols-outlined text-[18px]">refresh</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" :disabled="busy.governanceExperimentLookup" @click="openGovernanceExperiment()">
          <span class="material-symbols-outlined text-[18px]">open_in_new</span>
          <span>打开</span>
        </button>
      </div>
    </div>

    <div class="grid min-h-0 flex-1 grid-cols-1 divide-y divide-slate-800 xl:grid-cols-[minmax(0,1.2fr)_minmax(22rem,0.8fr)] xl:divide-x xl:divide-y-0">
      <section class="min-h-0 overflow-auto">
        <div class="grid min-w-[58rem] grid-cols-[minmax(0,1.2fr)_8rem_7rem_8rem_8rem] gap-3 border-b border-slate-800 bg-slate-950/70 px-3 py-2 text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">
          <span>Experiment</span>
          <span>类型</span>
          <span class="text-center">状态</span>
          <span>Proposal</span>
          <span>时间</span>
        </div>
        <template x-if="governanceExperimentRows.length === 0">
          <div class="empty-state h-full min-h-80">
            <span class="material-symbols-outlined text-[32px] text-slate-400">science</span>
            <p class="mt-3 text-base font-medium text-slate-100">暂无治理实验</p>
          </div>
        </template>
        <template x-if="governanceExperimentRows.length > 0">
          <div class="divide-y divide-slate-800">
            <template x-for="experiment in governanceExperimentRows" :key="experiment.id">
              <article class="grid min-w-[58rem] gap-3 bg-slate-950/20 px-3 py-3 text-sm transition hover:bg-slate-900/50" style="grid-template-columns: minmax(0,1.2fr) 8rem 7rem 8rem 8rem;">
                <button type="button" class="min-w-0 text-left" @click="governanceExperimentDetail = experiment; governanceExperimentLookupId = experiment.id">
                  <span class="block truncate font-semibold text-slate-100" x-text="experiment.summary"></span>
                  <span class="mt-1 block truncate font-mono text-[11px] text-slate-500" x-text="experiment.id"></span>
                </button>
                <span class="text-slate-300" x-text="governanceExperimentTypeLabel(experiment.experiment_type)"></span>
                <span class="status-badge justify-center" :class="statusBadgeTone(experiment.status)" x-text="governanceExperimentStatusLabel(experiment.status)"></span>
                <button type="button" class="truncate font-mono text-[11px] text-sky-300 hover:text-sky-200" @click="navigate(governanceProposalPath(experiment.proposal_id))" x-text="formatShortId(experiment.proposal_id)"></button>
                <span class="font-mono text-[11px] text-slate-500" x-text="formatDateTime(experiment.created_at)"></span>
              </article>
            </template>
          </div>
        </template>
      </section>

      <aside class="min-h-0 overflow-auto bg-slate-950/20">
        <template x-if="!governanceExperimentDetail">
          <div class="empty-state h-full min-h-80">
            <span class="material-symbols-outlined text-[32px] text-slate-400">analytics</span>
            <p class="mt-3 text-base font-medium text-slate-100">选择一个实验</p>
          </div>
        </template>
        <template x-if="governanceExperimentDetail">
          <div class="divide-y divide-slate-800">
            <header class="p-4">
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div class="min-w-0">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Experiment</p>
                  <p class="mt-1 text-sm font-semibold text-slate-100" x-text="governanceExperimentDetail.summary"></p>
                  <p class="mt-2 truncate font-mono text-[11px] text-slate-500" x-text="governanceExperimentDetail.id"></p>
                </div>
                <span class="status-badge" :class="statusBadgeTone(governanceExperimentDetail.status)" x-text="governanceExperimentStatusLabel(governanceExperimentDetail.status)"></span>
              </div>
            </header>
            <div class="grid grid-cols-2 divide-x divide-slate-800 text-xs">
              <div class="p-4">
                <p class="text-slate-500">类型</p>
                <p class="mt-1 text-slate-200" x-text="governanceExperimentTypeLabel(governanceExperimentDetail.experiment_type)"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Proposal</p>
                <button type="button" class="mt-1 truncate font-mono text-sky-300 hover:text-sky-200" @click="navigate(governanceProposalPath(governanceExperimentDetail.proposal_id))" x-text="governanceExperimentDetail.proposal_id"></button>
              </div>
            </div>
            <div class="p-4">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Before Metrics</p>
              <pre class="mt-3 max-h-56 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="governanceJsonPreview(governanceExperimentDetail.before_metrics)"></pre>
            </div>
            <div class="p-4">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">After Metrics</p>
              <pre class="mt-3 max-h-56 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="governanceJsonPreview(governanceExperimentDetail.after_metrics)"></pre>
            </div>
            <div class="p-4">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Result</p>
              <pre class="mt-3 max-h-72 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="governanceJsonPreview(governanceExperimentDetail.result)"></pre>
            </div>
          </div>
        </template>
      </aside>
    </div>
  </section>
</div>
