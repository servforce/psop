<template x-if="currentSkill">
<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950">
      <nav class="breadcrumb-bar h-7 min-h-0 flex-nowrap gap-1 border-b border-slate-800 px-2 pb-0 text-xs" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">Skills</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link min-w-0 truncate font-medium text-slate-100" @click="refreshCurrentSkill()" x-text="currentSkill.name"></button>
      </nav>
      <div class="flex h-8 items-stretch overflow-hidden" role="tablist" aria-label="Skill 详情页签">
        <button type="button" class="detail-tab" :class="activeDetailTab === 'overview' ? 'detail-tab-active' : ''" @click="selectDetailTab('overview')">
          <span class="material-symbols-outlined text-[15px]">badge</span>
          <span>信息</span>
        </button>
        <button type="button" class="detail-tab" :class="activeDetailTab === 'materials' ? 'detail-tab-active' : ''" @click="selectDetailTab('materials')">
          <span class="material-symbols-outlined text-[15px]">inventory_2</span>
          <span>素材</span>
        </button>
        <button type="button" class="detail-tab" :class="activeDetailTab === 'source' ? 'detail-tab-active' : ''" @click="selectDetailTab('source')">
          <span class="material-symbols-outlined text-[15px]">code_blocks</span>
          <span>源码</span>
        </button>
        <button type="button" class="detail-tab" :class="activeDetailTab === 'compiler' ? 'detail-tab-active' : ''" @click="selectDetailTab('compiler')">
          <span class="material-symbols-outlined text-[15px]">account_tree</span>
          <span>编译</span>
        </button>
        <button type="button" class="detail-tab" :class="activeDetailTab === 'test' ? 'detail-tab-active' : ''" @click="selectDetailTab('test')">
          <span class="material-symbols-outlined text-[15px]">science</span>
          <span>测试</span>
        </button>
        <button type="button" class="detail-tab" :class="activeDetailTab === 'publish' ? 'detail-tab-active' : ''" @click="selectDetailTab('publish')">
          <span class="material-symbols-outlined text-[15px]">rocket_launch</span>
          <span>发布</span>
        </button>
        <button type="button" class="detail-tab" :class="activeDetailTab === 'runtime' ? 'detail-tab-active' : ''" @click="selectDetailTab('runtime')">
          <span class="material-symbols-outlined text-[15px]">play_circle</span>
          <span>运行</span>
        </button>
      </div>
    </div>

    <template x-if="activeDetailTab === 'overview'">
      <div class="panel-body grid gap-0 !p-0 xl:grid-cols-[0.95fr_1.35fr] xl:divide-x xl:divide-slate-800">
        <section class="detail-section !p-3">
          <form class="space-y-4" @submit.prevent="saveMetadata()">
            <label class="field-block">
              <span class="field-label">Skill ID</span>
              <div class="copyable-field">
                <input class="copyable-input" :value="currentSkill.id || ''" readonly aria-label="Skill ID" />
                <button type="button" class="copyable-button" title="复制 Skill ID" aria-label="复制 Skill ID" @click="copyText(currentSkill.id, `skill-id-${currentSkill.id}`)">
                  <span class="material-symbols-outlined text-[16px]" x-text="copyIcon(`skill-id-${currentSkill.id}`)"></span>
                </button>
              </div>
            </label>
            <label class="field-block">
              <span class="field-label">Skill 名称</span>
              <input x-model="metadataForm.name" class="input-field" required />
            </label>
            <label class="field-block">
              <span class="field-label">描述</span>
              <textarea x-model="metadataForm.description" class="textarea-field h-32"></textarea>
            </label>
            <div class="flex flex-wrap gap-3">
              <button type="submit" class="button-primary" title="保存基础信息" aria-label="保存基础信息" :disabled="busy.metadata">
                <span class="material-symbols-outlined text-[18px]">save</span>
                <span x-text="busy.metadata ? '保存中...' : '保存基础信息'"></span>
              </button>
            </div>
          </form>
        </section>

        <section class="detail-section !p-3">
          <div class="space-y-5">
            <dl class="grid gap-4 text-sm md:grid-cols-2">
              <div>
                <dt class="field-label">GitLab Group</dt>
                <dd class="mono-field mt-1" x-text="currentSkill.gitlab_group_path"></dd>
              </div>
              <div>
                <dt class="field-label">Project ID</dt>
                <dd class="mono-field mt-1" x-text="currentSkill.gitlab_project_id"></dd>
              </div>
              <div>
                <dt class="field-label">仓库地址</dt>
                <dd class="copyable-field mt-1">
                  <input class="copyable-input" :value="currentSkill.repository_url || ''" readonly aria-label="仓库地址" />
                  <button type="button" class="copyable-button" title="复制仓库 URL" aria-label="复制仓库 URL" @click="copyText(currentSkill.repository_url, `skill-repo-${currentSkill.id}`)">
                    <span class="material-symbols-outlined text-[18px]" x-text="copyIcon(`skill-repo-${currentSkill.id}`)"></span>
                  </button>
                </dd>
              </div>
              <div>
                <dt class="field-label">默认分支</dt>
                <dd class="mono-field mt-1" x-text="currentSkill.default_branch"></dd>
              </div>
              <div>
                <dt class="field-label">Manifest 路径</dt>
                <dd class="mono-field mt-1" x-text="currentSkill.manifest_path"></dd>
              </div>
              <div>
                <dt class="field-label">更新时间</dt>
                <dd class="mono-field mt-1" x-text="formatDateTime(currentSkill.updated_at)"></dd>
              </div>
            </dl>

            <div class="grid gap-4 md:grid-cols-2">
              <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
                <p class="field-label">草稿版本</p>
                <template x-if="currentSkill.current_draft_version">
                  <div class="mt-3 space-y-2">
                    <p class="text-sm font-medium text-slate-950">版本 <span x-text="currentSkill.current_draft_version.version_no"></span></p>
                    <p class="mono-field text-[11px]" x-text="currentSkill.current_draft_version.source_ref"></p>
                    <p class="mono-field text-[11px]" x-text="formatShortId(currentSkill.current_draft_version.source_commit_sha)"></p>
                  </div>
                </template>
              </div>

              <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
                <p class="field-label">最近发布</p>
                <template x-if="currentSkill.latest_published_version">
                  <div class="mt-3 space-y-2">
                    <p class="text-sm font-medium text-slate-950">版本 <span x-text="currentSkill.latest_published_version.version_no"></span></p>
                    <p class="mono-field text-[11px]" x-text="currentSkill.latest_published_version.source_ref"></p>
                    <p class="mono-field text-[11px]" x-text="formatShortId(currentSkill.latest_published_version.source_commit_sha)"></p>
                  </div>
                </template>
                <template x-if="!currentSkill.latest_published_version">
                  <p class="mt-3 text-sm text-slate-500">尚未发布。</p>
                </template>
              </div>
            </div>
          </div>
        </section>
      </div>
    </template>

    <template x-if="activeDetailTab === 'source'">
      <div class="panel-body !p-0">
        <template x-if="busy.repositoryTree && repositoryLoadedSkillId !== currentSkill.id">
          <div class="empty-state py-16">
            <span class="material-symbols-outlined text-[30px] text-slate-400">sync</span>
            <p class="mt-3 text-sm text-slate-500">正在加载仓库文件...</p>
          </div>
        </template>

        <template x-if="repositoryLoadedSkillId === currentSkill.id">
          <div class="grid h-full min-h-0 gap-0 xl:grid-cols-[minmax(0,1.08fr)_minmax(28rem,0.92fr)]">
            <section class="min-h-0 overflow-hidden rounded-none border-0 border-b border-slate-800 bg-white xl:border-b-0 xl:border-r">
              <div class="flex flex-col gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3 lg:flex-row lg:items-center lg:justify-between">
                <div class="flex min-w-0 flex-wrap items-center gap-2">
                  <span class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700">
                    <span class="material-symbols-outlined text-[18px]">account_tree</span>
                    <span x-text="currentSkill.default_branch"></span>
                  </span>
                  <div class="flex min-w-0 flex-wrap items-center gap-1 text-sm">
                    <template x-for="crumb in repositoryBreadcrumbs()" :key="crumb.path || 'root'">
                      <span class="inline-flex items-center gap-1">
                        <button type="button" class="breadcrumb-link font-medium" @click="openRepositoryPath(crumb.path)" x-text="crumb.label"></button>
                        <span class="material-symbols-outlined text-[15px] text-slate-400" x-show="crumb.path !== repositoryPath">chevron_right</span>
                      </span>
                    </template>
                  </div>
                </div>
                <div class="relative shrink-0" @click.outside="closeSourceActionMenu()">
                  <button
                    type="button"
                    class="inline-flex h-10 items-center overflow-hidden rounded-lg border border-slate-300 bg-white text-slate-800 shadow-sm transition hover:border-slate-400 hover:bg-slate-50"
                    :class="sourceActionMenuOpen ? 'border-sky-300 ring-2 ring-sky-100' : ''"
                    aria-label="新增源码内容"
                    title="新增源码内容"
                    :aria-expanded="sourceActionMenuOpen"
                    @click="toggleSourceActionMenu()"
                  >
                    <span class="flex h-full items-center border-r border-slate-200 px-3">
                      <span class="material-symbols-outlined text-[22px]">add</span>
                    </span>
                    <span class="flex h-full items-center px-2">
                      <span class="material-symbols-outlined text-[20px]">expand_more</span>
                    </span>
                  </button>

                  <template x-if="sourceActionMenuOpen">
                    <div class="absolute right-0 z-30 mt-2 w-56 overflow-hidden rounded-xl border border-slate-200 bg-white py-2 shadow-[0_18px_44px_rgba(15,23,42,0.16)]">
                      <p class="px-4 pb-2 text-xs font-semibold text-slate-500">当前目录</p>
                      <button type="button" class="flex w-full items-center gap-3 px-4 py-3 text-left text-sm font-medium text-slate-700 transition hover:bg-sky-50 hover:text-sky-800" @click="openSourceCreateModal('file')">
                        <span class="material-symbols-outlined text-[18px]">note_add</span>
                        <span>新增文件</span>
                      </button>
                      <button type="button" class="flex w-full items-center gap-3 px-4 py-3 text-left text-sm font-medium text-slate-700 transition hover:bg-sky-50 hover:text-sky-800" @click="openSourceCreateModal('folder')">
                        <span class="material-symbols-outlined text-[18px]">create_new_folder</span>
                        <span>新增文件夹</span>
                      </button>
                    </div>
                  </template>
                </div>
              </div>

              <div class="grid grid-cols-[minmax(0,1.4fr)_minmax(12rem,0.9fr)_10rem] border-b border-slate-200 bg-slate-50 px-4 py-3 text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">
                <span>名称</span>
                <span>来源</span>
                <span>当前提交</span>
              </div>

              <div class="divide-y divide-slate-200">
                <template x-if="repositoryPath">
                  <button type="button" class="group relative grid w-full grid-cols-[minmax(0,1.4fr)_minmax(12rem,0.9fr)_10rem] items-center gap-4 px-4 py-4 text-left transition duration-150 hover:bg-sky-50/80 active:bg-sky-100/80 active:pl-5" @click="openRepositoryPath(parentRepositoryPath())">
                    <span class="absolute inset-y-0 left-0 w-1 bg-transparent transition group-hover:bg-sky-400"></span>
                    <span class="flex min-w-0 items-center gap-3 text-sm font-semibold text-slate-700">
                      <span class="material-symbols-outlined text-[20px] text-slate-400 transition group-hover:text-sky-600">drive_folder_upload</span>
                      <span class="transition group-hover:text-sky-800">返回上级</span>
                    </span>
                    <span class="text-sm text-slate-400">目录导航</span>
                    <span class="mono-field">N/A</span>
                  </button>
                </template>

                <template x-if="!busy.repositoryTree && repositoryEntries.length === 0">
                  <div class="empty-state py-14">
                    <span class="material-symbols-outlined text-[30px] text-slate-400">folder_open</span>
                    <p class="mt-3 text-sm text-slate-500">当前目录暂无文件。</p>
                  </div>
                </template>

                <template x-for="entry in repositoryEntries" :key="entry.path">
                  <button
                    type="button"
                    class="group relative grid w-full grid-cols-[minmax(0,1.4fr)_minmax(12rem,0.9fr)_10rem] items-center gap-4 px-4 py-4 text-left transition duration-150 hover:bg-sky-50/80 active:bg-sky-100/80 active:pl-5"
                    :class="selectedRepositoryFile?.file_path === entry.path ? 'bg-sky-50 text-sky-900 shadow-[inset_4px_0_0_rgba(2,132,199,0.85)]' : ''"
                    @click="entry.type === 'tree' ? openRepositoryFolder(entry) : openRepositoryFile(entry)"
                  >
                    <span class="absolute inset-y-0 left-0 w-1 bg-transparent transition group-hover:bg-sky-400"></span>
                    <span class="flex min-w-0 items-center gap-3">
                      <span class="material-symbols-outlined text-[20px]" :class="entry.type === 'tree' ? 'text-amber-500' : 'text-sky-600'" x-text="repositoryEntryIcon(entry)"></span>
                      <span class="truncate text-sm font-semibold text-slate-800 transition group-hover:text-sky-800" x-text="entry.name"></span>
                      <span class="rounded-full border border-slate-200 bg-slate-50 px-2 py-0.5 text-[11px] text-slate-500 transition group-hover:border-sky-200 group-hover:bg-white group-hover:text-sky-700" x-text="repositoryEntryLabel(entry)"></span>
                    </span>
                    <span class="truncate text-sm text-slate-500 transition group-hover:text-sky-700">通过 PSOP WEB IDE 更新</span>
                    <span class="mono-field whitespace-nowrap" x-text="formatShortId(currentSkill.latest_draft_head_sha || currentSkill.current_draft_version?.source_commit_sha)"></span>
                  </button>
                </template>
              </div>
            </section>

            <section class="min-h-0 overflow-hidden rounded-none border-0 bg-white">
              <template x-if="!selectedRepositoryFile && !busy.repositoryFile">
                <div class="empty-state min-h-[28rem]">
                  <span class="material-symbols-outlined text-[34px] text-slate-400">edit_document</span>
                  <p class="mt-3 text-sm font-medium text-slate-700">选择一个文件进行预览</p>
                  <p class="mt-2 text-sm text-slate-500">默认会预览 README.md，文件夹点击后会进入目录。</p>
                </div>
              </template>

              <template x-if="busy.repositoryFile">
                <div class="empty-state min-h-[28rem]">
                  <span class="material-symbols-outlined text-[30px] text-slate-400">sync</span>
                  <p class="mt-3 text-sm text-slate-500">正在打开文件...</p>
                </div>
              </template>

              <template x-if="selectedRepositoryFile && !busy.repositoryFile">
                <div class="flex h-full min-h-0 flex-col">
                  <div class="flex shrink-0 flex-col gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3 md:flex-row md:items-center md:justify-between">
                    <div class="min-w-0">
                      <p class="field-label" x-text="repositoryEditing ? '编辑文件' : '预览文件'"></p>
                      <p class="mt-1 truncate text-sm font-semibold text-slate-950" x-text="repositoryFileForm.path"></p>
                      <template x-if="isSystemManifestFile()">
                        <p class="mt-1 text-xs text-slate-500">系统生成的 manifest 预览文件，请通过结构化配置表单修改。</p>
                      </template>
                    </div>
                    <div class="flex items-center gap-2">
                      <template x-if="!repositoryEditing && !isSystemManifestFile()">
                        <button type="button" class="icon-button" title="编辑文件" @click="startRepositoryEdit()">
                          <span class="material-symbols-outlined text-[18px]">edit</span>
                        </button>
                      </template>
                      <button type="button" class="icon-button" title="关闭文件" @click="closeRepositoryFile()">
                        <span class="material-symbols-outlined text-[18px]">close</span>
                      </button>
                    </div>
                  </div>

                  <template x-if="!repositoryEditing">
                    <div class="markdown-preview min-h-0 flex-1 overflow-auto bg-white px-5 py-5" x-html="repositoryPreviewHtml()"></div>
                  </template>

                  <template x-if="repositoryEditing">
                    <textarea class="block min-h-0 flex-1 resize-none overflow-auto border-0 bg-white px-4 py-4 font-mono text-[12px] leading-6 text-slate-900 outline-none focus:ring-0" x-model="repositoryFileForm.content"></textarea>
                  </template>

                  <template x-if="repositoryEditing">
                    <div class="flex shrink-0 flex-wrap items-center justify-between gap-3 border-t border-slate-200 bg-slate-50 px-4 py-3">
                      <span class="mono-field" x-text="repositoryFileForm.base_commit_sha"></span>
                      <div class="flex items-center gap-2">
                        <button type="button" class="button-secondary" title="取消编辑" aria-label="取消编辑" :disabled="busy.repositorySave" @click="cancelRepositoryEdit()">
                          <span class="material-symbols-outlined text-[18px]">close</span>
                          <span>取消</span>
                        </button>
                        <button type="button" class="button-primary" title="保存文件" aria-label="保存文件" :disabled="busy.repositorySave" @click="saveRepositoryFile()">
                          <span class="material-symbols-outlined text-[18px]">save</span>
                          <span x-text="busy.repositorySave ? '保存中...' : '保存文件'"></span>
                        </button>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </section>

            <template x-if="sourceCreateModalOpen">
              <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/40 px-4 py-8 backdrop-blur-sm">
                <section class="modal-panel">
                  <div class="border-b border-slate-200 px-5 py-4">
                    <p class="panel-kicker" x-text="sourceCreateMode === 'folder' ? '新建文件夹' : '新建文件'"></p>
                    <h3 class="panel-title" x-text="sourceCreateMode === 'folder' ? '创建仓库文件夹' : '创建仓库文件'"></h3>
                  </div>
                  <form class="space-y-4 px-5 py-5" @submit.prevent="createRepositoryEntry()">
                    <label class="field-block">
                      <span class="field-label">仓库路径</span>
                      <input x-model="sourceCreateForm.path" class="input-field" placeholder="例如：docs/usage.md 或 examples" required />
                    </label>
                    <template x-if="sourceCreateMode === 'file'">
                      <label class="field-block">
                        <span class="field-label">初始内容</span>
                        <textarea x-model="sourceCreateForm.content" class="editor-area min-h-[16rem]" placeholder="可以先留空，创建后继续编辑。"></textarea>
                      </label>
                    </template>
                    <div class="flex flex-wrap justify-end gap-3 border-t border-slate-200 pt-4">
                      <button type="button" class="button-secondary" title="取消" aria-label="取消" @click="closeSourceCreateModal()">
                        <span class="material-symbols-outlined text-[18px]">close</span>
                        <span>取消</span>
                      </button>
                      <button type="submit" class="button-primary" title="确认创建" aria-label="确认创建" :disabled="busy.repositoryCreate">
                        <span class="material-symbols-outlined text-[18px]" x-text="sourceCreateMode === 'folder' ? 'create_new_folder' : 'note_add'"></span>
                        <span x-text="busy.repositoryCreate ? '创建中...' : '确认创建'"></span>
                      </button>
                    </div>
                  </form>
                </section>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

    <template x-if="activeDetailTab === 'materials'">
      <div class="panel-body h-full min-h-0 overflow-hidden !p-0">
        <section class="flex h-full min-h-0 flex-col overflow-hidden bg-slate-950">
          <div class="grid h-full min-h-0 flex-1 lg:grid-cols-[minmax(18rem,0.82fr)_minmax(0,1.18fr)]">
            <section class="grid min-h-0 grid-rows-[auto_minmax(0,1fr)] overflow-hidden border-b border-slate-800 bg-slate-950 lg:border-b-0 lg:border-r">
              <div class="flex flex-col gap-3 border-b border-slate-800 bg-slate-950/70 px-3 py-2 md:flex-row md:items-center md:justify-between">
                <div class="min-w-0">
                  <p class="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">素材</p>
                  <p class="mt-1 truncate text-sm text-slate-300">
                    <span x-text="rawMaterials.length"></span>
                    <span> 个素材</span>
                    <span x-show="rawMaterials.length > 0">
                      <span class="text-slate-600"> / </span>
                      <span>全部参与生成</span>
                    </span>
                  </p>
                </div>
                <div class="flex shrink-0 items-center gap-2">
                  <button type="button" class="topbar-icon-button h-9 w-9" title="上传文件" aria-label="上传文件" @click="openRawMaterialUploadModal()">
                    <span class="material-symbols-outlined text-[18px]">upload_file</span>
                  </button>
                  <button type="button" class="topbar-icon-button h-9 w-9" title="生成 Skill" aria-label="生成 Skill" :disabled="!canGenerateSkillDraftFromRawMaterials()" @click="openRawMaterialGenerateModal()">
                    <span class="material-symbols-outlined text-[18px]">auto_fix_high</span>
                  </button>
                  <button type="button" class="topbar-icon-button h-9 w-9" title="刷新素材" aria-label="刷新素材" :disabled="busy.rawMaterials" @click="loadRawMaterials(currentSkill.id, true)">
                    <span class="material-symbols-outlined text-[18px]" :class="busy.rawMaterials ? 'animate-spin' : ''">sync</span>
                  </button>
                </div>
              </div>

              <div class="min-h-0 overflow-y-auto overflow-x-hidden">
                <template x-if="busy.rawMaterials && rawMaterialsLoadedSkillId !== currentSkill.id">
                  <div class="empty-state py-14">
                    <span class="material-symbols-outlined text-[30px] text-slate-500">sync</span>
                    <p class="mt-3 text-sm text-slate-500">正在加载素材...</p>
                  </div>
                </template>

                <template x-if="!busy.rawMaterials && rawMaterials.length === 0">
                  <div class="empty-state py-14">
                    <span class="material-symbols-outlined text-[30px] text-slate-500">inventory_2</span>
                    <p class="mt-3 text-sm text-slate-500">暂无素材。</p>
                  </div>
                </template>

                <div class="min-h-0">
                  <template x-for="material in rawMaterials" :key="material.id">
                    <article class="group flex min-h-12 items-center gap-2 border-b border-slate-800 px-2.5 py-1.5 transition hover:bg-slate-900/70" :class="rawMaterialDetail?.id === material.id ? 'bg-slate-900 shadow-[inset_3px_0_0_rgba(249,115,22,0.85)]' : ''">

                </div>
            </template>
          </div>
        </section>
      </div>
    </template>

    <template x-if="activeDetailTab === 'runtime'">
      <div class="min-h-0 flex-1 overflow-auto">
        <section class="flex h-full min-h-0 flex-col overflow-hidden">
          <div class="shrink-0 overflow-x-auto border-b border-slate-800 bg-slate-950/45 px-3 py-2">
            <div class="grid min-w-[68rem] grid-cols-[9rem_10rem_10rem_minmax(24rem,1fr)_2.5rem] items-end gap-2">
              <label class="field-block gap-1">
                <span class="field-label">状态</span>
                <select x-model="runtimeFilters.status" class="select-field h-10 px-3 py-0" aria-label="运行状态">
                  <option value="">全部状态</option>
                  <option value="running">运行中</option>
                  <option value="succeeded">成功</option>
                  <option value="failed">失败</option>
                  <option value="aborted">已中止</option>
                  <option value="cancelled">已取消</option>
                </select>
              </label>
              <label class="field-block gap-1">
                <span class="field-label">创建开始</span>
                <input x-model="runtimeFilters.created_from" type="date" class="input-field h-10 px-3 py-0" />
              </label>
              <label class="field-block gap-1">
                <span class="field-label">创建结束</span>
                <input x-model="runtimeFilters.created_to" type="date" class="input-field h-10 px-3 py-0" />
              </label>
              <label class="field-block gap-1">
                <span class="field-label">连接说明（可选）</span>
                <input
                  x-model="invocationForm.user_input"
                  class="input-field h-10 px-3 py-0"
                  placeholder="可选：补充终端环境或现场背景"
                  :disabled="!currentSkill.latest_published_version || busy.createInvocation"
                  @keydown.enter.prevent="createInvocation()"
                />
              </label>
              <div class="flex items-end">
                <button
                  type="button"
                  class="button-primary h-10 w-10"
                  title="建立真实运行连接"
                  aria-label="建立真实运行连接"
                  :disabled="busy.createInvocation || !currentSkill.latest_published_version"
                  @click="createInvocation()"
                >
                  <span class="material-symbols-outlined text-[18px]">play_circle</span>
                  <span x-text="busy.createInvocation ? '连接中...' : '建立连接'"></span>
                </button>
              </div>
            </div>
          </div>

          <template x-if="!currentSkill.latest_published_version">
            <div class="border-b border-amber-500/25 bg-amber-500/10 px-3 py-2 text-sm text-amber-200">
              当前 Skill 尚未发布，无法建立真实运行连接。
            </div>
          </template>

          <template x-if="busy.invocations">
            <div class="empty-state flex-1 py-14">
              <span class="material-symbols-outlined text-[30px] text-slate-400">sync</span>
              <p class="mt-3 text-sm text-slate-500">正在加载运行记录...</p>
            </div>
          </template>

          <template x-if="!busy.invocations && currentSkillFilteredInvocations().length === 0">
            <div class="empty-state flex-1 py-14">
              <span class="material-symbols-outlined text-[30px] text-slate-400">play_circle</span>
              <p class="mt-3 text-sm text-slate-500" x-text="currentSkillInvocations().length > 0 ? '没有匹配的运行记录。' : '当前 Skill 尚无运行记录。'"></p>
              <p class="mt-2 text-xs text-slate-500">发布后可在这里建立运行连接，并进入运行现场查看执行过程。</p>
            </div>
          </template>

          <template x-if="currentSkillFilteredInvocations().length > 0">
            <div class="min-h-0 flex-1 overflow-auto">
              <div class="grid min-w-[72rem] grid-cols-[minmax(16rem,1.4fr)_8rem_minmax(14rem,1fr)_10rem_minmax(14rem,1fr)] border-b border-slate-800 bg-slate-950/35 px-3 py-2 text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">
                <span>Invocation</span>
                <span>状态</span>
                <span>运行 ID</span>
                <span>Artifact</span>
                <span>创建时间</span>
              </div>

              <div class="divide-y divide-slate-800">
                <template x-for="invocation in currentSkillFilteredInvocations()" :key="invocation.id">
                  <article
                    class="grid min-w-[72rem] cursor-pointer grid-cols-[minmax(16rem,1.4fr)_8rem_minmax(14rem,1fr)_10rem_minmax(14rem,1fr)] items-center gap-4 px-3 py-3 transition hover:bg-slate-900/60"
                    role="button"
                    tabindex="0"
                    @click="invocation.run_id && navigate(skillRunLivePath(invocation.run_id))"
                    @keydown.enter.prevent="invocation.run_id && navigate(skillRunLivePath(invocation.run_id))"
                    @keydown.space.prevent="invocation.run_id && navigate(skillRunLivePath(invocation.run_id))"
                  >
                    <div class="min-w-0">
                      <p class="mono-field truncate" x-text="invocation.id"></p>
                      <p class="mt-1 truncate text-xs text-slate-500" x-text="invocation.gateway_type || 'web'"></p>
                    </div>
                    <div>
                      <span class="status-badge" :class="statusBadgeTone(invocation.status)" x-text="formatStatus(invocation.status)"></span>
                    </div>
                    <span class="mono-field truncate" x-text="invocation.run_id || 'N/A'"></span>
                    <span class="mono-field" x-text="formatShortId(invocation.compile_artifact_id)"></span>
                    <span class="mono-field" x-text="formatDateTime(invocation.created_at)"></span>
                  </article>
                </template>
              </div>
            </div>
          </template>
        </section>
      </div>
    </template>

    <template x-if="activeDetailTab === 'test'">
      <div class="min-h-0 flex-1 overflow-hidden">
        <section class="flex h-full min-h-0 flex-col overflow-hidden">
          <div class="shrink-0 border-b border-slate-800 bg-slate-950/45">
            <div class="flex items-center gap-2 overflow-x-auto whitespace-nowrap px-3 py-3">
              <label class="relative min-w-56 flex-1">
                <span class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-[18px] text-slate-500">search</span>
                <input x-model="skillTestCaseSearch" class="input-field pl-10" placeholder="搜索场景名称、描述、时间轴或最近 Run" />
              </label>
              <span class="mono-field shrink-0" x-text="`${filteredSkillTestCases().length} / ${skillTestCases.length}`"></span>
              <button type="button" class="button-primary shrink-0" @click="navigate(`/admin/skills/${currentSkill.id}/tests/new`)">
                <span class="material-symbols-outlined text-[18px]">add</span>
                <span>新增场景</span>
              </button>
            </div>
          </div>

          <template x-if="busy.skillTestCases">
            <div class="empty-state flex-1 py-14">
              <span class="material-symbols-outlined text-[30px] text-slate-400">sync</span>
              <p class="mt-3 text-sm text-slate-500">正在加载测试场景...</p>
            </div>
          </template>

          <template x-if="!busy.skillTestCases && skillTestCases.length === 0">
            <div class="empty-state flex-1 py-14">
              <span class="material-symbols-outlined text-[30px] text-slate-400">science</span>
              <p class="mt-3 text-sm text-slate-500">当前 Skill 尚无黑盒时序测试场景。</p>
              <button type="button" class="button-primary mt-4" @click="navigate(`/admin/skills/${currentSkill.id}/tests/new`)">
                <span class="material-symbols-outlined text-[18px]">add</span>
                <span>新增场景</span>
              </button>
            </div>
          </template>

          <template x-if="!busy.skillTestCases && skillTestCases.length > 0 && filteredSkillTestCases().length === 0">
            <div class="empty-state flex-1 py-14">
              <span class="material-symbols-outlined text-[30px] text-slate-400">search_off</span>
              <p class="mt-3 text-sm text-slate-500">没有匹配的测试场景。</p>
            </div>
          </template>

          <template x-if="!busy.skillTestCases && filteredSkillTestCases().length > 0">
            <div class="min-h-0 flex-1 overflow-auto">
              <div class="grid min-w-[64rem] grid-cols-[minmax(16rem,1.4fr)_8rem_minmax(16rem,1fr)_14rem_12rem] border-b border-slate-800 bg-slate-950/35 px-3 py-2 text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">
                <span>Scenario</span>
                <span>状态</span>
                <span>最近测试</span>
                <span>结果</span>
                <span>更新时间</span>
              </div>
              <div class="divide-y divide-slate-800">
                <template x-for="testCase in filteredSkillTestCases()" :key="testCase.id">
                  <article
                    class="grid min-w-[64rem] cursor-pointer grid-cols-[minmax(16rem,1.4fr)_8rem_minmax(16rem,1fr)_14rem_12rem] items-center gap-4 px-3 py-3 transition hover:bg-slate-900/60"
                    role="button"
                    tabindex="0"
                    @click="navigate(`/admin/skills/${currentSkill.id}/tests/${testCase.id}`)"
                    @keydown.enter.prevent="navigate(`/admin/skills/${currentSkill.id}/tests/${testCase.id}`)"
                    @keydown.space.prevent="navigate(`/admin/skills/${currentSkill.id}/tests/${testCase.id}`)"
                  >
                    <div class="min-w-0 text-left">
                      <p class="truncate font-semibold text-slate-100" x-text="testCase.name"></p>
                      <p class="mt-1 truncate text-xs text-slate-500" x-text="testCase.description || skillTestInitialEventPreview(testCase)"></p>
                    </div>
                    <span class="status-badge" :class="statusBadgeTone(testCase.latest_run?.status || testCase.status)" x-text="formatStatus(testCase.latest_run?.status || testCase.status)"></span>
                    <span class="mono-field truncate" x-text="testCase.latest_run?.run_id || '尚未运行'"></span>
                    <span class="mono-field" x-text="formatAssertionSummary(testCase.latest_run?.result_summary)"></span>
                    <span class="mono-field" x-text="formatDateTime(testCase.updated_at)"></span>
                  </article>
                </template>
              </div>
            </div>
          </template>
        </section>
      </div>
    </template>
  </section>
</div>
</template>
