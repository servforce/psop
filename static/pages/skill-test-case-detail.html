<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950 px-4 py-3">
      <nav class="breadcrumb-bar border-0 pb-0" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">Skills</button>
        <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link" @click="currentSkill && navigate(`/admin/skills/${currentSkill.id}`)" x-text="currentSkill?.name || 'Skill'"></button>
        <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-100" @click="currentSkill && skillTestCase && loadSkillTestCaseDetail(currentSkill.id, skillTestCase.id)">测试 Case</button>
      </nav>
      <div class="mt-3 flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
        <div>
          <p class="mono-field" x-text="skillTestCase?.id || 'loading'"></p>
          <h1 class="mt-1 text-lg font-semibold text-slate-100" x-text="skillTestCase?.name || '测试 Case'"></h1>
        </div>
        <div class="flex flex-wrap gap-2">
          <button type="button" class="button-secondary" @click="currentSkill && navigate(`/admin/skills/${currentSkill.id}`); activeDetailTab = 'test'">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            <span>返回列表</span>
          </button>
          <button type="button" class="button-primary" :disabled="busy.skillTestRun || !skillTestCase" @click="skillTestCase && startSkillTestRun(skillTestCase.id)">
            <span class="material-symbols-outlined text-[18px]">play_arrow</span>
            <span x-text="busy.skillTestRun ? '启动中...' : '开始测试'"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="grid min-h-0 flex-1 overflow-hidden xl:grid-cols-[minmax(22rem,0.9fr)_minmax(0,1.4fr)]">
      <aside class="min-h-0 overflow-auto border-b border-slate-800 bg-slate-950/35 p-4 xl:border-b-0 xl:border-r">
        <form class="space-y-4" @submit.prevent="saveSkillTestCase()">
          <label class="field-block">
            <span class="field-label">Case 名称</span>
            <input x-model="skillTestCaseForm.name" class="input-field" />
          </label>
          <label class="field-block">
            <span class="field-label">描述</span>
            <textarea x-model="skillTestCaseForm.description" class="input-field min-h-24" placeholder="描述这个场景希望覆盖的真实交互"></textarea>
          </label>
          <label class="field-block">
            <span class="field-label">首轮输入模板（可选）</span>
            <textarea x-model="skillTestCaseForm.initial_event_payload" class="input-field min-h-24" placeholder="不会在创建运行时自动发送，可在 Test Live 中选择发送"></textarea>
          </label>
          <div class="grid gap-3 md:grid-cols-2">
            <label class="field-block">
              <span class="field-label">版本选择</span>
              <input x-model="skillTestCaseForm.target_version_selector" class="input-field" placeholder="latest" />
            </label>
            <label class="field-block">
              <span class="field-label">指定 Artifact</span>
              <input x-model="skillTestCaseForm.target_compile_artifact_id" class="input-field" placeholder="可选" />
            </label>
          </div>
          <label class="field-block">
            <span class="field-label">断言 JSON</span>
            <textarea x-model="skillTestCaseForm.assertions_json" class="input-field min-h-48 font-mono text-xs leading-5"></textarea>
          </label>
          <div class="flex flex-wrap gap-2">
            <button type="submit" class="button-primary" :disabled="busy.skillTestSave">
              <span class="material-symbols-outlined text-[18px]">save</span>
              <span x-text="busy.skillTestSave ? '保存中...' : '保存'"></span>
            </button>
            <button type="button" class="button-danger" :disabled="busy.skillTestSave || !skillTestCase" @click="skillTestCase && deleteSkillTestCase(skillTestCase.id)">
              <span class="material-symbols-outlined text-[18px]">delete</span>
              <span>删除</span>
            </button>
          </div>
        </form>
      </aside>

      <main class="flex min-h-0 flex-col overflow-hidden">
        <section class="flex h-[21rem] shrink-0 flex-col overflow-hidden border-b border-slate-800">
          <div class="shrink-0 border-b border-slate-800 bg-slate-950/40 px-4 py-3">
            <div>
              <p class="text-sm font-semibold text-slate-100">测试数据</p>
              <p class="mono-field" x-text="`${skillTestDataObjects.length} objects`"></p>
            </div>
          </div>
          <div class="grid min-h-0 flex-1 grid-cols-1 divide-y divide-slate-800 overflow-hidden lg:grid-cols-[minmax(0,1fr)_20rem] lg:divide-x lg:divide-y-0">
            <div class="min-h-0 overflow-auto divide-y divide-slate-800">
              <template x-for="dataObject in skillTestDataObjects" :key="dataObject.id">
                <article class="flex items-center justify-between gap-3 px-4 py-3">
                  <label class="flex min-w-0 items-center gap-3">
                    <input type="checkbox" class="h-4 w-4" :checked="isSkillTestDataSelected(dataObject.id)" @change="toggleSkillTestDataSelection(dataObject.id)" />
                    <span class="min-w-0">
                      <span class="block truncate text-sm font-semibold text-slate-100" x-text="dataObject.name"></span>
                      <span class="mono-field block truncate" x-text="`${dataObject.mime_type} · ${dataObject.size_bytes} bytes`"></span>
                    </span>
                  </label>
                  <button type="button" class="icon-button" title="删除测试数据" aria-label="删除测试数据" @click="deleteSkillTestData(dataObject.id)">
                    <span class="material-symbols-outlined text-[18px]">delete</span>
                  </button>
                </article>
              </template>
              <template x-if="skillTestDataObjects.length === 0">
                <div class="empty-state py-12">
                  <span class="material-symbols-outlined text-[30px] text-slate-400">upload_file</span>
                  <p class="mt-3 text-sm text-slate-500">尚未上传测试数据。</p>
                </div>
              </template>
            </div>
            <form class="min-h-0 space-y-3 overflow-auto bg-slate-950/35 p-4" @submit.prevent="uploadSkillTestData()">
              <label class="field-block">
                <span class="field-label">文件</span>
                <input type="file" class="input-field" @change="handleSkillTestFile($event)" />
              </label>
              <label class="field-block">
                <span class="field-label">名称</span>
                <input x-model="skillTestDataForm.name" class="input-field" />
              </label>
              <label class="field-block">
                <span class="field-label">说明</span>
                <textarea x-model="skillTestDataForm.description" class="input-field h-20 resize-none"></textarea>
              </label>
              <button type="submit" class="button-secondary w-full" :disabled="busy.skillTestData">
                <span class="material-symbols-outlined text-[18px]">upload</span>
                <span x-text="busy.skillTestData ? '上传中...' : '上传数据'"></span>
              </button>
            </form>
          </div>
        </section>

        <section class="flex min-h-0 flex-1 flex-col overflow-hidden">
          <div class="flex shrink-0 items-center justify-between gap-3 border-b border-slate-800 bg-slate-950/40 px-4 py-3">
            <div>
              <p class="text-sm font-semibold text-slate-100">运行历史</p>
              <p class="mono-field" x-text="`${skillTestRuns.length} runs · ${openSkillTestRunsCount()} running`"></p>
            </div>
          </div>
          <div class="min-h-0 flex-1 overflow-auto divide-y divide-slate-800">
            <template x-for="testRun in sortedSkillTestRuns()" :key="testRun.id">
              <article class="grid gap-3 px-4 py-3 transition md:grid-cols-[minmax(16rem,1.2fr)_8rem_minmax(13rem,0.9fr)_minmax(13rem,0.9fr)_auto] md:items-center" :class="isOpenSkillTestRun(testRun) ? 'bg-sky-500/5' : 'hover:bg-slate-900/50'">
                <div class="min-w-0 space-y-1">
                  <div class="flex min-w-0 items-center gap-2">
                    <span class="h-2 w-2 shrink-0 rounded-full" :class="isOpenSkillTestRun(testRun) ? 'bg-sky-400' : 'bg-slate-600'"></span>
                    <p class="truncate text-sm font-semibold text-slate-100" :title="testRun.id" x-text="`Test Run ${formatShortId(testRun.id)}`"></p>
                  </div>
                  <p class="mono-field truncate" :title="testRun.run_id || ''" x-text="`Run ${formatShortId(testRun.run_id)}`"></p>
                </div>
                <span class="status-badge w-fit" :class="statusBadgeTone(testRun.status)" x-text="formatStatus(testRun.status)"></span>
                <div class="min-w-0">
                  <p class="mono-field truncate" x-text="`开始 ${formatDateTime(testRun.started_at || testRun.created_at)}`"></p>
                  <p class="mono-field truncate" x-text="skillTestRunActivityLabel(testRun)"></p>
                </div>
                <div class="min-w-0">
                  <p class="mono-field truncate" x-text="formatAssertionSummary(testRun.assertion_summary)"></p>
                  <p class="mono-field truncate" x-text="`${(testRun.selected_data_object_ids || []).length} data selected`"></p>
                </div>
                <button type="button" class="button-secondary justify-self-end" :title="isOpenSkillTestRun(testRun) ? '继续进入运行中的测试' : '打开测试运行现场'" :aria-label="isOpenSkillTestRun(testRun) ? '继续进入运行中的测试' : '打开测试运行现场'" @click="currentSkill && skillTestCase && navigate(`/admin/skills/${currentSkill.id}/tests/${skillTestCase.id}/runs/${testRun.id}/live`)">
                  <span class="material-symbols-outlined text-[18px]" x-text="isOpenSkillTestRun(testRun) ? 'play_arrow' : 'open_in_new'"></span>
                  <span x-text="isOpenSkillTestRun(testRun) ? '继续' : '打开'"></span>
                </button>
              </article>
            </template>
            <template x-if="skillTestRuns.length === 0">
              <div class="empty-state py-12">
                <span class="material-symbols-outlined text-[30px] text-slate-400">history</span>
                <p class="mt-3 text-sm text-slate-500">尚未产生测试运行。</p>
              </div>
            </template>
          </div>
        </section>
      </main>
    </div>
  </section>
</div>
