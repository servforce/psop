<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950/70 px-3 py-2">
      <nav class="breadcrumb-bar border-0 pb-0 text-xs" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link font-medium text-slate-100" @click="navigate(dashboardPath())">Dashboard</button>
      </nav>
    </div>

    <div class="shrink-0 border-b border-slate-800 bg-slate-950/50 px-3 py-2">
      <div class="flex items-end gap-2 overflow-x-auto whitespace-nowrap">
        <label class="field-block w-44 shrink-0">
          <span class="field-label">窗口</span>
          <select x-model="dashboardFilters.window_hours" class="input-field h-9 py-0" @change="loadDashboardMetrics()">
            <template x-for="option in dashboardWindowOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" :disabled="busy.dashboard" @click="loadDashboardMetrics()">
          <span class="material-symbols-outlined text-[18px]">refresh</span>
          <span class="hidden sm:inline">刷新</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="navigate(dashboardAgentRunsPath())">
          <span class="material-symbols-outlined text-[18px]">manage_history</span>
          <span class="hidden sm:inline">Agent Runs</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="navigate(dashboardToolAuthorizationsPath({ status: 'pending' }))">
          <span class="material-symbols-outlined text-[18px]">admin_panel_settings</span>
          <span class="hidden sm:inline">授权</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="navigate(dashboardEvaluationFindingsPath())">
          <span class="material-symbols-outlined text-[18px]">find_in_page</span>
          <span class="hidden sm:inline">Findings</span>
        </button>
        <div class="ml-auto shrink-0 text-right text-[11px] text-slate-500">
          <p>Generated</p>
          <p class="font-mono text-slate-400" x-text="dashboardGeneratedAt()"></p>
        </div>
      </div>
    </div>

    <div class="min-h-0 flex-1 overflow-auto">
      <template x-if="!dashboardMetrics">
        <div class="empty-state h-full min-h-80">
          <span class="material-symbols-outlined text-[32px] text-slate-400">monitoring</span>
          <p class="mt-3 text-base font-medium text-slate-100">暂无 Dashboard 数据</p>
        </div>
      </template>

      <template x-if="dashboardMetrics">
        <div class="space-y-4 p-4">
          <div class="grid grid-cols-1 gap-4 xl:grid-cols-2 2xl:grid-cols-3">
            <section class="rounded-md border border-slate-800 bg-slate-900/40 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">PSkills</p>
                  <p class="mt-1 text-sm font-medium text-slate-100">生命周期概览</p>
                </div>
                <button type="button" class="button-secondary h-8 px-2" @click="navigate(dashboardSkillsPath())">
                  <span class="material-symbols-outlined text-[17px]">handyman</span>
                </button>
              </div>
              <div class="mt-4 grid grid-cols-3 gap-3 text-xs">
                <div>
                  <p class="text-slate-500">Draft</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-slate-100 tabular-nums" x-text="dashboardNumber(dashboardMetrics.pskills.draft_count)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Testing</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-amber-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.pskills.testing_count)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Published</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-emerald-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.pskills.published_count)"></p>
                </div>
              </div>
              <div class="mt-4 flex items-center justify-between gap-3 rounded-md border border-slate-800 bg-slate-950/30 px-3 py-2 text-xs">
                <span class="text-slate-400">Gate Pass Rate</span>
                <span class="font-mono font-semibold tabular-nums" :class="dashboardSuccessTone(dashboardMetrics.pskills.publish_gate_pass_rate)" x-text="dashboardPercent(dashboardMetrics.pskills.publish_gate_pass_rate)"></span>
              </div>
            </section>

            <section class="rounded-md border border-slate-800 bg-slate-900/40 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Runtime</p>
                  <p class="mt-1 text-sm font-medium text-slate-100">Run 运行健康度</p>
                </div>
                <span class="rounded-full border border-sky-500/25 bg-sky-500/10 px-2 py-0.5 text-[11px] text-sky-200" x-text="dashboardMetrics.window_hours + 'h'"></span>
              </div>
              <div class="mt-4 grid grid-cols-2 gap-3 text-xs">
                <div>
                  <p class="text-slate-500">Runs</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-slate-100 tabular-nums" x-text="dashboardNumber(dashboardMetrics.runtime.recent_run_count)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Success</p>
                  <p class="mt-1 font-mono text-2xl font-semibold tabular-nums" :class="dashboardSuccessTone(dashboardMetrics.runtime.success_rate)" x-text="dashboardPercent(dashboardMetrics.runtime.success_rate)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Aborted</p>
                  <p class="mt-1 font-mono text-lg font-semibold text-rose-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.runtime.aborted_count)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Avg Duration</p>
                  <p class="mt-1 font-mono text-lg font-semibold text-slate-100 tabular-nums" x-text="dashboardDuration(dashboardMetrics.runtime.average_duration_ms)"></p>
                </div>
              </div>
            </section>

            <section class="rounded-md border border-slate-800 bg-slate-900/40 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Evaluation</p>
                  <p class="mt-1 text-sm font-medium text-slate-100">质量与 Findings</p>
                </div>
                <button type="button" class="button-secondary h-8 px-2" @click="navigate(dashboardEvaluationReportsPath())">
                  <span class="material-symbols-outlined text-[17px]">rule_settings</span>
                </button>
              </div>
              <div class="mt-4 grid grid-cols-3 gap-3 text-xs">
                <div>
                  <p class="text-slate-500">Avg Score</p>
                  <p class="mt-1 font-mono text-2xl font-semibold tabular-nums" :class="dashboardScoreTone(dashboardMetrics.evaluations.average_quality_score)" x-text="dashboardNumber(dashboardMetrics.evaluations.average_quality_score)"></p>
                </div>
                <div>
                  <p class="text-slate-500">High</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-rose-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.evaluations.high_severity_finding_count)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Unresolved</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-amber-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.evaluations.unresolved_finding_count)"></p>
                </div>
              </div>
              <div class="mt-4 flex items-center justify-between gap-3 rounded-md border border-slate-800 bg-slate-950/30 px-3 py-2 text-xs">
                <span class="text-slate-400">Reports</span>
                <span class="font-mono text-slate-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.evaluations.recent_evaluation_count)"></span>
              </div>
            </section>

            <section class="rounded-md border border-slate-800 bg-slate-900/40 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Governance</p>
                  <p class="mt-1 text-sm font-medium text-slate-100">提案与实验状态</p>
                </div>
                <button type="button" class="button-secondary h-8 px-2" @click="navigate(dashboardGovernanceProposalsPath())">
                  <span class="material-symbols-outlined text-[17px]">account_tree</span>
                </button>
              </div>
              <div class="mt-4 grid grid-cols-4 gap-3 text-xs">
                <div>
                  <p class="text-slate-500">Open</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-slate-100 tabular-nums" x-text="dashboardNumber(dashboardMetrics.governance.open_proposal_count)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Testing</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-sky-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.governance.testing_proposal_count)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Canary</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-amber-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.governance.canary_proposal_count)"></p>
                </div>
                <div>
                  <p class="text-slate-500">Rollback</p>
                  <p class="mt-1 font-mono text-2xl font-semibold text-rose-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.governance.rollback_proposal_count)"></p>
                </div>
              </div>
            </section>

            <section class="rounded-md border border-slate-800 bg-slate-900/40 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Observability</p>
                  <p class="mt-1 text-sm font-medium text-slate-100">Trace / OTel / Gateway</p>
                </div>
                <span class="rounded-full border px-2 py-0.5 text-[11px]" :class="dashboardOtelTone(dashboardMetrics.observability.otel_enabled)" x-text="dashboardMetrics.observability.otel_enabled ? 'OTel on' : 'OTel off'"></span>
              </div>
              <div class="mt-4 grid grid-cols-2 gap-x-4 gap-y-3 text-xs">
                <div class="flex items-center justify-between gap-3">
                  <span class="text-slate-500">RunTrace</span>
                  <span class="font-mono text-slate-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.observability.run_trace_count)"></span>
                </div>
                <div class="flex items-center justify-between gap-3">
                  <span class="text-slate-500">AgentEvent</span>
                  <span class="font-mono text-slate-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.observability.agent_event_count)"></span>
                </div>
                <div class="flex items-center justify-between gap-3">
                  <span class="text-slate-500">ModelCall</span>
                  <span class="font-mono text-slate-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.observability.model_call_count)"></span>
                </div>
                <div class="flex items-center justify-between gap-3">
                  <span class="text-slate-500">ToolCall</span>
                  <span class="font-mono text-slate-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.observability.tool_call_count)"></span>
                </div>
              </div>
              <button type="button" class="mt-4 flex min-w-0 items-center justify-between gap-3 rounded-md border border-slate-800 bg-slate-950/30 px-3 py-2 text-left text-xs transition hover:bg-slate-900/70" @click="navigate(dashboardToolAuthorizationsPath({ status: 'pending' }))">
                <span class="text-slate-400">Pending Auth</span>
                <span class="font-mono text-amber-200 tabular-nums" x-text="dashboardNumber(dashboardMetrics.observability.pending_tool_authorization_count)"></span>
              </button>
              <p class="mt-3 truncate font-mono text-[11px] text-slate-500" x-text="dashboardMetrics.observability.otel_service_name || 'N/A'"></p>
            </section>
          </div>

          <section class="rounded-md border border-slate-800 bg-slate-900/40">
            <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-800 px-4 py-3">
              <div>
                <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Agent Overview</p>
                <p class="mt-1 text-sm text-slate-300">六智能体最近运行次数、成功率、平均耗时与工具失败率。</p>
              </div>
              <button type="button" class="button-secondary h-9 px-3" @click="navigate(dashboardAgentRunsPath())">
                <span class="material-symbols-outlined text-[18px]">manage_history</span>
                <span>Agent Runs</span>
              </button>
            </div>

            <div class="overflow-x-auto">
              <table class="min-w-full divide-y divide-slate-800 text-left text-xs">
                <thead class="bg-slate-950/40 text-slate-500">
                  <tr>
                    <th class="px-4 py-3 font-medium">Agent</th>
                    <th class="px-4 py-3 font-medium">Runs</th>
                    <th class="px-4 py-3 font-medium">Success</th>
                    <th class="px-4 py-3 font-medium">Waiting Auth</th>
                    <th class="px-4 py-3 font-medium">Avg Duration</th>
                    <th class="px-4 py-3 font-medium">Tool Failure</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-800">
                  <template x-for="agent in dashboardAgentRows()" :key="agent.agent_key">
                    <tr class="hover:bg-slate-900/50">
                      <td class="px-4 py-3">
                        <button type="button" class="block max-w-full text-left" @click="navigate(dashboardAgentRunsForAgentPath(agent.agent_key))">
                          <span class="block font-medium text-slate-100" x-text="dashboardAgentLabel(agent.agent_key)"></span>
                          <span class="mt-1 block truncate font-mono text-[11px] text-slate-500" x-text="agent.agent_key"></span>
                        </button>
                      </td>
                      <td class="px-4 py-3">
                        <button type="button" class="font-mono text-slate-200 tabular-nums transition hover:text-orange-200" @click="navigate(dashboardAgentRunsForAgentPath(agent.agent_key))" x-text="dashboardNumber(agent.recent_run_count)"></button>
                      </td>
                      <td class="px-4 py-3 font-mono font-semibold tabular-nums" :class="dashboardSuccessTone(agent.success_rate)" x-text="dashboardPercent(agent.success_rate)"></td>
                      <td class="px-4 py-3">
                        <button type="button" class="font-mono text-amber-200 tabular-nums transition hover:text-orange-200" @click="navigate(dashboardWaitingAuthorizationsForAgentPath(agent.agent_key))" x-text="dashboardNumber(agent.waiting_tool_authorization_count)"></button>
                      </td>
                      <td class="px-4 py-3 font-mono text-slate-300 tabular-nums" x-text="dashboardDuration(agent.average_duration_ms)"></td>
                      <td class="px-4 py-3">
                        <p class="font-mono font-semibold tabular-nums" :class="dashboardFailureTone(agent.tool_failure_rate)" x-text="dashboardPercent(agent.tool_failure_rate)"></p>
                        <p class="mt-1 font-mono text-[11px] text-slate-500">
                          <span x-text="dashboardNumber(agent.failed_tool_call_count)"></span>
                          <span>/</span>
                          <span x-text="dashboardNumber(agent.tool_call_count)"></span>
                        </p>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </template>
    </div>
  </section>
</div>
