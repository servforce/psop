<template x-if="createModalOpen">
  <div class="fixed inset-0 z-50 flex justify-end bg-slate-950/35 backdrop-blur-[2px]" @click.self="closeCreateModal()" @keydown.escape.window="closeCreateModal()">
    <section class="flex h-full w-full max-w-xl flex-col overflow-hidden border-l border-slate-200 bg-white shadow-[0_24px_80px_rgba(15,23,42,0.24)]" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full opacity-80" x-transition:enter-end="translate-x-0 opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="translate-x-0 opacity-100" x-transition:leave-end="translate-x-full opacity-80">
      <div class="flex items-start justify-between gap-4 border-b border-slate-200 bg-slate-50/80 px-6 py-5">
        <div>
          <p class="panel-kicker">新建</p>
          <h2 class="mt-1 text-xl font-semibold text-slate-950">新建 Skill</h2>
          <p class="mt-2 text-sm leading-6 text-slate-500">创建后会自动初始化 GitLab 仓库，并跳转到 Skill 详情页继续维护源码。</p>
        </div>
        <button type="button" class="icon-button" title="关闭" @click="closeCreateModal()">
          <span class="material-symbols-outlined text-[18px]">close</span>
        </button>
      </div>

      <form class="flex min-h-0 flex-1 flex-col" @submit.prevent="createSkill()">
        <div class="min-h-0 flex-1 space-y-5 overflow-auto px-6 py-6">
          <label class="field-block">
            <span class="field-label">Skill 名称</span>
            <input x-model="createForm.name" class="input-field" placeholder="例如：设备诊断助手" required />
            <span class="mt-2 block text-xs leading-5 text-slate-500">系统会根据名称自动生成稳定的 Skill key。</span>
          </label>
          <label class="field-block">
            <span class="field-label">描述</span>
            <textarea x-model="createForm.description" class="textarea-field h-36" placeholder="描述这个 Skill 要完成的事情。"></textarea>
          </label>
        </div>
        <div class="flex justify-end gap-3 border-t border-slate-200 bg-white px-6 py-4">
          <button type="button" class="button-secondary" title="取消" aria-label="取消" @click="closeCreateModal()">
            <span class="material-symbols-outlined text-[18px]">close</span>
            <span>取消</span>
          </button>
          <button type="submit" class="button-primary" title="创建 Skill" aria-label="创建 Skill" :disabled="busy.create">
            <span class="material-symbols-outlined text-[18px]">add_circle</span>
            <span x-text="busy.create ? '创建中...' : '创建 Skill'"></span>
          </button>
        </div>
      </form>
    </section>
  </div>
</template>
