<template x-if="createModalOpen">
  <div class="fixed inset-0 z-40 flex items-center justify-center bg-slate-950/30 px-4 py-6 backdrop-blur-sm" @click.self="closeCreateModal()" @keydown.escape.window="closeCreateModal()">
    <section class="modal-panel">
      <div class="flex items-start justify-between gap-4 border-b border-slate-200 px-5 py-4">
        <div>
          <p class="panel-kicker">新建</p>
          <h2 class="mt-1 text-xl font-semibold text-slate-950">新建 Skill</h2>
        </div>
        <button type="button" class="icon-button" title="关闭" @click="closeCreateModal()">
          <span class="material-symbols-outlined text-[18px]">close</span>
        </button>
      </div>

      <form class="space-y-4 px-5 py-5" @submit.prevent="createSkill()">
        <label class="field-block">
          <span class="field-label">Skill 名称</span>
          <input x-model="createForm.name" class="input-field" placeholder="Equipment Diagnosis" required />
        </label>
        <label class="field-block">
          <span class="field-label">描述</span>
          <textarea x-model="createForm.description" class="textarea-field h-28" placeholder="描述这个 Skill 要完成的事情。"></textarea>
        </label>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" class="button-secondary" @click="closeCreateModal()">取消</button>
          <button type="submit" class="button-primary" :disabled="busy.create">
            <span class="material-symbols-outlined text-[18px]">add_circle</span>
            <span x-text="busy.create ? '创建中...' : '创建 Skill'"></span>
          </button>
        </div>
      </form>
    </section>
  </div>
</template>
