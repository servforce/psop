<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950/70 px-3 py-2">
      <nav class="breadcrumb-bar border-0 pb-0 text-xs" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-100" @click="navigate(platformSkillsPath())">Skill Packages</button>
      </nav>
    </div>

    <div class="shrink-0 border-b border-slate-800 bg-slate-950/50 px-3 py-2">
      <div class="flex items-end gap-2 overflow-x-auto whitespace-nowrap">
        <label class="field-block w-40 shrink-0">
          <span class="field-label">Scope</span>
          <select x-model="skillPackageFilters.scope" class="input-field h-9 py-0" @change="applySkillPackageFilters()">
            <option value="">全部</option>
            <template x-for="option in skillPackageScopeOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <label class="field-block w-40 shrink-0">
          <span class="field-label">状态</span>
          <select x-model="skillPackageFilters.status" class="input-field h-9 py-0" @change="applySkillPackageFilters()">
            <option value="">全部</option>
            <template x-for="option in skillPackageStatusOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" :disabled="busy.skillPackages || busy.skillPackageDetail" @click="loadPlatformSkillsPage()">
          <span class="material-symbols-outlined text-[18px]">refresh</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="resetSkillPackageFilters()">
          <span class="material-symbols-outlined text-[18px]">filter_alt_off</span>
        </button>
        <button type="button" class="button-primary h-9 shrink-0 px-3" :disabled="busy.skillPackageAction" @click="syncSkillPackages()">
          <span class="material-symbols-outlined text-[18px]">sync</span>
          <span>同步</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="navigate(platformAgentRunsPath())">
          <span class="material-symbols-outlined text-[18px]">manage_history</span>
          <span>Agent Runs</span>
        </button>
      </div>
    </div>

    <template x-if="skillPackageSyncResult">
      <div class="shrink-0 border-b border-slate-800 bg-slate-950/20 px-3 py-2 text-xs text-slate-300">
        <span class="font-mono" x-text="'scanned=' + skillPackageSyncResult.scanned_count"></span>
        <span class="ml-3 font-mono" x-text="'packages=' + skillPackageSyncResult.package_count"></span>
        <span class="ml-3 font-mono" x-text="'versions=' + skillPackageSyncResult.version_count"></span>
        <span class="ml-3" x-text="skillPackageSyncResult.changed ? '已发现变更' : '无文件系统变更'"></span>
      </div>
    </template>

    <div class="grid min-h-0 flex-1 grid-cols-1 divide-y divide-slate-800 lg:grid-cols-[minmax(24rem,0.85fr)_minmax(0,1.25fr)] lg:divide-x lg:divide-y-0">
      <section class="min-h-0 overflow-auto">
        <template x-if="skillPackages.length === 0">
          <div class="empty-state h-full min-h-80">
            <span class="material-symbols-outlined text-[32px] text-slate-400">extension</span>
            <p class="mt-3 text-base font-medium text-slate-100">暂无 Skill package</p>
          </div>
        </template>
        <template x-if="skillPackages.length > 0">
          <div class="divide-y divide-slate-800">
            <template x-for="skillPackage in skillPackages" :key="skillPackage.name">
              <article class="bg-slate-950/20 p-4 transition hover:bg-slate-900/50" :class="currentSkillPackage?.name === skillPackage.name ? 'bg-orange-500/10' : ''">
                <button type="button" class="block w-full min-w-0 text-left" @click="navigate(platformSkillPath(skillPackage.name))">
                  <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                      <p class="truncate font-mono text-sm font-semibold text-slate-100" x-text="skillPackage.name"></p>
                      <p class="mt-1 truncate text-xs text-slate-400" x-text="skillPackage.description || skillPackage.source_uri"></p>
                    </div>
                    <span class="status-badge shrink-0" :class="statusBadgeTone(skillPackage.status)" x-text="skillPackageStatusLabel(skillPackage.status)"></span>
                  </div>
                  <div class="mt-3 flex flex-wrap items-center gap-2">
                    <span class="rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 text-[11px] text-slate-300" x-text="skillPackageScopeLabel(skillPackage.scope)"></span>
                    <span class="rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 text-[11px] text-slate-300" x-text="skillPackage.version_count + ' versions'"></span>
                    <span class="truncate rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 font-mono text-[11px] text-slate-300" x-text="skillPackage.active_version_label || 'no active version'"></span>
                  </div>
                </button>
              </article>
            </template>
          </div>
        </template>
      </section>

      <section class="min-h-0 overflow-auto">
        <template x-if="!currentSkillPackage">
          <div class="empty-state h-full min-h-80">
            <span class="material-symbols-outlined text-[32px] text-slate-400">extension</span>
            <p class="mt-3 text-base font-medium text-slate-100">选择一个 Skill package</p>
          </div>
        </template>

        <template x-if="currentSkillPackage">
          <div class="divide-y divide-slate-800">
            <header class="p-4">
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div class="min-w-0">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Skill Package</p>
                  <p class="mt-1 break-words font-mono text-base font-semibold text-slate-100" x-text="currentSkillPackage.name"></p>
                  <p class="mt-2 text-sm leading-6 text-slate-300" x-text="currentSkillPackage.description || 'N/A'"></p>
                </div>
                <div class="flex flex-wrap justify-end gap-2">
                  <span class="status-badge" :class="statusBadgeTone(currentSkillPackage.status)" x-text="skillPackageStatusLabel(currentSkillPackage.status)"></span>
                  <span class="status-badge border-slate-700 bg-slate-950/40 text-slate-300" x-text="skillPackageScopeLabel(currentSkillPackage.scope)"></span>
                </div>
              </div>
              <div class="mt-4 flex flex-wrap gap-2">
                <button type="button" class="button-secondary h-9 px-3" :disabled="busy.skillPackageDetail" @click="loadSkillPackageDetail(currentSkillPackage.name)">
                  <span class="material-symbols-outlined text-[18px]">refresh</span>
                </button>
                <button type="button" class="button-secondary h-9 px-3" @click="copyText(currentSkillPackage.name, `skill-package-${currentSkillPackage.name}`)">
                  <span class="material-symbols-outlined text-[18px]" x-text="copyIcon(`skill-package-${currentSkillPackage.name}`)"></span>
                  <span>复制</span>
                </button>
              </div>
            </header>

            <div class="grid grid-cols-2 divide-x divide-slate-800 text-xs lg:grid-cols-5">
              <div class="p-4">
                <p class="text-slate-500">Active</p>
                <p class="mt-1 truncate font-mono text-slate-300" x-text="currentSkillPackage.active_version_label || 'N/A'"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Versions</p>
                <p class="mt-1 font-mono text-slate-300" x-text="currentSkillPackage.version_count"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">References</p>
                <p class="mt-1 font-mono text-slate-300" x-text="skillPackageResourceCountByKind(currentSkillPackage, 'references')"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Scripts</p>
                <p class="mt-1 font-mono text-slate-300" x-text="skillPackageResourceCountByKind(currentSkillPackage, 'scripts')"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Agents</p>
                <p class="mt-1 font-mono text-slate-300" x-text="skillPackageUsedByAgents(currentSkillPackage).length"></p>
              </div>
            </div>

            <div class="grid grid-cols-1 divide-y divide-slate-800 xl:grid-cols-[minmax(0,0.9fr)_minmax(0,1.1fr)] xl:divide-x xl:divide-y-0">
              <section class="min-w-0 divide-y divide-slate-800">
                <div class="p-4">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Used By Agents</p>
                  <template x-if="skillPackageUsedByAgents(currentSkillPackage).length === 0">
                    <p class="mt-3 text-sm text-slate-400">暂无 Agent 引用</p>
                  </template>
                  <template x-if="skillPackageUsedByAgents(currentSkillPackage).length > 0">
                    <div class="mt-3 flex flex-wrap gap-2">
                      <template x-for="agent in skillPackageUsedByAgents(currentSkillPackage)" :key="agent.key">
                        <span class="rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 font-mono text-[11px] text-slate-300" x-text="agent.key"></span>
                      </template>
                    </div>
                  </template>
                </div>

                <div class="p-4">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Allowed Tools</p>
                  <template x-if="!(currentSkillPackage.active_version?.allowed_tools || []).length">
                    <p class="mt-3 text-sm text-slate-400">未声明 allowed-tools</p>
                  </template>
                  <template x-if="(currentSkillPackage.active_version?.allowed_tools || []).length > 0">
                    <div class="mt-3 flex flex-wrap gap-2">
                      <template x-for="toolName in currentSkillPackage.active_version.allowed_tools" :key="toolName">
                        <button type="button" class="rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 font-mono text-[11px] text-slate-300 transition hover:bg-slate-900/70" @click="navigate(platformToolPath(toolName))" x-text="toolName"></button>
                      </template>
                    </div>
                  </template>
                </div>

                <div class="p-4">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Active Manifest</p>
                  <pre class="mt-3 max-h-72 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(currentSkillPackage.active_version?.manifest_json)"></pre>
                </div>
              </section>

              <section class="min-w-0 divide-y divide-slate-800">
                <div class="p-4">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Resources</p>
                  <template x-if="(currentSkillPackage.resources || []).length === 0">
                    <p class="mt-3 text-sm text-slate-400">暂无资源索引</p>
                  </template>
                  <template x-if="(currentSkillPackage.resources || []).length > 0">
                    <div class="mt-3 divide-y divide-slate-800 rounded-md border border-slate-800">
                      <template x-for="resource in currentSkillPackage.resources" :key="resource.id">
                        <div class="grid gap-2 p-3 text-xs sm:grid-cols-[minmax(0,1fr)_7rem_6rem]">
                          <p class="min-w-0 truncate font-mono text-slate-300" x-text="resource.resource_path"></p>
                          <span class="status-badge justify-center border-slate-700 bg-slate-950/40 text-slate-300" x-text="resource.resource_kind"></span>
                          <span class="font-mono text-slate-500" x-text="formatBytes(resource.size_bytes)"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </section>
            </div>

            <div class="p-4">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Versions</p>
              <div class="mt-3 divide-y divide-slate-800 rounded-md border border-slate-800">
                <template x-for="version in currentSkillPackage.versions || []" :key="version.id">
                  <article class="grid gap-0 divide-y divide-slate-800 xl:grid-cols-[minmax(16rem,0.5fr)_minmax(0,1fr)] xl:divide-x xl:divide-y-0">
                    <div class="p-4 text-xs">
                      <div class="flex flex-wrap gap-2">
                        <span class="status-badge" :class="statusBadgeTone(version.status)" x-text="formatStatus(version.status)"></span>
                        <span class="status-badge" :class="skillPackageValidationTone(version.validation_status)" x-text="version.validation_status"></span>
                        <span class="status-badge border-orange-500/30 bg-orange-500/10 text-orange-200" x-show="currentSkillPackage.active_version_id === version.id">active</span>
                      </div>
                      <p class="mt-3 truncate font-semibold text-slate-100" x-text="version.version_label"></p>
                      <p class="mt-1 truncate font-mono text-[11px] text-slate-500" x-text="version.content_hash"></p>
                      <dl class="mt-4 space-y-2">
                        <div class="flex justify-between gap-3">
                          <dt class="text-slate-500">Resources</dt>
                          <dd class="font-mono text-slate-300" x-text="version.resource_count"></dd>
                        </div>
                        <div class="flex justify-between gap-3">
                          <dt class="text-slate-500">Activated</dt>
                          <dd class="font-mono text-slate-300" x-text="formatDateTime(version.activated_at)"></dd>
                        </div>
                      </dl>
                      <div class="mt-4 flex flex-wrap gap-2">
                        <button type="button" class="button-secondary h-8 px-3" :disabled="busy.skillPackageAction" @click="validateSkillPackageVersion(version)">
                          <span class="material-symbols-outlined text-[17px]">fact_check</span>
                          <span>校验</span>
                        </button>
                        <button type="button" class="button-primary h-8 px-3" :disabled="busy.skillPackageAction || currentSkillPackage.active_version_id === version.id || version.validation_status === 'invalid'" @click="activateSkillPackageVersion(version)">
                          <span class="material-symbols-outlined text-[17px]">rocket_launch</span>
                          <span>激活</span>
                        </button>
                      </div>
                    </div>
                    <div class="min-w-0 divide-y divide-slate-800">
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Frontmatter</p>
                        <dl class="mt-3 grid gap-3 text-xs sm:grid-cols-2">
                          <div>
                            <dt class="text-slate-500">Name</dt>
                            <dd class="mt-1 truncate font-mono text-slate-300" x-text="skillPackageManifestLabel(version, 'name')"></dd>
                          </div>
                          <div>
                            <dt class="text-slate-500">Description</dt>
                            <dd class="mt-1 truncate text-slate-300" x-text="skillPackageManifestLabel(version, 'description')"></dd>
                          </div>
                        </dl>
                      </div>
                      <div class="p-4">
                        <div class="flex items-center justify-between gap-3">
                          <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Diagnostics</p>
                          <span class="font-mono text-[11px] text-slate-500" x-text="skillPackageDiagnostics(version).length"></span>
                        </div>
                        <template x-if="skillPackageDiagnostics(version).length === 0">
                          <p class="mt-3 text-sm text-slate-400">暂无 diagnostics</p>
                        </template>
                        <template x-if="skillPackageDiagnostics(version).length > 0">
                          <div class="mt-3 divide-y divide-slate-800 rounded-md border border-slate-800">
                            <template x-for="diagnostic in skillPackageDiagnostics(version)" :key="diagnostic.code + diagnostic.message">
                              <div class="grid gap-2 p-3 text-xs sm:grid-cols-[6rem_minmax(0,1fr)]">
                                <span class="status-badge justify-center" :class="diagnostic.severity === 'error' ? 'border-rose-500/25 bg-rose-500/10 text-rose-200' : 'border-amber-500/25 bg-amber-500/10 text-amber-200'" x-text="diagnostic.severity"></span>
                                <div class="min-w-0">
                                  <p class="truncate font-mono text-slate-300" x-text="diagnostic.code"></p>
                                  <p class="mt-1 text-slate-400" x-text="diagnostic.message"></p>
                                </div>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </div>
                  </article>
                </template>
              </div>
            </div>
          </div>
        </template>
      </section>
    </div>
  </section>
</div>
