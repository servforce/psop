<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-200 bg-white px-4 py-3">
      <nav class="breadcrumb-bar border-0 pb-0" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-950" @click="navigate('/admin/replay')">运行记录</button>
      </nav>
    </div>

    <div class="min-h-0 flex-1 overflow-auto divide-y divide-slate-200">
      <template x-if="replayRuns.length === 0">
        <div class="empty-state h-full min-h-80">
          <span class="material-symbols-outlined text-[32px] text-slate-400">history</span>
          <p class="mt-3 text-base font-medium text-slate-950">暂无运行记录</p>
        </div>
      </template>

      <template x-for="run in replayRuns" :key="run.id">
        <article
          class="flex cursor-pointer flex-col gap-3 bg-white px-5 py-4 transition hover:bg-slate-900/60 lg:flex-row lg:items-center lg:justify-between"
          role="button"
          tabindex="0"
          aria-label="查看运行详情"
          @click="navigate(runReplayPath(run.id))"
          @keydown.enter.prevent="navigate(runReplayPath(run.id))"
          @keydown.space.prevent="navigate(runReplayPath(run.id))"
        >
          <div class="min-w-0">
            <p class="font-semibold text-slate-950">Run <span class="mono-field" x-text="formatShortId(run.id)"></span></p>
            <p class="mt-1 mono-field truncate" x-text="run.final_output || run.exit_reason || 'N/A'"></p>
          </div>
          <div class="flex items-center gap-3">
            <span class="status-badge" :class="statusBadgeTone(run.status)" x-text="formatStatus(run.status)"></span>
          </div>
        </article>
      </template>
    </div>
  </section>
</div>
