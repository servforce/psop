<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-200 bg-white px-4 py-3">
      <nav class="breadcrumb-bar border-0 pb-0" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-950" @click="navigate('/admin/skills')">Skills</button>
      </nav>
      <div class="mt-3 flex items-center justify-between gap-3">
        <h1 class="truncate text-2xl font-semibold text-slate-950">Skills</h1>
        <button type="button" class="button-primary shrink-0" @click="openCreateModal()">
          <span class="material-symbols-outlined text-[18px]">add</span>
          <span class="hidden sm:inline">新建 Skill</span>
        </button>
      </div>
    </div>

    <div class="shrink-0 border-b border-slate-200 bg-slate-50/80 px-4 py-3">
      <div class="flex items-end gap-2 overflow-x-auto whitespace-nowrap">
        <label class="field-block min-w-56 flex-1">
          <span class="field-label">名称</span>
          <input
            x-model="filters.search"
            class="input-field h-11"
            placeholder="按名称模糊搜索"
            @input.debounce.300ms="loadSkills()"
          />
        </label>
        <label class="field-block w-36 shrink-0">
          <span class="field-label">状态</span>
          <select x-model="filters.status" class="input-field h-11" @change="loadSkills()">
            <option value="">全部</option>
            <option value="active">启用</option>
            <option value="archived">已归档</option>
          </select>
        </label>
        <label class="field-block shrink-0">
          <span class="field-label">创建时间</span>
          <span class="flex items-center gap-2">
            <input x-model="filters.created_from" type="date" class="input-field h-11 w-40" @change="loadSkills()" />
            <span class="text-xs text-slate-400">至</span>
            <input x-model="filters.created_to" type="date" class="input-field h-11 w-40" @change="loadSkills()" />
          </span>
        </label>
        <label class="field-block shrink-0">
          <span class="field-label">发布时间</span>
          <span class="flex items-center gap-2">
            <input x-model="filters.published_from" type="date" class="input-field h-11 w-40" @change="loadSkills()" />
            <span class="text-xs text-slate-400">至</span>
            <input x-model="filters.published_to" type="date" class="input-field h-11 w-40" @change="loadSkills()" />
          </span>
        </label>
        <button
          type="button"
          class="mb-0.5 shrink-0 rounded-lg px-3 py-2 text-sm font-medium text-slate-500 transition hover:bg-white hover:text-sky-700"
          x-show="hasActiveFilters()"
          @click="clearFilters()"
        >
          清空条件
        </button>
      </div>
    </div>

    <div class="skill-table-header shrink-0">
      <span>名称</span>
      <span>状态</span>
      <span>创建时间</span>
      <span>发布时间</span>
      <span>操作</span>
    </div>

    <div class="min-h-0 flex-1 overflow-auto">
      <template x-if="filteredSkills().length === 0">
        <div class="empty-state h-full min-h-80">
          <span class="material-symbols-outlined text-[32px] text-slate-400">inventory_2</span>
          <p class="mt-3 text-base font-medium text-slate-950">没有匹配的 Skill</p>
          <p class="mt-2 text-sm text-slate-500">调整搜索条件，或创建一个新的 Skill。</p>
        </div>
      </template>

      <template x-if="filteredSkills().length > 0">
        <div class="divide-y divide-slate-200">
          <template x-for="skill in filteredSkills()" :key="skill.id">
            <article class="skill-table-row">
              <div class="min-w-0">
                <button type="button" class="truncate text-left text-base font-semibold text-slate-950 hover:text-sky-700" @click="openSkill(skill.id)" x-text="skill.name"></button>
              </div>
              <div><span class="status-badge" x-text="formatStatus(skill.status)"></span></div>
              <div class="mono-field whitespace-nowrap" x-text="formatDateTime(skill.created_at)"></div>
              <div class="mono-field whitespace-nowrap" x-text="formatDateTime(skill.latest_published_at)"></div>
              <div class="flex justify-start gap-2">
                <button type="button" class="icon-button" title="打开" @click="openSkill(skill.id)">
                  <span class="material-symbols-outlined text-[18px]">open_in_new</span>
                </button>
                <button type="button" class="icon-button-danger" title="删除 Skill" @click="openDeleteModal(skill)">
                  <span class="material-symbols-outlined text-[18px]">delete</span>
                </button>
              </div>
            </article>
          </template>
        </div>
      </template>
    </div>
  </section>
</div>
