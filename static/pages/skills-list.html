<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-200 bg-white px-4 py-3">
      <nav class="breadcrumb-bar border-0 pb-0" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-950" @click="navigate('/admin/skills')">Skills</button>
      </nav>
    </div>

    <div class="shrink-0 border-b border-slate-200 bg-slate-50/80 px-4 py-2">
      <div class="flex items-center gap-3 overflow-x-auto whitespace-nowrap">
        <label class="min-w-64 flex-1">
          <input
            x-model="filters.search"
            class="input-field h-10 py-0"
            placeholder="按名称模糊搜索"
            aria-label="按名称模糊搜索"
            @input.debounce.300ms="loadSkills()"
          />
        </label>
        <div class="flex shrink-0 items-center gap-2">
          <input x-model="filters.created_from" type="date" class="input-field h-10 w-40 py-0" aria-label="创建开始时间" @change="loadSkills()" />
          <span class="text-xs text-slate-400">至</span>
          <input x-model="filters.created_to" type="date" class="input-field h-10 w-40 py-0" aria-label="创建结束时间" @change="loadSkills()" />
        </div>
        <button type="button" class="button-primary h-10 w-10 shrink-0 px-0" title="新建 Skill" aria-label="新建 Skill" data-tooltip="新建 Skill" @click="openCreateModal()">
          <span class="material-symbols-outlined text-[18px]">add</span>
        </button>
      </div>
    </div>

    <div class="skill-table-header shrink-0">
      <span>名称</span>
      <span>状态</span>
      <span>创建时间</span>
      <span>发布时间</span>
      <span class="text-right">操作</span>
    </div>

    <div class="min-h-0 flex-1 overflow-auto">
      <template x-if="filteredSkills().length === 0">
        <div class="empty-state h-full min-h-80">
          <span class="material-symbols-outlined text-[32px] text-slate-400">inventory_2</span>
          <p class="mt-3 text-base font-medium text-slate-950">没有匹配的 Skill</p>
          <p class="mt-2 text-sm text-slate-500">调整搜索条件，或创建一个新的 Skill。</p>
        </div>
      </template>

      <template x-if="filteredSkills().length > 0">
        <div class="divide-y divide-slate-200">
          <template x-for="skill in filteredSkills()" :key="skill.id">
            <article
              class="skill-table-row cursor-pointer transition hover:bg-slate-900/60"
              role="button"
              tabindex="0"
              @click="openSkill(skill.id)"
              @keydown.enter.prevent="openSkill(skill.id)"
              @keydown.space.prevent="openSkill(skill.id)"
            >
              <div class="min-w-0">
                <span class="block truncate text-left text-sm font-semibold leading-5 text-slate-100" x-text="skill.name"></span>
              </div>
              <div><span class="status-badge" :class="statusBadgeTone(skill.status)" x-text="formatStatus(skill.status)"></span></div>
              <div class="mono-field whitespace-nowrap" x-text="formatDateTime(skill.created_at)"></div>
              <div class="mono-field whitespace-nowrap" x-text="formatDateTime(skill.latest_published_at)"></div>
              <div class="flex justify-end gap-2">
                <button
                  type="button"
                  class="icon-button-danger"
                  title="删除 Skill"
                  aria-label="删除 Skill"
                  @click.stop="openDeleteModal(skill)"
                  @keydown.enter.stop
                  @keydown.space.stop
                >
                  <span class="material-symbols-outlined text-[18px]">delete</span>
                </button>
              </div>
            </article>
          </template>
        </div>
      </template>
    </div>
  </section>
</div>
