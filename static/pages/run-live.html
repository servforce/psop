<template x-if="liveRun">
<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950/70 px-3 py-2">
      <div class="flex min-w-0 items-center">
        <nav class="breadcrumb-bar h-7 min-h-0 min-w-0 flex-1 flex-nowrap gap-1.5 overflow-hidden border-0 p-0 text-xs" aria-label="Breadcrumb">
          <template x-if="['skill-run-live', 'skill-debug-live'].includes(route.name) && currentSkill">
            <span class="inline-flex min-w-0 max-w-full flex-nowrap items-center gap-1.5">
              <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">Skills</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <button type="button" class="breadcrumb-link min-w-0 truncate" @click="openCurrentSkillRuntime()" x-text="currentSkill.name"></button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <button type="button" class="breadcrumb-link" @click="openCurrentSkillRuntime()">运行</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <span class="truncate font-semibold text-slate-100">运行详情</span>
            </span>
          </template>
          <template x-if="!['skill-run-live', 'skill-debug-live'].includes(route.name) || !currentSkill">
            <span class="inline-flex min-w-0 max-w-full flex-nowrap items-center gap-1.5">
              <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <button type="button" class="breadcrumb-link" @click="navigate('/admin/invocations')">运行</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <span class="truncate font-semibold text-slate-100">运行详情</span>
            </span>
          </template>
        </nav>
      </div>
    </div>

    <div class="min-h-0 flex-1 overflow-hidden">
      <div class="grid h-full min-h-0 min-w-0 xl:grid-cols-[22rem_minmax(0,1fr)]">
        <aside class="min-h-0 min-w-0 overflow-auto border-b border-slate-200 bg-slate-50 p-5 xl:border-b-0 xl:border-r">
          <dl class="space-y-4 text-sm">
            <div>
              <dt class="field-label">Run ID</dt>
              <dd class="mt-1 mono-field break-all" x-text="liveRun.id"></dd>
            </div>
            <div>
              <dt class="field-label">状态</dt>
              <dd class="mt-1 font-medium text-slate-950" x-text="formatStatus(liveRun.status)"></dd>
            </div>
            <div>
              <dt class="field-label">阶段</dt>
              <dd class="mt-1 mono-field" x-text="liveRun.runtime_phase"></dd>
            </div>
            <div>
              <dt class="field-label">当前现实步骤</dt>
              <dd class="mt-1 text-sm font-medium text-slate-950" x-text="liveRun.current_step || '准备任务上下文'"></dd>
            </div>
            <div>
              <dt class="field-label">等待原因</dt>
              <dd class="mt-1 text-sm leading-6 text-slate-700" x-text="liveRun.wait_reason || 'Runtime 正在推进或尚未进入等待点。'"></dd>
            </div>
            <div>
              <dt class="field-label">期望输入</dt>
              <dd class="mt-2 space-y-2">
                <template x-for="item in liveRun.expected_inputs || []" :key="JSON.stringify(item)">
                  <span class="status-badge bg-slate-100 text-slate-700" x-text="item.kind || item.event_kind || item.mime_type || 'evidence'"></span>
                </template>
                <p class="mono-field" x-show="!(liveRun.expected_inputs || []).length">text / image / video / file</p>
              </dd>
            </div>
            <div x-show="liveRun.latest_evaluation && liveRun.latest_evaluation.decision">
              <dt class="field-label">最近评估</dt>
              <dd class="mt-2 rounded-lg border border-slate-200 bg-white p-3">
                <p class="text-sm font-semibold text-slate-950" x-text="liveRun.latest_evaluation.decision"></p>
                <p class="mt-1 text-xs leading-5 text-slate-600" x-text="liveRun.latest_evaluation.reason"></p>
              </dd>
            </div>
            <div>
              <dt class="field-label">Terminal Session</dt>
              <dd class="mt-1 mono-field break-all" x-text="liveRun.terminal_session_id || 'N/A'"></dd>
            </div>
            <div>
              <dt class="field-label">实时连接</dt>
              <dd class="mt-1">
                <span class="status-badge" :class="statusBadgeTone(liveRunWsStatus === 'open' ? 'succeeded' : liveRunWsStatus === 'connecting' ? 'running' : liveRunWsStatus)" x-text="wsStatusLabel(liveRunWsStatus)"></span>
              </dd>
            </div>
            <div>
              <dt class="field-label">Artifact</dt>
              <dd class="mt-1 mono-field break-all" x-text="liveRun.compile_artifact_id"></dd>
            </div>
            <div>
              <dt class="field-label">Binding</dt>
              <dd class="mt-2 space-y-2">
                <template x-for="binding in liveRunBindings" :key="binding.id">
                  <div class="rounded-lg border border-slate-200 bg-white p-3">
                    <p class="text-xs font-semibold text-slate-950" x-text="binding.requirement_key"></p>
                    <p class="mt-1 mono-field break-all" x-text="`${binding.capability} -> ${binding.target_kind}`"></p>
                  </div>
                </template>
              </dd>
            </div>
            <div>
              <dt class="field-label">最终输出</dt>
              <dd class="mt-2 whitespace-pre-wrap break-words rounded-lg border border-slate-200 bg-white p-3 text-sm leading-6 text-slate-700" x-text="liveRun.final_output || '运行中...'"></dd>
            </div>
          </dl>
        </aside>

        <main class="flex h-full min-h-0 min-w-0 flex-col overflow-hidden">
          <section class="flex min-h-0 flex-1 flex-col overflow-hidden bg-slate-950/20">
            <div class="flex h-11 shrink-0 items-center overflow-x-auto overflow-y-hidden border-b border-slate-200 bg-white">
              <button type="button" class="detail-tab h-11" :class="liveRunInteractionTab === 'terminal' ? 'detail-tab-active' : ''" @click="liveRunInteractionTab = 'terminal'">
                <span class="material-symbols-outlined text-[18px]">forum</span>
                <span>terminal</span>
                <span class="mono-field" x-text="`${liveRunTerminalEvents.length} events`"></span>
              </button>
              <button type="button" class="detail-tab h-11" :class="liveRunInteractionTab === 'replay' ? 'detail-tab-active' : ''" @click="liveRunInteractionTab = 'replay'">
                <span class="material-symbols-outlined text-[18px]">history</span>
                <span>replay</span>
                <span class="mono-field" x-text="`${liveRunReplayTimeline().length} events`"></span>
              </button>
              <button type="button" class="detail-tab h-11" :class="liveRunInteractionTab === 'io' ? 'detail-tab-active' : ''" @click="liveRunInteractionTab = 'io'">
                <span class="material-symbols-outlined text-[18px]">swap_horiz</span>
                <span>输入输出</span>
                <span class="mono-field" x-text="`${liveRunProcessTerminalEvents().length} nodes`"></span>
              </button>
            </div>

            <section x-show="liveRunInteractionTab === 'terminal'" class="flex min-h-0 flex-1 flex-col overflow-hidden">
              <template x-if="liveRunTerminalEvents.length === 0">
                <div class="empty-state h-full min-h-80">
                  <span class="material-symbols-outlined text-[30px] text-slate-400">forum</span>
                  <p class="mt-3 text-sm text-slate-500">暂无终端交互记录。</p>
                </div>
              </template>
              <div x-ref="terminalTranscriptScroll" class="min-h-0 flex-1 overflow-auto">
                <div class="space-y-3 px-4 py-4">
                  <template x-for="event in liveRunTerminalEvents" :key="event.id || event.seq_no">
                    <article class="flex min-w-0" :class="terminalEventRowClass(event)">
                      <div class="flex min-w-0" :class="terminalEventMessageShellClass(event)" :style="terminalEventMessageShellStyle(event)">
                        <div class="flex min-w-0 flex-1 flex-col" :class="terminalEventContentClass(event)">
                          <div class="mb-1 flex flex-wrap items-center gap-2" :class="terminalEventMetaClass(event)">
                            <span class="text-xs font-semibold text-slate-100" x-text="terminalEventActorLabel(event)"></span>
                            <span class="mono-field" x-text="formatDateTime(event.occurred_at)"></span>
                            <span class="mono-field" x-text="`#${event.seq_no}`"></span>
                            <span x-show="event._optimistic_status === 'sent'" class="status-badge border-emerald-500/25 bg-emerald-500/10 text-emerald-200">已发送</span>
                          </div>
                          <div class="overflow-hidden rounded-md px-2.5 py-2" :class="terminalEventBubbleClass(event)">
                            <template x-if="terminalEventHasParts(event)">
                              <div class="space-y-2">
                                <template x-for="part in terminalEventParts(event)" :key="part.part_id || part.id">
                                  <div class="space-y-1.5">
                                    <p x-show="terminalEventPartIsText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventPartDisplayText(part)"></p>
                                    <figure x-show="terminalEventPartIsImage(part) && terminalEventPartMediaUrl(event, part)" class="space-y-1.5">
                                      <button type="button" class="group relative inline-flex max-w-md items-center justify-center overflow-hidden rounded-md border border-slate-700 bg-black" title="放大查看图片" aria-label="放大查看图片" @click="openTerminalMediaPreview(event, part)">
                                        <img class="max-h-72 max-w-full object-contain transition group-hover:scale-[1.01]" :src="terminalEventPartMediaUrl(event, part)" :alt="terminalEventPartFileName(part)" loading="lazy" />
                                      </button>
                                      <figcaption x-show="terminalEventPartDisplayText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventPartDisplayText(part)"></figcaption>
                                    </figure>
                                    <div x-show="terminalEventPartIsAudio(part) && terminalEventPartMediaUrl(event, part)" class="space-y-1.5">
                                      <audio class="w-full max-w-md" controls preload="metadata" :src="terminalEventPartMediaUrl(event, part)"></audio>
                                      <p x-show="terminalEventPartDisplayText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventPartDisplayText(part)"></p>
                                    </div>
                                    <div x-show="terminalEventPartIsVideo(part) && terminalEventPartMediaUrl(event, part)" class="space-y-1.5">
                                      <video class="max-h-72 w-full max-w-md rounded-md border border-slate-700 bg-black object-contain" controls preload="metadata" :src="terminalEventPartMediaUrl(event, part)"></video>
                                      <p x-show="terminalEventPartDisplayText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventPartDisplayText(part)"></p>
                                    </div>
                                  </div>
                                </template>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsImage(event) && terminalEventMediaUrl(event)">
                              <figure class="space-y-2">
                                <button type="button" class="group relative inline-flex max-w-md items-center justify-center overflow-hidden rounded-md border border-slate-700 bg-black" title="放大查看图片" aria-label="放大查看图片" @click="openTerminalMediaPreview(event)">
                                  <img class="max-h-72 max-w-full object-contain transition group-hover:scale-[1.01]" :src="terminalEventMediaUrl(event)" :alt="terminalEventFileName(event) || 'terminal image'" loading="lazy" />
                                  <span class="absolute right-2 top-2 inline-flex h-8 w-8 items-center justify-center rounded-md bg-slate-950/80 text-slate-100 opacity-0 transition group-hover:opacity-100">
                                    <span class="material-symbols-outlined text-[18px]">zoom_in</span>
                                  </span>
                                </button>
                                <figcaption x-show="terminalEventDisplayText(event)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventDisplayText(event)"></figcaption>
                              </figure>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsAudio(event) && terminalEventMediaUrl(event)">
                              <div class="space-y-2">
                                <audio class="w-full max-w-md" controls preload="metadata" :src="terminalEventMediaUrl(event)"></audio>
                                <p x-show="terminalEventDisplayText(event)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventDisplayText(event)"></p>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsVideo(event) && terminalEventMediaUrl(event)">
                              <div class="space-y-2">
                                <video class="max-h-72 w-full max-w-md rounded-md border border-slate-700 bg-black object-contain" controls preload="metadata" :src="terminalEventMediaUrl(event)"></video>
                                <p x-show="terminalEventDisplayText(event)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventDisplayText(event)"></p>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsPdf(event) && terminalEventMediaUrl(event)">
                              <div class="space-y-2">
                                <iframe class="h-72 w-full max-w-lg rounded-md border border-slate-700 bg-slate-950" :src="terminalEventMediaUrl(event)" :title="terminalEventFileName(event)"></iframe>
                                <p x-show="terminalEventDisplayText(event)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventDisplayText(event)"></p>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsGenericFile(event)">
                              <div class="flex min-w-0 items-center gap-2 rounded-md border border-slate-700 bg-slate-950/40 px-2.5 py-2 text-slate-200">
                                <span class="material-symbols-outlined shrink-0 text-[22px]" x-text="terminalEventFileIcon(event)"></span>
                                <span class="min-w-0 flex-1">
                                  <span class="block truncate text-sm font-medium" x-text="terminalEventFileName(event)"></span>
                                  <span class="mono-field block truncate" x-text="terminalEventFileMeta(event)"></span>
                                </span>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventShouldShowJson(event)">
                              <pre class="max-h-96 overflow-auto whitespace-pre-wrap break-words rounded-md border border-slate-700 bg-slate-950 px-2.5 py-2 text-xs leading-5 text-slate-100" x-text="terminalEventJsonText(event)"></pre>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventShouldShowPlainText(event)">
                              <p class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventDisplayText(event)"></p>
                            </template>
                          </div>
                        </div>
                      </div>
                    </article>
                  </template>
                </div>
              </div>
            </section>

            <section x-show="liveRunInteractionTab === 'io'" class="min-h-0 flex-1 overflow-hidden" data-live-run-process-panel>
              <section class="flex h-full min-h-0 min-w-0 flex-col overflow-hidden bg-slate-950/40">
                  <template x-if="liveRunProcessTerminalEvents().length === 0">
                    <div class="empty-state min-h-80">
                      <span class="material-symbols-outlined text-[30px] text-slate-500">swap_horiz</span>
                      <p class="mt-3 text-sm text-slate-400">暂无输入输出事件。</p>
                    </div>
                  </template>

                  <div class="min-h-0 flex-1 overflow-y-auto overflow-x-visible">
                    <template x-for="(lane, laneIndex) in liveRunProcessLanes()" :key="lane.id">
                      <div class="grid min-h-16 grid-cols-[3.5rem_5.5rem_minmax(0,1fr)] border-b border-slate-800">
                        <div class="flex items-center justify-center border-r border-slate-800/60">
                          <template x-if="shouldShowLiveRunProcessLaneGroup(lane, laneIndex)">
                            <span class="whitespace-nowrap text-sm font-semibold text-slate-300" x-text="liveRunProcessLaneGroupLabel(lane.id)"></span>
                          </template>
                        </div>
                        <div class="flex min-w-0 items-center gap-2 border-r border-slate-800/60 px-2 py-2 text-left transition hover:bg-slate-900/45">
                          <span class="material-symbols-outlined rounded-md border p-1 text-[16px]" :class="liveRunProcessLaneTone(lane.id)" x-text="liveRunProcessLaneIcon(lane)"></span>
                          <div class="min-w-0">
                            <p class="truncate text-sm font-semibold leading-5 text-slate-100" x-text="liveRunProcessLaneLabel(lane)"></p>
                          </div>
                        </div>
                        <div class="relative min-h-16 overflow-visible px-3">
                          <template x-for="item in liveRunProcessEventsForLane(lane.id)" :key="item.render_key">
                            <button
                              type="button"
                              class="absolute top-1/2 z-20 flex h-14 w-20 -translate-x-1/2 -translate-y-1/2 items-center gap-2 overflow-hidden rounded-md border px-2 py-1 text-left shadow-sm transition"
                              :class="`${liveRunProcessEventFrameTone(item.event)} ${isLiveRunProcessEventSelected(item.event) ? 'ring-2 ring-orange-300/80' : ''}`"
                              :style="liveRunProcessTimelineEventLeftStyle(item.event)"
                              :data-tooltip="liveRunProcessEventTooltip(item.event)"
                              :aria-pressed="isLiveRunProcessEventSelected(item.event)"
                              @click.stop="openLiveRunProcessEventDrawer(item.event)"
                            >
                              <span class="material-symbols-outlined relative z-10 shrink-0 text-[16px]" x-text="liveRunProcessEventIcon(item.event)"></span>
                              <span class="flex min-w-0 flex-1 flex-col justify-center pr-3 pb-3">
                                <span class="block font-mono text-[10px] leading-3" x-text="formatLiveRunProcessMs(liveRunProcessEventAtMs(item.event))"></span>
                                <span class="block truncate text-xs font-semibold leading-4" x-text="liveRunProcessEventSummary(item.event)"></span>
                              </span>
                              <span class="pointer-events-none absolute bottom-1 right-1 z-10 inline-flex max-w-[calc(100%-0.5rem)] shrink-0 justify-center whitespace-nowrap rounded-full border px-1.5 text-[9px] font-semibold leading-3" :class="liveRunProcessEventBadgeTone(item.event)" x-text="terminalDirectionLabel(item.event.direction)"></span>
                            </button>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>

                  <div class="grid min-h-14 shrink-0 grid-cols-[3.5rem_5.5rem_minmax(0,1fr)] items-center border-t border-slate-800 bg-slate-950/35 pt-2">
                    <div class="flex items-center justify-center border-r border-slate-800/60">
                      <span class="whitespace-nowrap text-sm font-semibold text-slate-300">时间</span>
                    </div>
                    <div class="border-r border-slate-800/60">
                      <div class="flex h-8 w-full overflow-hidden rounded-md border border-slate-700 bg-slate-950">
                        <span class="min-w-0 flex-1 truncate px-2 font-mono text-sm leading-8 text-slate-100" x-text="formatLiveRunProcessMs(liveRunProcessDurationMs())"></span>
                      </div>
                    </div>
                    <div class="relative h-12 px-3">
                      <template x-for="tick in liveRunProcessTicks()" :key="tick.ms">
                        <div class="absolute top-0 h-full border-l border-slate-800/80" :style="`left: calc(${tick.percent}% + ${tick.percent === 0 ? '0.75rem' : tick.percent === 100 ? '-0.75rem' : '0rem'})`">
                          <span class="absolute top-0 whitespace-nowrap font-mono text-[10px] text-slate-500" :style="tick.percent === 100 ? 'right: 0.25rem' : 'left: 0.25rem'" x-text="formatLiveRunProcessMs(tick.ms)"></span>
                        </div>
                      </template>
                      <input type="range" min="0" :max="liveRunProcessDurationMs()" step="1000" class="absolute inset-x-3 bottom-1 accent-orange-500" value="0" disabled aria-label="输入输出时间轴" data-live-run-process-time-axis />
                    </div>
                  </div>
              </section>
            </section>

            <section x-show="liveRunInteractionTab === 'replay'" class="min-h-0 flex-1 overflow-hidden">
              <div class="grid h-full min-h-0 min-w-0 xl:grid-cols-[minmax(0,1fr)_26rem]">
                <div class="min-h-0 min-w-0 overflow-auto border-b border-slate-800 bg-slate-950/40 xl:border-b-0 xl:border-r">
                  <header class="sticky top-0 z-10 border-b border-slate-800 bg-slate-950/95 px-4 py-2.5">
                    <div class="flex flex-wrap items-center justify-between gap-3">
                      <p class="text-sm font-semibold text-slate-100">Replay Timeline</p>
                      <div class="flex flex-wrap gap-1.5 text-[11px]">
                        <span class="rounded-full border border-slate-700 px-2 py-0.5 text-slate-300" x-text="`${liveRunReplayTerminalCount()} terminal`"></span>
                        <span class="rounded-full border border-slate-700 px-2 py-0.5 text-slate-300" x-text="`${liveRunReplayTraceCount()} trace`"></span>
                        <span class="rounded-full border border-slate-700 px-2 py-0.5 text-slate-300" x-text="`${liveRunReplaySnapshots().length} snapshots`"></span>
                      </div>
                    </div>
                  </header>

                  <template x-if="liveRunReplayTimeline().length === 0">
                    <div class="empty-state min-h-80">
                      <span class="material-symbols-outlined text-[30px] text-slate-400">history</span>
                      <p class="mt-3 text-sm text-slate-500">暂无可回放的时间线事件。</p>
                    </div>
                  </template>

                  <div class="divide-y divide-slate-800">
                    <template x-for="item in liveRunReplayTimeline()" :key="`${item.seq_no}-${item.event_type}`">
                      <article
                        class="cursor-pointer px-4 py-2.5 transition"
                        :class="liveRunReplayItemClass(item)"
                        role="button"
                        tabindex="0"
                        @click="selectLiveRunReplayItem(item)"
                        @keydown.enter.prevent="selectLiveRunReplayItem(item)"
                        @keydown.space.prevent="selectLiveRunReplayItem(item)"
                      >
                        <div class="flex flex-wrap items-start justify-between gap-2">
                          <div class="flex min-w-0 items-start gap-2.5">
                            <span class="inline-flex h-7 w-7 shrink-0 items-center justify-center rounded-md" :class="liveRunReplayEventTone(item)">
                              <span class="material-symbols-outlined text-[16px]" x-text="liveRunReplayEventIcon(item)"></span>
                            </span>
                            <div class="min-w-0">
                              <p class="truncate text-sm font-semibold text-slate-100" x-text="item.title"></p>
                              <p class="mono-field" x-text="formatDateTime(item.occurred_at)"></p>
                            </div>
                          </div>
                          <span class="status-badge" :class="statusBadgeTone(item.phase)" x-text="item.phase"></span>
                        </div>
                        <p class="mt-2 line-clamp-2 whitespace-pre-wrap break-words text-sm leading-5 text-slate-300" x-text="item.summary"></p>
                      </article>
                    </template>
                  </div>
                </div>

                <aside class="min-h-0 min-w-0 overflow-auto bg-slate-950">
                  <template x-if="!selectedLiveRunReplayItem()">
                    <div class="empty-state min-h-72">
                      <span class="material-symbols-outlined text-[30px] text-slate-500">data_object</span>
                      <p class="mt-3 text-sm text-slate-400">请选择一个回放事件。</p>
                    </div>
                  </template>

                  <template x-if="selectedLiveRunReplayItem()">
                    <div class="flex min-h-full flex-col">
                      <header class="shrink-0 border-b border-slate-800 bg-slate-950 px-4 py-2.5">
                        <div class="flex items-center justify-between gap-3">
                          <div class="min-w-0">
                            <p class="text-sm font-semibold text-slate-100">Event Details</p>
                          </div>
                        </div>
                      </header>

                      <div class="min-h-0 flex-1 overflow-auto divide-y divide-slate-800">
                        <section class="px-4 py-3">
                          <div class="flex items-start gap-2.5">
                            <span class="inline-flex h-7 w-7 shrink-0 items-center justify-center rounded-md" :class="liveRunReplayEventTone(selectedLiveRunReplayItem())">
                              <span class="material-symbols-outlined text-[16px]" x-text="liveRunReplayEventIcon(selectedLiveRunReplayItem())"></span>
                            </span>
                            <div class="min-w-0">
                              <p class="text-sm font-semibold text-slate-100" x-text="selectedLiveRunReplayItem().title"></p>
                              <p class="mt-1 text-sm leading-5 text-slate-300" x-text="selectedLiveRunReplayItem().summary"></p>
                            </div>
                          </div>
                        </section>

                        <section class="min-h-[22rem] px-4 py-3">
                          <div class="flex items-center justify-between gap-3">
                            <p class="text-xs font-semibold uppercase tracking-wide text-orange-200">Payload</p>
                            <span class="font-mono text-[11px] text-slate-500" x-text="`#${selectedLiveRunReplayItem().seq_no}`"></span>
                          </div>
                          <pre class="mt-2 min-h-[18rem] whitespace-pre-wrap break-words rounded-md border border-slate-700 bg-black/60 p-3 text-xs leading-5 text-slate-100" x-text="liveRunReplaySelectedPayloadText()"></pre>
                        </section>

                        <details class="px-4 py-3">
                          <summary class="cursor-pointer text-xs font-semibold uppercase tracking-wide text-slate-500">Meta</summary>
                          <div class="mt-3 grid grid-cols-2 gap-2 text-sm">
                            <div>
                              <p class="field-label">Phase</p>
                              <p class="mt-1 text-slate-100" x-text="selectedLiveRunReplayItem().phase"></p>
                            </div>
                            <div>
                              <p class="field-label">Seq</p>
                              <p class="mt-1 font-mono text-slate-100" x-text="`#${selectedLiveRunReplayItem().seq_no}`"></p>
                            </div>
                            <div class="col-span-2">
                              <p class="field-label">Occurred At</p>
                              <p class="mt-1 mono-field" x-text="formatDateTime(selectedLiveRunReplayItem().occurred_at)"></p>
                            </div>
                          </div>
                        </details>

                        <details class="px-4 py-3">
                          <summary class="cursor-pointer text-xs font-semibold uppercase tracking-wide text-slate-500">
                            <span>Session Token Snapshots</span>
                            <span class="ml-2 font-mono text-[11px] text-slate-500" x-text="liveRunReplaySnapshots().length"></span>
                          </summary>

                          <template x-if="liveRunReplaySnapshots().length === 0">
                            <div class="mt-3 rounded-md border border-slate-800 bg-slate-900/50 px-3 py-4 text-sm text-slate-400">暂无 Session Token 快照。</div>
                          </template>

                          <div class="mt-3 divide-y divide-slate-800 border-y border-slate-800">
                            <template x-for="snapshot in liveRunReplaySnapshots()" :key="snapshot.id || snapshot.seq_no">
                              <details class="px-0 py-3">
                                <summary class="cursor-pointer list-none">
                                  <div class="flex items-start justify-between gap-3">
                                    <div class="min-w-0">
                                      <p class="text-sm font-semibold text-slate-100" x-text="`Snapshot #${snapshot.seq_no}`"></p>
                                      <p class="mono-field" x-text="formatDateTime(snapshot.created_at)"></p>
                                      <p class="mt-1 truncate text-xs text-slate-400" x-text="replaySnapshotSummary(snapshot)"></p>
                                    </div>
                                    <span class="material-symbols-outlined shrink-0 text-[18px] text-slate-500">expand_more</span>
                                  </div>
                                </summary>
                                <div class="mt-3 space-y-3">
                                  <div>
                                    <p class="field-label">Snapshot Hash</p>
                                    <p class="mt-1 mono-field break-all" x-text="snapshot.snapshot_hash || 'N/A'"></p>
                                  </div>
                                  <div>
                                    <p class="field-label">Selection Summary</p>
                                    <pre class="mt-2 max-h-56 overflow-auto whitespace-pre-wrap break-words rounded-md border border-slate-800 bg-black/40 p-3 text-xs leading-5 text-slate-200" x-text="formatJson(snapshot.selection_summary || {})"></pre>
                                  </div>
                                  <div>
                                    <p class="field-label">Enabled Set</p>
                                    <pre class="mt-2 max-h-56 overflow-auto whitespace-pre-wrap break-words rounded-md border border-slate-800 bg-black/40 p-3 text-xs leading-5 text-slate-200" x-text="formatJson(snapshot.enabled_set || [])"></pre>
                                  </div>
                                </div>
                              </details>
                            </template>
                          </div>
                        </details>
                      </div>
                    </div>
                  </template>
                </aside>
              </div>
            </section>
          </section>
        </main>
      </div>
    </div>
  </section>

  <template x-if="selectedLiveRunProcessEvent()">
    <div class="fixed inset-0 z-40 flex justify-end bg-slate-950/35 backdrop-blur-[2px]" data-live-run-process-drawer @click.self="closeLiveRunProcessEventDrawer()" @keydown.escape.window="closeLiveRunProcessEventDrawer()">
      <section class="flex h-full w-full max-w-[32rem] flex-col overflow-hidden border-l border-slate-800 bg-slate-950/95 shadow-[0_0_48px_rgba(0,0,0,0.45)]" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full opacity-80" x-transition:enter-end="translate-x-0 opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="translate-x-0 opacity-100" x-transition:leave-end="translate-x-full opacity-80">
        <header class="flex min-h-14 shrink-0 items-center justify-between gap-3 border-b border-slate-800 px-3 py-2">
          <div class="flex min-w-0 items-center gap-2">
            <span class="material-symbols-outlined rounded-md border p-1 text-[18px]" :class="liveRunProcessEventBadgeTone(selectedLiveRunProcessEvent())" x-text="liveRunProcessEventIcon(selectedLiveRunProcessEvent())"></span>
            <div class="min-w-0">
              <h2 class="truncate text-base font-semibold leading-5 text-slate-100">输入输出事件详情</h2>
              <p class="mono-field mt-0.5 truncate" x-text="`${liveRunProcessEventTitle(selectedLiveRunProcessEvent())} · ${formatLiveRunProcessMs(liveRunProcessEventAtMs(selectedLiveRunProcessEvent()))}`"></p>
              <p class="mt-0.5 text-[11px] text-slate-500">全局时间相邻</p>
            </div>
          </div>
          <button type="button" class="topbar-icon-button shrink-0" title="关闭" aria-label="关闭" data-tooltip="关闭" @click="closeLiveRunProcessEventDrawer()">
            <span class="material-symbols-outlined text-[16px]">close</span>
          </button>
        </header>

        <div class="min-h-0 flex-1 overflow-auto divide-y divide-slate-800">
          <template x-for="item in liveRunProcessNeighborItems()" :key="item.key">
            <article class="px-3 py-3">
              <div class="border-l-2 px-3 py-2" :class="liveRunProcessNeighborItemClass(item)">
                <div class="flex items-start justify-between gap-3">
                  <div class="min-w-0">
                    <p class="text-xs font-semibold uppercase tracking-wide" :class="item.current ? 'text-orange-200' : 'text-slate-500'" x-text="item.label"></p>
                    <template x-if="item.event">
                      <div class="mt-2 flex min-w-0 items-start gap-2">
                        <span class="material-symbols-outlined mt-0.5 shrink-0 rounded-md border p-1 text-[16px]" :class="liveRunProcessEventBadgeTone(item.event)" x-text="liveRunProcessEventIcon(item.event)"></span>
                        <div class="min-w-0">
                          <p class="truncate text-sm font-semibold text-slate-100" x-text="liveRunProcessEventTitle(item.event)"></p>
                          <p class="mono-field mt-0.5" x-text="`${formatLiveRunProcessMs(liveRunProcessEventAtMs(item.event))} · ${formatDateTime(item.event.occurred_at)}`"></p>
                        </div>
                      </div>
                    </template>
                  </div>
                  <template x-if="item.event">
                    <span class="status-badge shrink-0" :class="liveRunProcessEventBadgeTone(item.event)" x-text="liveRunProcessLaneLabel({ kind: liveRunProcessEventKind(item.event) })"></span>
                  </template>
                </div>

                <template x-if="!item.event">
                  <p class="mt-3 text-sm text-slate-500" x-text="`没有${item.label}节点。`"></p>
                </template>

                <template x-if="item.event">
                  <div class="mt-3 space-y-3">
                    <section class="grid grid-cols-2 gap-2 border-t border-slate-800 pt-3 text-xs">
                      <template x-for="meta in liveRunProcessEventMetadata(item.event)" :key="`${item.key}:${meta.label}`">
                        <div class="min-w-0">
                          <p class="field-label" x-text="meta.label"></p>
                          <p class="mono-field mt-0.5 break-words" x-text="meta.value"></p>
                        </div>
                      </template>
                    </section>

                    <section class="border-t border-slate-800 pt-3">
                      <p class="field-label">内容</p>

                      <template x-if="terminalEventHasParts(item.event)">
                        <div class="mt-2 space-y-2">
                          <template x-for="part in terminalEventParts(item.event)" :key="part.part_id || part.id">
                            <div class="space-y-1.5 border-l border-sky-400/60 bg-slate-900/35 px-3 py-2">
                              <div class="flex items-center justify-between gap-2">
                                <span class="mono-field truncate" x-text="part.part_id || part.id"></span>
                                <span class="mono-field shrink-0" x-text="part.mime_type || part.kind"></span>
                              </div>
                              <p x-show="terminalEventPartIsText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-200" x-text="terminalEventPartDisplayText(part)"></p>
                              <button x-show="terminalEventPartIsImage(part) && terminalEventPartMediaUrl(item.event, part)" type="button" class="group relative inline-flex max-w-full items-center justify-center overflow-hidden border border-slate-700 bg-black" title="放大查看图片" aria-label="放大查看图片" @click="openTerminalMediaPreview(item.event, part)">
                                <img class="max-h-44 max-w-full object-contain transition group-hover:scale-[1.01]" :src="terminalEventPartMediaUrl(item.event, part)" :alt="terminalEventPartFileName(part)" loading="lazy" />
                              </button>
                              <audio x-show="terminalEventPartIsAudio(part) && terminalEventPartMediaUrl(item.event, part)" class="w-full" controls preload="metadata" :src="terminalEventPartMediaUrl(item.event, part)"></audio>
                              <video x-show="terminalEventPartIsVideo(part) && terminalEventPartMediaUrl(item.event, part)" class="max-h-44 w-full border border-slate-700 bg-black object-contain" controls preload="metadata" :src="terminalEventPartMediaUrl(item.event, part)"></video>
                              <div x-show="!terminalEventPartIsText(part) && !terminalEventPartIsImage(part) && !terminalEventPartIsAudio(part) && !terminalEventPartIsVideo(part)" class="flex min-w-0 items-center gap-2 text-slate-200">
                                <span class="material-symbols-outlined shrink-0 text-[18px]">draft</span>
                                <span class="truncate text-sm" x-text="terminalEventPartFileName(part)"></span>
                              </div>
                            </div>
                          </template>
                        </div>
                      </template>

                      <template x-if="!terminalEventHasParts(item.event)">
                        <div class="mt-2 space-y-2">
                          <button x-show="terminalEventIsImage(item.event) && terminalEventMediaUrl(item.event)" type="button" class="group relative inline-flex max-w-full items-center justify-center overflow-hidden border border-slate-700 bg-black" title="放大查看图片" aria-label="放大查看图片" @click="openTerminalMediaPreview(item.event)">
                            <img class="max-h-52 max-w-full object-contain transition group-hover:scale-[1.01]" :src="terminalEventMediaUrl(item.event)" :alt="terminalEventFileName(item.event)" loading="lazy" />
                          </button>
                          <audio x-show="terminalEventIsAudio(item.event) && terminalEventMediaUrl(item.event)" class="w-full" controls preload="metadata" :src="terminalEventMediaUrl(item.event)"></audio>
                          <video x-show="terminalEventIsVideo(item.event) && terminalEventMediaUrl(item.event)" class="max-h-52 w-full border border-slate-700 bg-black object-contain" controls preload="metadata" :src="terminalEventMediaUrl(item.event)"></video>
                          <iframe x-show="terminalEventIsPdf(item.event) && terminalEventMediaUrl(item.event)" class="h-52 w-full border border-slate-700 bg-slate-950" :src="terminalEventMediaUrl(item.event)" :title="terminalEventFileName(item.event)"></iframe>
                          <div x-show="terminalEventIsGenericFile(item.event)" class="flex min-w-0 items-center gap-2 border border-slate-700 bg-slate-950/40 px-2.5 py-2 text-slate-200">
                            <span class="material-symbols-outlined shrink-0 text-[20px]" x-text="terminalEventFileIcon(item.event)"></span>
                            <span class="min-w-0 flex-1">
                              <span class="block truncate text-sm font-medium" x-text="terminalEventFileName(item.event)"></span>
                              <span class="mono-field block truncate" x-text="terminalEventFileMeta(item.event)"></span>
                            </span>
                          </div>
                          <pre class="max-h-56 overflow-auto whitespace-pre-wrap break-words text-xs leading-5 text-slate-200" x-text="liveRunProcessEventDetailText(item.event)"></pre>
                        </div>
                      </template>
                    </section>
                  </div>
                </template>
              </div>
            </article>
          </template>
        </div>
      </section>
    </div>
  </template>

  <div x-show="terminalMediaPreview.open" x-cloak class="fixed inset-0 z-50 flex min-h-0 items-center justify-center bg-black/80 p-4" @click.self="closeTerminalMediaPreview()" @keydown.escape.window="closeTerminalMediaPreview()">
    <section class="flex max-h-[92vh] w-full max-w-[96vw] flex-col overflow-hidden rounded-md border border-slate-800 bg-slate-950">
      <header class="flex h-12 shrink-0 items-center justify-between gap-3 border-b border-slate-800 px-3">
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold text-slate-100" x-text="terminalMediaPreview.title"></p>
          <p x-show="terminalMediaPreview.description" class="mono-field truncate" x-text="terminalMediaPreview.description"></p>
        </div>
        <button type="button" class="icon-button shrink-0" title="关闭" aria-label="关闭" @click="closeTerminalMediaPreview()">
          <span class="material-symbols-outlined text-[18px]">close</span>
        </button>
      </header>
      <div class="flex min-h-0 flex-1 items-center justify-center overflow-auto bg-black">
        <img x-show="terminalMediaPreview.kind === 'image'" class="h-auto w-auto max-h-[calc(92vh-3rem)] max-w-full object-contain" :src="terminalMediaPreview.src" :alt="terminalMediaPreview.title" />
      </div>
    </section>
  </div>
</div>
</template>
