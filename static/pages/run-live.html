<template x-if="liveRun">
<div class="h-full min-h-0" data-run-live-view @keydown.escape.window="closeLiveRunTaskPanel()">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950/70 px-3 py-2">
      <div class="flex min-w-0 items-center">
        <nav class="breadcrumb-bar h-7 min-h-0 min-w-0 flex-1 flex-nowrap gap-1.5 overflow-hidden border-0 p-0 text-xs" aria-label="Breadcrumb">
          <template x-if="['skill-run-live', 'skill-debug-live'].includes(route.name) && currentSkill">
            <span class="inline-flex min-w-0 max-w-full flex-nowrap items-center gap-1.5">
              <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">Skills</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <button type="button" class="breadcrumb-link min-w-0 truncate" @click="openCurrentSkillRuntime()" x-text="currentSkill.name"></button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <button type="button" class="breadcrumb-link" @click="openCurrentSkillRuntime()">运行</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <span class="truncate font-semibold text-slate-100">运行详情</span>
            </span>
          </template>
          <template x-if="!['skill-run-live', 'skill-debug-live'].includes(route.name) || !currentSkill">
            <span class="inline-flex min-w-0 max-w-full flex-nowrap items-center gap-1.5">
              <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <button type="button" class="breadcrumb-link" @click="navigate('/admin/invocations')">运行</button>
              <span class="material-symbols-outlined text-[15px] text-slate-400">chevron_right</span>
              <span class="truncate font-semibold text-slate-100">运行详情</span>
            </span>
          </template>
        </nav>
      </div>
    </div>

	    <div class="relative min-h-0 flex-1 overflow-hidden">
	      <div class="grid h-full min-h-0 min-w-0 xl:grid-cols-[22rem_minmax(0,1fr)]">
	        <div x-cloak x-show="liveRunTaskPanelOpen" x-transition.opacity class="absolute inset-0 z-30 bg-black/60 xl:hidden" @click="closeLiveRunTaskPanel()"></div>

	        <aside
	          class="absolute inset-y-0 left-0 z-40 h-full min-h-0 w-[min(22rem,calc(100%-2rem))] min-w-0 flex-col overflow-hidden border-r border-slate-800 bg-slate-950 shadow-2xl xl:static xl:z-auto xl:flex xl:w-auto xl:shadow-none"
	          :class="liveRunTaskPanelOpen ? 'flex' : 'hidden xl:flex'"
	          aria-label="任务状态"
	        >
	          <header class="shrink-0 border-b border-slate-800 px-4 py-4">
	            <div class="flex items-start justify-between gap-3">
	              <div class="min-w-0">
	                <h2 class="truncate text-base font-semibold text-slate-100" x-text="liveRunTaskStatus?.task?.skill_name || '任务状态'"></h2>
	              </div>
	              <button type="button" class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-md border border-slate-700 text-slate-300 transition hover:bg-slate-900 xl:hidden" title="关闭任务状态" @click="closeLiveRunTaskPanel()">
	                <span class="material-symbols-outlined text-[18px]">close</span>
	              </button>
	            </div>
	            <p class="mt-3 text-sm leading-6 text-slate-300" x-text="liveRunTaskStatus?.task?.execution_goal || 'Runtime 正在准备任务上下文。'"></p>
	            <div class="mt-3 flex items-center justify-between gap-3">
	              <span class="rounded-full border px-2.5 py-1 text-[11px] font-semibold" :class="taskActivityTone(liveRunTaskStatus?.activity_status)" x-text="taskActivityLabel(liveRunTaskStatus?.activity_status)"></span>
	              <span class="font-mono text-xs tabular-nums text-slate-400" x-text="`${liveRunTaskStatus?.progress?.completed || 0} / ${liveRunTaskStatus?.progress?.total || 0}`"></span>
	            </div>
	            <div class="mt-2 h-1.5 overflow-hidden rounded-full bg-slate-800" role="progressbar" :aria-valuenow="liveRunTaskStatus?.progress?.percent || 0" aria-valuemin="0" aria-valuemax="100">
	              <div class="h-full rounded-full bg-orange-400 transition-[width] duration-200" :style="`width: ${liveRunTaskStatus?.progress?.percent || 0}%`"></div>
	            </div>
	          </header>

	          <div class="min-h-0 flex-1 overflow-y-auto">
	            <template x-if="liveRunTaskStatusError">
	              <div class="mx-4 mt-4 rounded-md border border-rose-500/25 bg-rose-500/10 px-3 py-3 text-xs leading-5 text-rose-200">
	                <p class="font-semibold">任务状态加载失败</p>
	                <p class="mt-1 text-rose-200/80" x-text="liveRunTaskStatusError"></p>
	                <button type="button" class="mt-2 font-semibold text-rose-100 underline underline-offset-2" @click="refreshLiveRunTaskStatus(liveRun.id).catch(() => {})">重新加载</button>
	              </div>
	            </template>
	            <template x-if="!(liveRunTaskStatus?.stages || []).length">
	              <div class="px-4 py-8 text-center">
	                <span class="material-symbols-outlined text-[28px] text-slate-600">route</span>
	                <p class="mt-2 text-sm text-slate-400" x-text="liveRunTaskStatusError ? '任务状态暂不可用，终端交互不受影响。' : '该运行没有可展示的业务阶段。'"></p>
	              </div>
	            </template>

	            <ol class="divide-y divide-slate-800">
	              <template x-for="stage in liveRunTaskStatus?.stages || []" :key="stage.id">
	                <li class="px-4 py-3" :class="stage.id === liveRunTaskStatus?.current_stage_id ? 'bg-slate-900/55' : ''">
	                  <div class="flex items-start gap-3">
	                    <span class="mt-0.5 inline-flex h-7 w-7 shrink-0 items-center justify-center rounded-full border" :class="taskStageTone(stage.status)">
	                      <span class="material-symbols-outlined text-[16px]" x-text="taskStageIcon(stage.status)"></span>
	                    </span>
	                    <div class="min-w-0 flex-1">
	                      <div class="flex items-start justify-between gap-2">
	                        <div class="min-w-0">
	                          <p class="text-[10px] font-semibold uppercase tracking-[0.16em] text-slate-500" x-text="`阶段 ${stage.index}`"></p>
	                          <p class="mt-0.5 text-sm font-semibold leading-5 text-slate-100" x-text="stage.title"></p>
	                        </div>
	                        <span class="shrink-0 rounded-full border px-2 py-0.5 text-[10px] font-semibold" :class="taskStageTone(stage.status)" x-text="taskStageLabel(stage.status)"></span>
	                      </div>

	                      <template x-if="stage.id === liveRunTaskStatus?.current_stage_id">
	                        <div class="mt-3 space-y-3 border-l border-slate-700 pl-3">
	                          <p class="text-xs leading-5 text-slate-300" x-show="stage.goal" x-text="stage.goal"></p>
	                          <p class="text-xs leading-5 text-amber-200" x-show="stage.status_reason" x-text="stage.status_reason"></p>

	                          <template x-if="liveRunTaskStatus?.current_checkpoint">
	                            <div class="space-y-3">
	                              <div x-show="(liveRunTaskStatus.current_checkpoint.expected_inputs || []).length">
	                                <p class="text-[10px] font-semibold uppercase tracking-[0.16em] text-slate-500">期望输入</p>
	                                <div class="mt-1.5 flex flex-wrap gap-1.5">
	                                  <template x-for="item in liveRunTaskStatus.current_checkpoint.expected_inputs || []" :key="JSON.stringify(item)">
	                                    <span class="rounded-full border border-slate-700 bg-slate-900 px-2 py-0.5 text-[10px] text-slate-300" x-text="taskExpectedInputLabel(item)"></span>
	                                  </template>
	                                </div>
	                              </div>

	                              <div x-show="(liveRunTaskStatus.current_checkpoint.requirements || []).length">
	                                <div class="flex items-center justify-between gap-2">
	                                  <p class="text-[10px] font-semibold uppercase tracking-[0.16em] text-slate-500">当前证据</p>
	                                  <span class="font-mono text-[10px] text-slate-500" x-text="`${liveRunTaskStatus.current_checkpoint.accepted_requirements} / ${liveRunTaskStatus.current_checkpoint.total_requirements}`"></span>
	                                </div>
	                                <ul class="mt-1.5 space-y-2">
	                                  <template x-for="requirement in liveRunTaskStatus.current_checkpoint.requirements || []" :key="requirement.requirement_key">
	                                    <li class="flex items-start gap-2 text-xs leading-5">
	                                      <span class="material-symbols-outlined mt-0.5 shrink-0 text-[16px]" :class="taskEvidenceTone(requirement.status)" x-text="taskEvidenceIcon(requirement.status)"></span>
	                                      <span class="min-w-0">
	                                        <span class="block text-slate-300" x-text="requirement.description"></span>
	                                        <span class="block text-[11px] text-slate-500" x-show="requirement.reason" x-text="requirement.reason"></span>
	                                      </span>
	                                    </li>
	                                  </template>
	                                </ul>
	                              </div>
	                            </div>
	                          </template>
	                        </div>
	                      </template>
	                    </div>
	                  </div>
	                </li>
	              </template>
	            </ol>

	            <details class="border-t border-slate-800 px-4 py-3 text-sm">
	              <summary class="cursor-pointer text-xs font-semibold text-slate-400">运行信息</summary>
	              <dl class="mt-3 space-y-3">
	                <div>
	                  <dt class="field-label">Run ID</dt>
	                  <dd class="mt-1 mono-field break-all" x-text="liveRun.id"></dd>
	                </div>
	                <div>
	                  <dt class="field-label">Runtime Phase</dt>
	                  <dd class="mt-1 mono-field break-all" x-text="liveRun.runtime_phase"></dd>
	                </div>
	                <div>
	                  <dt class="field-label">实时连接</dt>
	                  <dd class="mt-1"><span class="status-badge" :class="statusBadgeTone(liveRunWsStatus === 'open' ? 'succeeded' : liveRunWsStatus === 'connecting' ? 'running' : liveRunWsStatus)" x-text="wsStatusLabel(liveRunWsStatus)"></span></dd>
	                </div>
	                <div>
	                  <dt class="field-label">Artifact</dt>
	                  <dd class="mt-1 mono-field break-all" x-text="liveRun.compile_artifact_id"></dd>
	                </div>
	                <div>
	                  <dt class="field-label">Bindings</dt>
	                  <dd class="mt-1 space-y-1">
	                    <template x-for="binding in liveRunBindings" :key="binding.id">
	                      <p class="mono-field break-all" x-text="`${binding.requirement_key}: ${binding.capability} -> ${binding.target_kind}`"></p>
	                    </template>
	                  </dd>
	                </div>
	              </dl>
	            </details>
	          </div>
	        </aside>

	        <main class="flex h-full min-h-0 min-w-0 flex-col overflow-hidden">
	          <button type="button" class="flex shrink-0 items-center gap-3 border-b border-slate-800 bg-slate-950/80 px-3 py-2 text-left xl:hidden" @click="openLiveRunTaskPanel()">
	            <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-md border" :class="taskActivityTone(liveRunTaskStatus?.activity_status)">
	              <span class="material-symbols-outlined text-[18px]">fact_check</span>
	            </span>
	            <span class="min-w-0 flex-1">
	              <span class="block truncate text-sm font-semibold text-slate-100" x-text="liveRunCurrentTaskStage()?.title || liveRunTaskStatus?.task?.skill_name || '任务状态'"></span>
	              <span class="block truncate text-[11px] text-slate-400" x-text="`${taskActivityLabel(liveRunTaskStatus?.activity_status)} · ${liveRunTaskStatus?.progress?.completed || 0}/${liveRunTaskStatus?.progress?.total || 0}`"></span>
	            </span>
	            <span class="material-symbols-outlined shrink-0 text-[18px] text-slate-400">chevron_right</span>
	          </button>
	          <section class="flex min-h-0 flex-1 flex-col overflow-hidden bg-slate-950/20">
            <div class="flex h-11 shrink-0 items-center overflow-x-auto overflow-y-hidden border-b border-slate-200 bg-white">
              <button type="button" class="detail-tab h-11" :class="liveRunInteractionTab === 'terminal' ? 'detail-tab-active' : ''" @click="selectLiveRunInteractionTab('terminal')">
                <span class="material-symbols-outlined text-[18px]">forum</span>
                <span>terminal</span>
                <span class="mono-field" x-text="`${liveRunTerminalEvents.length} events`"></span>
              </button>
              <button type="button" class="detail-tab h-11" :class="liveRunInteractionTab === 'replay' ? 'detail-tab-active' : ''" @click="selectLiveRunInteractionTab('replay')">
                <span class="material-symbols-outlined text-[18px]">history</span>
                <span>replay</span>
                <span class="mono-field" x-text="`${liveRunReplayTimeline().length} events`"></span>
              </button>
              <button type="button" class="detail-tab h-11" :class="liveRunInteractionTab === 'io' ? 'detail-tab-active' : ''" @click="selectLiveRunInteractionTab('io')">
                <span class="material-symbols-outlined text-[18px]">swap_horiz</span>
                <span>输入输出</span>
                <span class="mono-field" x-text="`${liveRunProcessTerminalEvents().length} nodes`"></span>
              </button>
            </div>

            <template x-if="liveRunMountedTabs.terminal">
            <section x-show="liveRunInteractionTab === 'terminal'" class="flex min-h-0 flex-1 flex-col overflow-hidden">
              <template x-if="liveRunTerminalEvents.length === 0">
                <div class="empty-state h-full min-h-80">
                  <span class="material-symbols-outlined text-[30px] text-slate-400">forum</span>
                  <p class="mt-3 text-sm text-slate-500">暂无终端交互记录。</p>
                </div>
              </template>
              <div x-ref="terminalTranscriptScroll" class="min-h-0 flex-1 overflow-auto">
                <div class="space-y-3 px-4 py-4">
                  <template x-for="event in liveRunTerminalEvents" :key="event.id || event.seq_no">
                    <article class="flex min-w-0" :class="terminalEventRowClass(event)">
                      <div class="flex min-w-0" :class="terminalEventMessageShellClass(event)" :style="terminalEventMessageShellStyle(event)">
                        <div class="flex min-w-0 flex-1 flex-col" :class="terminalEventContentClass(event)">
                          <div class="mb-1 flex flex-wrap items-center gap-2" :class="terminalEventMetaClass(event)">
                            <span class="text-xs font-semibold text-slate-100" x-text="terminalEventActorLabel(event)"></span>
                            <span class="mono-field" x-text="formatDateTime(event.occurred_at)"></span>
                            <span x-show="event._optimistic_status === 'sent'" class="status-badge border-emerald-500/25 bg-emerald-500/10 text-emerald-200">已发送</span>
                          </div>
                          <div class="overflow-hidden rounded-md" :class="terminalEventBubbleClass(event)">
                            <template x-if="terminalEventHasParts(event)">
                              <div class="space-y-2">
                                <template x-for="part in terminalEventParts(event)" :key="part.part_id || part.id">
                                  <div class="space-y-1.5">
                                    <template x-if="terminalEventPartPresentationKind(part) === 'text'">
                                      <div class="terminal-markdown" x-html="terminalEventPartMarkdownHtml(part)"></div>
                                    </template>
                                    <template x-if="terminalEventPartPresentationKind(part) === 'image' && terminalEventPartMediaUrl(event, part)">
                                    <figure class="space-y-1.5">
                                      <button type="button" class="group relative inline-flex max-w-md items-center justify-center overflow-hidden rounded-md bg-black" title="放大查看图片" aria-label="放大查看图片" @click="openTerminalMediaPreview(event, part)">
                                        <img class="max-h-72 max-w-full object-contain transition group-hover:scale-[1.01]" :src="terminalEventPartMediaUrl(event, part)" :alt="terminalEventPartFileName(part)" loading="lazy" decoding="async" />
                                      </button>
                                      <figcaption x-show="terminalEventPartDisplayText(part)" class="terminal-markdown" x-html="terminalEventPartMarkdownHtml(part)"></figcaption>
                                    </figure>
                                    </template>
                                    <template x-if="terminalEventPartPresentationKind(part) === 'audio' && terminalEventPartMediaUrl(event, part)">
                                    <div class="space-y-1.5">
                                      <audio class="w-full max-w-md" controls preload="none" :src="terminalEventPartMediaUrl(event, part)"></audio>
                                      <div x-show="terminalEventPartDisplayText(part)" class="terminal-markdown" x-html="terminalEventPartMarkdownHtml(part)"></div>
                                    </div>
                                    </template>
                                    <template x-if="terminalEventPartPresentationKind(part) === 'video' && terminalEventPartMediaUrl(event, part)">
                                    <div class="space-y-1.5">
                                      <video class="max-h-72 w-full max-w-md rounded-md border border-slate-700 bg-black object-contain" controls preload="none" :src="terminalEventPartMediaUrl(event, part)"></video>
                                      <div x-show="terminalEventPartDisplayText(part)" class="terminal-markdown" x-html="terminalEventPartMarkdownHtml(part)"></div>
                                    </div>
                                    </template>
                                    <template x-if="terminalEventPartPresentationKind(part) === 'pdf' && terminalEventPartMediaUrl(event, part)">
                                      <iframe class="h-72 w-full max-w-lg rounded-md border border-slate-700 bg-slate-950" :src="terminalEventPartMediaUrl(event, part)" :title="terminalEventPartFileName(part)" loading="lazy"></iframe>
                                    </template>
                                    <template x-if="terminalEventPartPresentationKind(part) === 'file'">
                                      <div class="flex min-w-0 items-center gap-2 rounded-md border border-slate-700 bg-slate-950/40 px-2.5 py-2 text-slate-200">
                                        <span class="material-symbols-outlined shrink-0 text-[22px]">draft</span>
                                        <span class="block min-w-0 flex-1 truncate text-sm font-medium" x-text="terminalEventPartFileName(part)"></span>
                                      </div>
                                    </template>
                                  </div>
                                </template>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsImage(event) && terminalEventMediaUrl(event)">
                              <figure class="space-y-2">
                                <button type="button" class="group relative inline-flex max-w-md items-center justify-center overflow-hidden rounded-md bg-black" title="放大查看图片" aria-label="放大查看图片" @click="openTerminalMediaPreview(event)">
                                  <img class="max-h-72 max-w-full object-contain transition group-hover:scale-[1.01]" :src="terminalEventMediaUrl(event)" :alt="terminalEventFileName(event) || 'terminal image'" loading="lazy" decoding="async" />
                                  <span class="absolute right-2 top-2 inline-flex h-8 w-8 items-center justify-center rounded-md bg-slate-950/80 text-slate-100 opacity-0 transition group-hover:opacity-100">
                                    <span class="material-symbols-outlined text-[18px]">zoom_in</span>
                                  </span>
                                </button>
                                <figcaption x-show="terminalEventDisplayText(event)" class="terminal-markdown" x-html="terminalEventMarkdownHtml(event)"></figcaption>
                              </figure>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsAudio(event) && terminalEventMediaUrl(event)">
                              <div class="space-y-2">
                                <audio class="w-full max-w-md" controls preload="none" :src="terminalEventMediaUrl(event)"></audio>
                                <div x-show="terminalEventDisplayText(event)" class="terminal-markdown" x-html="terminalEventMarkdownHtml(event)"></div>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsVideo(event) && terminalEventMediaUrl(event)">
                              <div class="space-y-2">
                                <video class="max-h-72 w-full max-w-md rounded-md border border-slate-700 bg-black object-contain" controls preload="none" :src="terminalEventMediaUrl(event)"></video>
                                <div x-show="terminalEventDisplayText(event)" class="terminal-markdown" x-html="terminalEventMarkdownHtml(event)"></div>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsPdf(event) && terminalEventMediaUrl(event)">
                              <div class="space-y-2">
                                <iframe class="h-72 w-full max-w-lg rounded-md border border-slate-700 bg-slate-950" :src="terminalEventMediaUrl(event)" :title="terminalEventFileName(event)" loading="lazy"></iframe>
                                <div x-show="terminalEventDisplayText(event)" class="terminal-markdown" x-html="terminalEventMarkdownHtml(event)"></div>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventIsGenericFile(event)">
                              <div class="flex min-w-0 items-center gap-2 rounded-md border border-slate-700 bg-slate-950/40 px-2.5 py-2 text-slate-200">
                                <span class="material-symbols-outlined shrink-0 text-[22px]" x-text="terminalEventFileIcon(event)"></span>
                                <span class="min-w-0 flex-1">
                                  <span class="block truncate text-sm font-medium" x-text="terminalEventFileName(event)"></span>
                                  <span class="mono-field block truncate" x-text="terminalEventFileMeta(event)"></span>
                                </span>
                              </div>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventShouldShowJson(event)">
                              <pre class="max-h-96 overflow-auto whitespace-pre-wrap break-words rounded-md border border-slate-700 bg-slate-950 px-2.5 py-2 text-xs leading-5 text-slate-100" x-text="terminalEventJsonText(event)"></pre>
                            </template>

                            <template x-if="!terminalEventHasParts(event) && terminalEventShouldShowPlainText(event)">
                              <div class="terminal-markdown" x-html="terminalEventMarkdownHtml(event)"></div>
                            </template>
                          </div>
                        </div>
                      </div>
                    </article>
                  </template>
                </div>
              </div>
            </section>
            </template>

            <template x-if="liveRunMountedTabs.io">
            <section x-show="liveRunInteractionTab === 'io'" class="min-h-0 flex-1 overflow-hidden" data-live-run-process-panel>
              <section class="flex h-full min-h-0 min-w-0 flex-col overflow-hidden bg-slate-950/40">
                  <template x-if="liveRunProcessTerminalEvents().length === 0">
                    <div class="empty-state min-h-80">
                      <span class="material-symbols-outlined text-[30px] text-slate-500">swap_horiz</span>
                      <p class="mt-3 text-sm text-slate-400">暂无输入输出事件。</p>
                    </div>
                  </template>

                  <div class="min-h-0 flex-1 overflow-y-auto overflow-x-visible">
                    <template x-for="(lane, laneIndex) in liveRunProcessLanes()" :key="lane.id">
                      <div class="grid min-h-16 grid-cols-[3.5rem_5.5rem_minmax(0,1fr)] border-b border-slate-800">
                        <div class="flex items-center justify-center border-r border-slate-800/60">
                          <template x-if="shouldShowLiveRunProcessLaneGroup(lane, laneIndex)">
                            <span class="whitespace-nowrap text-sm font-semibold text-slate-300" x-text="liveRunProcessLaneGroupLabel(lane.id)"></span>
                          </template>
                        </div>
                        <div class="flex min-w-0 items-center gap-2 border-r border-slate-800/60 px-2 py-2 text-left transition hover:bg-slate-900/45">
                          <span class="material-symbols-outlined rounded-md border p-1 text-[16px]" :class="liveRunProcessLaneTone(lane.id)" x-text="liveRunProcessLaneIcon(lane)"></span>
                          <div class="min-w-0">
                            <p class="truncate text-sm font-semibold leading-5 text-slate-100" x-text="liveRunProcessLaneLabel(lane)"></p>
                          </div>
                        </div>
                        <div class="relative min-h-16 overflow-visible px-3">
