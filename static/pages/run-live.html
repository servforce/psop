<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-200 bg-white px-4 py-3">
      <nav class="breadcrumb-bar border-0 pb-0" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/invocations')">运行</button>
        <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-950" @click="loadRunLive(liveRun.id)">Run Live</button>
      </nav>
      <div class="mt-3 flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
        <div>
          <p class="mono-field" x-text="liveRun.id"></p>
        </div>
        <div class="flex flex-wrap gap-3">
          <span class="status-badge" :class="statusBadgeTone(liveRun.status)" x-text="formatStatus(liveRun.status)"></span>
          <button type="button" class="button-secondary" title="刷新" aria-label="刷新" @click="loadRunLive(liveRun.id)">
            <span class="material-symbols-outlined text-[18px]">refresh</span>
            <span>刷新</span>
          </button>
          <button type="button" class="button-primary" title="查看回放" aria-label="查看回放" x-show="liveRun.status === 'succeeded'" @click="navigate(`/admin/replay/runs/${liveRun.id}`)">
            <span class="material-symbols-outlined text-[18px]">history</span>
            <span>查看回放</span>
          </button>
        </div>
      </div>
    </div>

    <div class="grid min-h-0 flex-1 overflow-hidden xl:grid-cols-[22rem_1fr]">
      <aside class="border-b border-slate-200 bg-slate-50 p-5 xl:border-b-0 xl:border-r">
        <dl class="space-y-4 text-sm">
          <div>
            <dt class="field-label">状态</dt>
            <dd class="mt-1 font-medium text-slate-950" x-text="formatStatus(liveRun.status)"></dd>
          </div>
          <div>
            <dt class="field-label">阶段</dt>
            <dd class="mt-1 mono-field" x-text="liveRun.runtime_phase"></dd>
          </div>
          <div>
            <dt class="field-label">Artifact</dt>
            <dd class="mt-1 mono-field break-all" x-text="liveRun.compile_artifact_id"></dd>
          </div>
          <div>
            <dt class="field-label">最终输出</dt>
            <dd class="mt-2 whitespace-pre-wrap rounded-lg border border-slate-200 bg-white p-3 text-sm leading-6 text-slate-700" x-text="liveRun.final_output || '运行中...'"></dd>
          </div>
        </dl>
      </aside>

      <div class="min-h-0 overflow-auto">
        <div class="divide-y divide-slate-200">
          <template x-for="event in liveRunTraceEvents" :key="event.id">
            <article class="px-5 py-4">
              <div class="flex flex-wrap items-center justify-between gap-3">
                <div class="flex items-center gap-3">
                  <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-sky-50 text-sky-700">
                    <span class="material-symbols-outlined text-[18px]">timeline</span>
                  </span>
                  <div>
                    <p class="font-semibold text-slate-950" x-text="event.event_type"></p>
                    <p class="mono-field" x-text="formatDateTime(event.occurred_at)"></p>
                  </div>
                </div>
                <span class="mono-field" x-text="event.phase"></span>
              </div>
              <pre class="mt-3 overflow-auto rounded-lg border border-slate-200 bg-slate-950 p-3 text-xs leading-5 text-slate-100" x-text="JSON.stringify(event.payload, null, 2)"></pre>
            </article>
          </template>
        </div>
      </div>
    </div>
  </section>
</div>
