<template x-if="replayDetail">
<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-200 bg-white px-4 py-3">
      <nav class="breadcrumb-bar border-0 pb-0" aria-label="Breadcrumb">
        <template x-if="route.name === 'skill-replay-detail' && currentSkill">
          <span class="inline-flex min-w-0 flex-wrap items-center gap-2">
            <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">Skills</button>
            <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
            <button type="button" class="breadcrumb-link min-w-0 truncate" @click="openCurrentSkillRuntime()" x-text="currentSkill.name"></button>
            <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
            <button type="button" class="breadcrumb-link" @click="openCurrentSkillRuntime()">运行</button>
            <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
            <button type="button" class="breadcrumb-link font-medium text-slate-950" @click="loadReplayDetail(replayDetail.run.id)">Replay</button>
          </span>
        </template>
        <template x-if="route.name !== 'skill-replay-detail' || !currentSkill">
          <span class="inline-flex min-w-0 flex-wrap items-center gap-2">
            <button type="button" class="breadcrumb-link" @click="navigate('/admin/replay')">运行回放</button>
            <span class="material-symbols-outlined text-[16px] text-slate-400">chevron_right</span>
            <button type="button" class="breadcrumb-link font-medium text-slate-950" @click="loadReplayDetail(replayDetail.run.id)">Run</button>
          </span>
        </template>
      </nav>
      <div class="mt-3 flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
        <div>
          <p class="mono-field" x-text="replayDetail.run.id"></p>
        </div>
        <button type="button" class="button-secondary" title="打开运行现场" aria-label="打开运行现场" @click="navigate(skillRunLivePath(replayDetail.run.id))">
          <span class="material-symbols-outlined text-[18px]">open_in_new</span>
          <span>打开运行现场</span>
        </button>
      </div>
    </div>

    <div class="min-h-0 flex-1 overflow-auto bg-slate-50 px-5 py-5">
      <div class="mx-auto max-w-5xl space-y-4">
        <section class="rounded-xl border border-slate-200 bg-white p-5">
          <div class="grid gap-4 md:grid-cols-3">
            <div>
              <p class="field-label">Bindings</p>
              <p class="mt-1 text-2xl font-semibold text-slate-950" x-text="replayDetail.bindings?.length || 0"></p>
            </div>
            <div>
              <p class="field-label">Terminal Events</p>
              <p class="mt-1 text-2xl font-semibold text-slate-950" x-text="replayDetail.terminal_events?.length || 0"></p>
            </div>
            <div>
              <p class="field-label">Trace Events</p>
              <p class="mt-1 text-2xl font-semibold text-slate-950" x-text="replayDetail.trace_events?.length || 0"></p>
            </div>
          </div>
        </section>
        <section class="overflow-hidden rounded-xl border border-slate-200 bg-white">
          <div class="flex items-center justify-between gap-3 border-b border-slate-200 px-4 py-3">
            <div>
              <p class="text-sm font-semibold text-slate-950">Terminal Transcript</p>
              <p class="mono-field" x-text="`${replayDetail.terminal_events?.length || 0} events`"></p>
            </div>
          </div>
          <template x-if="!replayDetail.terminal_events?.length">
            <div class="empty-state min-h-56">
              <span class="material-symbols-outlined text-[30px] text-slate-400">forum</span>
              <p class="mt-3 text-sm text-slate-500">暂无终端交互记录。</p>
            </div>
          </template>
          <div x-show="replayDetail.terminal_events?.length" class="space-y-3 bg-slate-950/20 px-4 py-4">
            <template x-for="event in replayDetail.terminal_events || []" :key="event.id || event.seq_no">
              <article class="flex min-w-0" :class="terminalEventRowClass(event)">
                <div class="flex min-w-0" :class="terminalEventMessageShellClass(event)" :style="terminalEventMessageShellStyle(event)">
                  <div class="flex min-w-0 flex-1 flex-col" :class="terminalEventContentClass(event)">
                    <div class="mb-1 flex flex-wrap items-center gap-2" :class="terminalEventMetaClass(event)">
                      <span class="text-xs font-semibold text-slate-100" x-text="terminalEventActorLabel(event)"></span>
                      <span class="mono-field" x-text="formatDateTime(event.occurred_at)"></span>
                      <span class="mono-field" x-text="`#${event.seq_no}`"></span>
                    </div>
                    <div class="overflow-hidden rounded-md px-2.5 py-2" :class="terminalEventBubbleClass(event)">
                      <template x-if="terminalEventHasParts(event)">
                        <div class="space-y-2">
                          <template x-for="part in terminalEventParts(event)" :key="part.part_id || part.id">
                            <div class="space-y-1.5">
                              <p x-show="terminalEventPartIsText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventPartDisplayText(part)"></p>
                              <figure x-show="terminalEventPartIsImage(part) && terminalEventPartMediaUrl(event, part)" class="space-y-1.5">
                                <img class="max-h-72 max-w-full rounded-md border border-slate-700 bg-black object-contain" :src="terminalEventPartMediaUrl(event, part)" :alt="terminalEventPartFileName(part)" loading="lazy" />
                                <figcaption x-show="terminalEventPartDisplayText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventPartDisplayText(part)"></figcaption>
                              </figure>
                              <div x-show="terminalEventPartIsAudio(part) && terminalEventPartMediaUrl(event, part)" class="space-y-1.5">
                                <audio class="w-full max-w-md" controls preload="metadata" :src="terminalEventPartMediaUrl(event, part)"></audio>
                                <p x-show="terminalEventPartDisplayText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventPartDisplayText(part)"></p>
                              </div>
                              <div x-show="terminalEventPartIsVideo(part) && terminalEventPartMediaUrl(event, part)" class="space-y-1.5">
                                <video class="max-h-72 w-full max-w-md rounded-md border border-slate-700 bg-black object-contain" controls preload="metadata" :src="terminalEventPartMediaUrl(event, part)"></video>
                                <p x-show="terminalEventPartDisplayText(part)" class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventPartDisplayText(part)"></p>
                              </div>
                            </div>
                          </template>
                        </div>
                      </template>
                      <template x-if="!terminalEventHasParts(event) && terminalEventShouldShowPlainText(event)">
                        <p class="whitespace-pre-wrap break-words text-sm leading-5 text-slate-100" x-text="terminalEventDisplayText(event)"></p>
                      </template>
                      <template x-if="!terminalEventHasParts(event) && terminalEventShouldShowJson(event)">
                        <pre class="max-h-96 overflow-auto whitespace-pre-wrap break-words rounded-md border border-slate-700 bg-slate-950 px-2.5 py-2 text-xs leading-5 text-slate-100" x-text="terminalEventJsonText(event)"></pre>
                      </template>
                    </div>
                  </div>
                </div>
              </article>
            </template>
          </div>
        </section>
        <template x-for="item in replayDetail.timeline" :key="`${item.seq_no}-${item.event_type}`">
          <article class="rounded-xl border border-slate-200 bg-white p-5">
            <div class="flex flex-wrap items-start justify-between gap-3">
              <div class="flex items-start gap-3">
                <span class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-sky-50 text-sky-700">
                  <span class="material-symbols-outlined text-[20px]">auto_stories</span>
                </span>
                <div>
                  <p class="text-lg font-semibold text-slate-950" x-text="item.title"></p>
                  <p class="mono-field" x-text="formatDateTime(item.occurred_at)"></p>
                </div>
              </div>
              <span class="status-badge" :class="statusBadgeTone(item.phase)" x-text="item.phase"></span>
            </div>
            <p class="mt-4 whitespace-pre-wrap text-sm leading-6 text-slate-700" x-text="item.summary"></p>
            <details class="mt-4">
              <summary class="cursor-pointer text-sm font-medium text-sky-700">查看事件 Payload</summary>
              <pre class="mt-3 overflow-auto rounded-lg border border-slate-200 bg-slate-950 p-3 text-xs leading-5 text-slate-100" x-text="JSON.stringify(item.payload, null, 2)"></pre>
            </details>
          </article>
        </template>
      </div>
    </div>
  </section>
</div>
</template>
