<div class="h-full min-h-0">
  <section class="panel rounded-none border-0">
    <div class="shrink-0 border-b border-slate-800 bg-slate-950/70 px-3 py-2">
      <nav class="breadcrumb-bar border-0 pb-0 text-xs" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">工作台</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link font-medium text-slate-100" @click="navigate(platformAgentRunsPath())">Agent Runs</button>
      </nav>
    </div>

    <div class="shrink-0 border-b border-slate-800 bg-slate-950/50 px-3 py-2">
      <div class="flex items-end gap-2 overflow-x-auto whitespace-nowrap">
        <label class="field-block w-52 shrink-0">
          <span class="field-label">Agent</span>
          <select x-model="agentRunFilters.agent_key" class="input-field h-9 py-0" @change="applyAgentRunFilters()">
            <option value="">全部</option>
            <template x-for="option in agentKeyOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <label class="field-block w-44 shrink-0">
          <span class="field-label">状态</span>
          <select x-model="agentRunFilters.status" class="input-field h-9 py-0" @change="applyAgentRunFilters()">
            <option value="">全部</option>
            <template x-for="option in agentRunStatusOptions()" :key="option.value">
              <option :value="option.value" x-text="option.label"></option>
            </template>
          </select>
        </label>
        <label class="field-block w-40 shrink-0">
          <span class="field-label">Owner Type</span>
          <input x-model="agentRunFilters.owner_type" class="input-field h-9 py-0" placeholder="compiler" @keydown.enter.prevent="applyAgentRunFilters()" />
        </label>
        <label class="field-block w-52 shrink-0">
          <span class="field-label">Owner ID</span>
          <input x-model="agentRunFilters.owner_id" class="input-field h-9 py-0 font-mono text-xs" placeholder="owner id" @keydown.enter.prevent="applyAgentRunFilters()" />
        </label>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" :disabled="busy.agentRuns || busy.agentRunDetail" @click="loadPlatformAgentRunsPage()">
          <span class="material-symbols-outlined text-[18px]">refresh</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="resetAgentRunFilters()">
          <span class="material-symbols-outlined text-[18px]">filter_alt_off</span>
        </button>
        <button type="button" class="button-secondary h-9 shrink-0 px-3" @click="navigate(platformToolAuthorizationsPath())">
          <span class="material-symbols-outlined text-[18px]">admin_panel_settings</span>
          <span>授权</span>
        </button>
      </div>
    </div>

    <div class="shrink-0 border-b border-slate-800 bg-slate-950/20">
      <div class="grid grid-cols-2 divide-x divide-slate-800 text-xs lg:grid-cols-5">
        <div class="p-3">
          <p class="text-slate-500">Runs</p>
          <p class="mt-1 font-mono text-lg text-slate-100" x-text="agentRuns.length"></p>
        </div>
        <div class="p-3">
          <p class="text-slate-500">Running</p>
          <p class="mt-1 font-mono text-lg text-sky-200" x-text="agentRunCountByStatus('running')"></p>
        </div>
        <div class="p-3">
          <p class="text-slate-500">Waiting Auth</p>
          <p class="mt-1 font-mono text-lg text-amber-200" x-text="agentRunCountByStatus('waiting_tool_authorization')"></p>
        </div>
        <div class="p-3">
          <p class="text-slate-500">Succeeded</p>
          <p class="mt-1 font-mono text-lg text-emerald-200" x-text="agentRunCountByStatus('succeeded')"></p>
        </div>
        <div class="p-3">
          <p class="text-slate-500">Failed</p>
          <p class="mt-1 font-mono text-lg text-rose-200" x-text="agentRunCountByStatus('failed')"></p>
        </div>
      </div>
    </div>

    <div class="grid min-h-0 flex-1 grid-cols-1 divide-y divide-slate-800 lg:grid-cols-[minmax(25rem,0.85fr)_minmax(0,1.25fr)] lg:divide-x lg:divide-y-0">
      <section class="min-h-0 overflow-auto">
        <template x-if="agentRuns.length === 0">
          <div class="empty-state h-full min-h-80">
            <span class="material-symbols-outlined text-[32px] text-slate-400">manage_history</span>
            <p class="mt-3 text-base font-medium text-slate-100">暂无 AgentRun</p>
          </div>
        </template>
        <template x-if="agentRuns.length > 0">
          <div class="divide-y divide-slate-800">
            <template x-for="run in agentRuns" :key="run.id">
              <article class="bg-slate-950/20 p-4 transition hover:bg-slate-900/50" :class="currentAgentRun?.id === run.id ? 'bg-sky-500/10' : ''">
                <button type="button" class="block w-full min-w-0 text-left" @click="navigate(platformAgentRunPath(run.id))">
                  <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                      <p class="truncate font-mono text-sm font-semibold text-slate-100" x-text="run.agent_key"></p>
                      <p class="mt-1 truncate font-mono text-[11px] text-slate-500" x-text="run.id"></p>
                    </div>
                    <span class="status-badge shrink-0" :class="agentRunStatusTone(run.status)" x-text="agentRunStatusLabel(run.status)"></span>
                  </div>
                  <div class="mt-3 flex flex-wrap items-center gap-2">
                    <span class="rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 text-[11px] text-slate-300" x-text="run.owner_type || 'owner:N/A'"></span>
                    <span class="rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 font-mono text-[11px] text-slate-300" x-text="run.owner_id || 'N/A'"></span>
                    <span class="rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 text-[11px] text-slate-300" x-text="'duration ' + agentRunDurationLabel(run)"></span>
                    <span class="font-mono text-[11px] text-slate-500" x-text="formatDateTime(run.created_at)"></span>
                  </div>
                </button>
              </article>
            </template>
          </div>
        </template>
      </section>

      <section class="min-h-0 overflow-auto">
        <template x-if="!currentAgentRun">
          <div class="empty-state h-full min-h-80">
            <span class="material-symbols-outlined text-[32px] text-slate-400">manage_history</span>
            <p class="mt-3 text-base font-medium text-slate-100">选择一个 AgentRun</p>
          </div>
        </template>

        <template x-if="currentAgentRun">
          <div class="divide-y divide-slate-800">
            <header class="p-4">
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div class="min-w-0">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">AgentRun</p>
                  <p class="mt-1 break-words font-mono text-base font-semibold text-slate-100" x-text="currentAgentRun.agent_key"></p>
                  <p class="mt-2 break-all font-mono text-[11px] text-slate-500" x-text="currentAgentRun.id"></p>
                </div>
                <span class="status-badge" :class="agentRunStatusTone(currentAgentRun.status)" x-text="agentRunStatusLabel(currentAgentRun.status)"></span>
              </div>
              <div class="mt-4 flex flex-wrap gap-2">
                <button type="button" class="button-secondary h-9 px-3" :disabled="busy.agentRunDetail" @click="loadPlatformAgentRunDetail(currentAgentRun.id)">
                  <span class="material-symbols-outlined text-[18px]">refresh</span>
                </button>
                <button type="button" class="button-secondary h-9 px-3" x-show="currentAgentRun.run_id" @click="navigate(platformRunLivePath(currentAgentRun.run_id))">
                  <span class="material-symbols-outlined text-[18px]">play_circle</span>
                  <span>Run</span>
                </button>
                <button type="button" class="button-secondary h-9 px-3" @click="navigate(platformToolAuthorizationsPath())">
                  <span class="material-symbols-outlined text-[18px]">admin_panel_settings</span>
                  <span>授权</span>
                </button>
                <button type="button" class="button-secondary h-9 px-3" @click="copyText(currentAgentRun.id, `agent-run-${currentAgentRun.id}`)">
                  <span class="material-symbols-outlined text-[18px]" x-text="copyIcon(`agent-run-${currentAgentRun.id}`)"></span>
                  <span>复制</span>
                </button>
              </div>
            </header>

            <div class="grid grid-cols-2 divide-x divide-slate-800 text-xs lg:grid-cols-6">
              <div class="p-4">
                <p class="text-slate-500">Owner</p>
                <p class="mt-1 truncate text-slate-200" x-text="currentAgentRun.owner_type || 'N/A'"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Owner ID</p>
                <p class="mt-1 truncate font-mono text-slate-300" x-text="currentAgentRun.owner_id || 'N/A'"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Runtime Run</p>
                <p class="mt-1 truncate font-mono text-slate-300" x-text="currentAgentRun.run_id || 'N/A'"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Duration</p>
                <p class="mt-1 font-mono text-slate-300" x-text="agentRunDurationLabel(currentAgentRun)"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Tool Failures</p>
                <p class="mt-1 font-mono text-slate-300" x-text="agentRunToolFailureCount()"></p>
              </div>
              <div class="p-4">
                <p class="text-slate-500">Memory</p>
                <p class="mt-1 font-mono text-slate-300" x-text="currentAgentRunMemoryEntries.length"></p>
              </div>
            </div>

            <div class="shrink-0 overflow-x-auto border-b border-slate-800 bg-slate-950/30 px-3 py-2">
              <div class="flex gap-2 whitespace-nowrap">
                <button type="button" class="rounded-md border px-3 py-1.5 text-xs transition" :class="agentRunDetailTab === 'events' ? 'border-orange-500/30 bg-orange-500/10 text-orange-200' : 'border-slate-700 bg-slate-950/30 text-slate-400 hover:bg-slate-900/70'" @click="agentRunDetailTab = 'events'">Events</button>
                <button type="button" class="rounded-md border px-3 py-1.5 text-xs transition" :class="agentRunDetailTab === 'model' ? 'border-orange-500/30 bg-orange-500/10 text-orange-200' : 'border-slate-700 bg-slate-950/30 text-slate-400 hover:bg-slate-900/70'" @click="agentRunDetailTab = 'model'">Model</button>
                <button type="button" class="rounded-md border px-3 py-1.5 text-xs transition" :class="agentRunDetailTab === 'tools' ? 'border-orange-500/30 bg-orange-500/10 text-orange-200' : 'border-slate-700 bg-slate-950/30 text-slate-400 hover:bg-slate-900/70'" @click="agentRunDetailTab = 'tools'">Tools</button>
                <button type="button" class="rounded-md border px-3 py-1.5 text-xs transition" :class="agentRunDetailTab === 'authorizations' ? 'border-orange-500/30 bg-orange-500/10 text-orange-200' : 'border-slate-700 bg-slate-950/30 text-slate-400 hover:bg-slate-900/70'" @click="agentRunDetailTab = 'authorizations'">Authorizations</button>
                <button type="button" class="rounded-md border px-3 py-1.5 text-xs transition" :class="agentRunDetailTab === 'skills' ? 'border-orange-500/30 bg-orange-500/10 text-orange-200' : 'border-slate-700 bg-slate-950/30 text-slate-400 hover:bg-slate-900/70'" @click="agentRunDetailTab = 'skills'">Skills</button>
                <button type="button" class="rounded-md border px-3 py-1.5 text-xs transition" :class="agentRunDetailTab === 'memory' ? 'border-orange-500/30 bg-orange-500/10 text-orange-200' : 'border-slate-700 bg-slate-950/30 text-slate-400 hover:bg-slate-900/70'" @click="agentRunDetailTab = 'memory'">Memory</button>
                <button type="button" class="rounded-md border px-3 py-1.5 text-xs transition" :class="agentRunDetailTab === 'payload' ? 'border-orange-500/30 bg-orange-500/10 text-orange-200' : 'border-slate-700 bg-slate-950/30 text-slate-400 hover:bg-slate-900/70'" @click="agentRunDetailTab = 'payload'">Payload</button>
              </div>
            </div>

            <section class="min-h-0">
              <div x-show="agentRunDetailTab === 'events'" class="divide-y divide-slate-800">
                <template x-if="currentAgentRunEvents.length === 0">
                  <p class="p-4 text-sm text-slate-400">暂无 AgentEvent</p>
                </template>
                <template x-for="event in currentAgentRunEvents" :key="event.id">
                  <article class="grid gap-3 p-4 text-xs xl:grid-cols-[8rem_minmax(12rem,0.45fr)_minmax(0,1fr)]" :class="isAgentRunEventFocused(event) ? 'bg-orange-500/10' : ''">
                    <div>
                      <p class="font-mono text-slate-400" x-text="'#' + event.seq_no"></p>
                      <p class="mt-1 font-mono text-[11px] text-slate-500" x-text="formatDateTime(event.occurred_at)"></p>
                    </div>
                    <div class="min-w-0">
                      <p class="truncate font-semibold text-slate-200" x-text="event.event_type"></p>
                      <p class="mt-1 truncate text-slate-500" x-text="event.phase || 'N/A'"></p>
                    </div>
                    <pre class="max-h-48 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(event.payload)"></pre>
                  </article>
                </template>
              </div>

              <div x-show="agentRunDetailTab === 'model'" class="divide-y divide-slate-800">
                <template x-if="currentAgentRunModelCalls.length === 0">
                  <p class="p-4 text-sm text-slate-400">暂无 ModelCall</p>
                </template>
                <template x-for="call in currentAgentRunModelCalls" :key="call.id">
                  <article class="grid gap-0 divide-y divide-slate-800 xl:grid-cols-[minmax(16rem,0.55fr)_minmax(0,1fr)] xl:divide-x xl:divide-y-0" :class="isAgentRunModelCallFocused(call) ? 'bg-orange-500/10' : ''">
                    <div class="p-4 text-xs">
                      <span class="status-badge" :class="agentRunStatusTone(call.status)" x-text="formatStatus(call.status)"></span>
                      <p class="mt-3 truncate font-semibold text-slate-100" x-text="call.model_name || call.provider"></p>
                      <p class="mt-1 truncate font-mono text-[11px] text-slate-500" x-text="call.route_key"></p>
                      <dl class="mt-4 space-y-2">
                        <div class="flex justify-between gap-3">
                          <dt class="text-slate-500">Provider</dt>
                          <dd class="text-slate-300" x-text="call.provider"></dd>
                        </div>
                        <div class="flex justify-between gap-3">
                          <dt class="text-slate-500">Tokens</dt>
                          <dd class="font-mono text-slate-300" x-text="agentRunModelTokenUsage(call)"></dd>
                        </div>
                      </dl>
                    </div>
                    <div class="grid min-w-0 grid-cols-1 divide-y divide-slate-800 lg:grid-cols-2 lg:divide-x lg:divide-y-0">
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Request</p>
                        <pre class="mt-3 max-h-72 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(call.request_payload)"></pre>
                      </div>
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Response</p>
                        <pre class="mt-3 max-h-72 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(call.response_payload)"></pre>
                      </div>
                    </div>
                  </article>
                </template>
              </div>

              <div x-show="agentRunDetailTab === 'tools'" class="divide-y divide-slate-800">
                <template x-if="currentAgentRunToolCalls.length === 0">
                  <p class="p-4 text-sm text-slate-400">暂无 ToolCall</p>
                </template>
                <template x-for="call in currentAgentRunToolCalls" :key="call.id">
                  <article class="grid gap-0 divide-y divide-slate-800 xl:grid-cols-[minmax(16rem,0.55fr)_minmax(0,1fr)] xl:divide-x xl:divide-y-0" :class="isAgentRunToolCallFocused(call) ? 'bg-orange-500/10' : ''">
                    <div class="p-4 text-xs">
                      <div class="flex flex-wrap gap-2">
                        <span class="status-badge" :class="agentRunStatusTone(call.status)" x-text="formatStatus(call.status)"></span>
                        <span class="status-badge" :class="platformToolSideEffectTone(call.side_effect_level)" x-text="platformToolSideEffectLabel(call.side_effect_level)"></span>
                      </div>
                      <p class="mt-3 truncate font-semibold text-slate-100" x-text="call.tool_name"></p>
                      <p class="mt-1 truncate text-slate-500" x-text="call.tool_provider"></p>
                      <p class="mt-2 break-all font-mono text-[11px] text-slate-500" x-text="call.id"></p>
                    </div>
                    <div class="grid min-w-0 grid-cols-1 divide-y divide-slate-800 lg:grid-cols-2 lg:divide-x lg:divide-y-0">
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Arguments</p>
                        <pre class="mt-3 max-h-64 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(call.arguments_summary)"></pre>
                      </div>
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Result</p>
                        <pre class="mt-3 max-h-64 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(call.result_summary)"></pre>
                      </div>
                    </div>
                  </article>
                </template>
              </div>

              <div x-show="agentRunDetailTab === 'authorizations'" class="divide-y divide-slate-800">
                <template x-if="currentAgentRunToolAuthorizations.length === 0">
                  <p class="p-4 text-sm text-slate-400">暂无工具授权请求</p>
                </template>
                <template x-for="authorization in currentAgentRunToolAuthorizations" :key="authorization.id">
                  <article class="grid gap-0 divide-y divide-slate-800 xl:grid-cols-[minmax(16rem,0.55fr)_minmax(0,1fr)] xl:divide-x xl:divide-y-0" :class="isAgentRunAuthorizationFocused(authorization) ? 'bg-orange-500/10' : ''">
                    <div class="p-4 text-xs">
                      <div class="flex flex-wrap gap-2">
                        <span class="status-badge" :class="statusBadgeTone(authorization.status)" x-text="toolAuthorizationStatusLabel(authorization.status)"></span>
                        <span class="status-badge" :class="platformToolSideEffectTone(authorization.side_effect_level)" x-text="platformToolSideEffectLabel(authorization.side_effect_level)"></span>
                      </div>
                      <p class="mt-3 truncate font-semibold text-slate-100" x-text="authorization.tool_name"></p>
                      <p class="mt-1 truncate font-mono text-[11px] text-slate-500" x-text="authorization.id"></p>
                      <button type="button" class="button-secondary mt-4 h-8 px-3" @click="navigate(platformToolAuthorizationsPath(authorization.tool_name))">
                        <span class="material-symbols-outlined text-[17px]">open_in_new</span>
                        <span>打开授权页</span>
                      </button>
                    </div>
                    <div class="grid min-w-0 grid-cols-1 divide-y divide-slate-800 lg:grid-cols-2 lg:divide-x lg:divide-y-0">
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Reason</p>
                        <p class="mt-3 text-sm leading-6 text-slate-300" x-text="authorization.authorization_reason || 'N/A'"></p>
                        <p class="mt-4 text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Expected Effect</p>
                        <p class="mt-3 text-sm leading-6 text-slate-300" x-text="authorization.expected_effect_summary || 'N/A'"></p>
                      </div>
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Arguments</p>
                        <pre class="mt-3 max-h-64 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(authorization.tool_arguments_summary)"></pre>
                      </div>
                    </div>
                  </article>
                </template>
              </div>

              <div x-show="agentRunDetailTab === 'skills'" class="divide-y divide-slate-800">
                <template x-if="currentAgentRunSkillActivations.length === 0">
                  <p class="p-4 text-sm text-slate-400">暂无 SkillActivation</p>
                </template>
                <template x-for="activation in currentAgentRunSkillActivations" :key="activation.id">
                  <article class="grid gap-3 p-4 text-xs xl:grid-cols-[minmax(16rem,0.45fr)_minmax(0,1fr)]">
                    <div class="min-w-0">
                      <p class="truncate font-semibold text-slate-200" x-text="activation.package_id"></p>
                      <p class="mt-1 truncate font-mono text-[11px] text-slate-500" x-text="activation.version_id"></p>
                      <p class="mt-2 font-mono text-[11px] text-slate-500" x-text="formatDateTime(activation.created_at)"></p>
                    </div>
                    <pre class="max-h-56 overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(activation.activation_context)"></pre>
                  </article>
                </template>
              </div>

              <div x-show="agentRunDetailTab === 'memory'" class="divide-y divide-slate-800">
                <template x-if="currentAgentRunMemoryEntries.length === 0">
                  <p class="p-4 text-sm text-slate-400">暂无 Memory candidate</p>
                </template>
                <template x-for="entry in currentAgentRunMemoryEntries" :key="entry.id">
                  <article class="grid gap-0 divide-y divide-slate-800 xl:grid-cols-[minmax(18rem,0.55fr)_minmax(0,1fr)] xl:divide-x xl:divide-y-0">
                    <div class="p-4 text-xs">
                      <div class="flex flex-wrap gap-2">
                        <span class="status-badge" :class="memoryStatusTone(entry.status)" x-text="memoryStatusLabel(entry.status)"></span>
                        <span class="status-badge border-slate-700 bg-slate-950/40 text-slate-300" x-text="memoryTypeLabel(entry.memory_type)"></span>
                      </div>
                      <p class="mt-3 line-clamp-2 font-semibold leading-5 text-slate-100" x-text="entry.title || entry.id"></p>
                      <p class="mt-2 break-all font-mono text-[11px] text-slate-500" x-text="entry.id"></p>
                      <div class="mt-4 flex flex-wrap items-center gap-2">
                        <span class="rounded-full border border-slate-700 bg-slate-950/40 px-2 py-1 font-mono text-[11px] text-slate-300" x-text="'confidence ' + entry.confidence"></span>
                        <button type="button" class="button-secondary h-8 px-3" @click="navigate(platformMemoryEntryPath(entry.id))">
                          <span class="material-symbols-outlined text-[17px]">open_in_new</span>
                          <span>Memory</span>
                        </button>
                      </div>
                    </div>
                    <div class="grid min-w-0 grid-cols-1 divide-y divide-slate-800 lg:grid-cols-2 lg:divide-x lg:divide-y-0">
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Content</p>
                        <p class="mt-3 whitespace-pre-wrap break-words text-sm leading-6 text-slate-300" x-text="entry.content"></p>
                      </div>
                      <div class="p-4">
                        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Source Refs</p>
                        <template x-if="memorySourceLinks(entry).length === 0">
                          <p class="mt-3 text-sm text-slate-500">N/A</p>
                        </template>
                        <template x-if="memorySourceLinks(entry).length > 0">
                          <div class="mt-3 flex flex-wrap gap-2">
                            <template x-for="link in memorySourceLinks(entry)" :key="link.key">
                              <button type="button" class="rounded-full border border-slate-700 bg-slate-950/40 px-2.5 py-1 text-[11px] text-slate-300 transition hover:bg-slate-900/70" @click="navigate(link.path)">
                                <span x-text="link.label"></span>
                              </button>
                            </template>
                          </div>
                        </template>
                        <p class="mt-4 text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Tags</p>
                        <p class="mt-3 text-sm text-slate-400" x-text="(entry.tags || []).join(', ') || 'N/A'"></p>
                      </div>
                    </div>
                  </article>
                </template>
              </div>

              <div x-show="agentRunDetailTab === 'payload'" class="grid grid-cols-1 divide-y divide-slate-800 xl:grid-cols-2 xl:divide-x xl:divide-y-0">
                <div class="p-4">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Input Payload</p>
                  <pre class="mt-3 max-h-[34rem] overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(currentAgentRun.input_payload)"></pre>
                </div>
                <div class="p-4">
                  <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Output Payload</p>
                  <pre class="mt-3 max-h-[34rem] overflow-auto rounded-md bg-slate-950/60 p-3 font-mono text-xs leading-5 text-slate-300" x-text="platformJsonPreview(currentAgentRun.output_payload)"></pre>
                  <template x-if="currentAgentRun.error_message">
                    <p class="mt-3 rounded-md border border-rose-500/25 bg-rose-500/10 px-3 py-2 text-sm text-rose-200" x-text="currentAgentRun.error_message"></p>
                  </template>
                </div>
              </div>
            </section>
          </div>
        </template>
      </section>
    </div>
  </section>
</div>
