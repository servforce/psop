<div class="h-full min-h-0 overflow-hidden">
  <section class="flex h-full min-h-0 flex-col overflow-hidden border border-slate-800 bg-slate-950">
    <div class="flex h-12 shrink-0 items-center justify-between gap-3 border-b border-slate-800 px-3">
      <nav class="breadcrumb-bar min-w-0 flex-1 flex-nowrap gap-1 border-0 p-0 text-xs" aria-label="Breadcrumb">
        <button type="button" class="breadcrumb-link" @click="navigate('/admin/skills')">Skills</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link min-w-0 truncate" @click="navigate(`/admin/skills/${currentSkill.id}`); activeDetailTab = 'test'" x-text="currentSkill.name"></button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link" @click="navigate(`/admin/skills/${currentSkill.id}`); activeDetailTab = 'test'">测试</button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <button type="button" class="breadcrumb-link min-w-0 truncate" @click="navigate(`/admin/skills/${currentSkill.id}/tests/${skillTestCase.id}`)" x-text="skillTestCase.name"></button>
        <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
        <span class="font-semibold text-slate-100">Review</span>
      </nav>
      <div class="flex shrink-0 items-center gap-2">
        <button type="button" class="button-secondary h-9 w-9 px-0" data-tooltip="播放" @click="toggleSkillTestReviewPlayback()">
          <span class="material-symbols-outlined text-[18px]" x-text="skillTestReviewPlaybackRunning ? 'pause' : 'play_arrow'"></span>
        </button>
        <button type="button" class="button-secondary h-9 w-9 px-0" @click="restartSkillTestReviewPlayback()">
          <span class="material-symbols-outlined text-[18px]">replay</span>
        </button>
        <button type="button" class="button-secondary" @click="forkSkillTestScenario()">
          <span class="material-symbols-outlined text-[18px]">call_split</span>
          <span>Fork Scenario</span>
        </button>
        <button type="button" class="button-primary" @click="forkSkillDebug()">
          <span class="material-symbols-outlined text-[18px]">terminal</span>
          <span>Fork Debug</span>
        </button>
        <button type="button" class="button-secondary" x-show="skillTestRun?.run_id" @click="navigate(`/admin/skills/${currentSkill.id}/runs/${skillTestRun.run_id}/replay`)">
          <span class="material-symbols-outlined text-[18px]">history</span>
          <span>Replay</span>
        </button>
      </div>
    </div>

    <div class="grid min-h-0 flex-1 grid-cols-[minmax(0,1fr)_minmax(22rem,0.34fr)] divide-x divide-slate-800 overflow-hidden">
      <section class="flex min-h-0 flex-col overflow-hidden">
        <div class="flex h-12 shrink-0 items-center justify-between gap-3 border-b border-slate-800 px-3">
          <div class="flex min-w-0 items-center gap-2">
            <span class="status-badge" :class="statusBadgeTone(skillTestRun?.status)" x-text="formatStatus(skillTestRun?.status)"></span>
            <span class="mono-field truncate" x-text="formatAssertionSummary(skillTestRun?.result_summary)"></span>
          </div>
          <span class="mono-field shrink-0" x-text="skillTestReviewProgressLabel()"></span>
        </div>

        <div class="min-h-0 flex-1 overflow-y-auto overflow-x-visible pr-1">
          <template x-for="(lane, laneIndex) in skillTestReviewTimelineLanes()" :key="lane.id">
            <div class="grid min-h-16 grid-cols-[3.5rem_5.5rem_minmax(0,1fr)] border-b border-slate-800">
              <div class="flex items-center justify-center border-r border-slate-800/60">
                <template x-if="shouldShowSkillTestReviewTimelineLaneGroup(lane, laneIndex)">
                  <span class="whitespace-nowrap text-sm font-semibold text-slate-300" x-text="skillTestTimelineLaneGroupLabel(lane.id)"></span>
                </template>
              </div>
              <button type="button" class="flex items-center gap-2 border-r border-slate-800/60 px-2 py-2 text-left transition" :class="isSkillTestReviewLaneSelected(lane.id) ? 'bg-orange-500/10 ring-1 ring-inset ring-orange-500/30' : 'hover:bg-slate-900/45'" :aria-pressed="isSkillTestReviewLaneSelected(lane.id)" @click.stop="openSkillTestReviewLaneDetail(lane.id)">
                <span class="material-symbols-outlined rounded-md border p-1 text-[16px]" :class="skillTestTimelineLaneTone(lane.id)" x-text="skillTestTimelineLaneIcon(lane.id)"></span>
                <div class="min-w-0">
                  <p class="truncate text-sm font-semibold leading-5 text-slate-100" x-text="skillTestTimelineLaneLabel(lane)"></p>
                </div>
              </button>
              <div class="relative min-h-16 overflow-visible px-3">
                <div class="pointer-events-none absolute inset-y-0 left-0 z-0 border-r border-orange-400/40 bg-orange-500/10 transition-all duration-150" :style="skillTestReviewLaneProgressStyle()"></div>
                <template x-for="item in skillTestReviewEventsForLane(lane.id)" :key="item.render_key">
                  <button type="button" class="absolute top-1/2 z-20 flex h-14 w-20 -translate-x-1/2 -translate-y-1/2 items-center gap-2 overflow-hidden rounded-md border px-2 py-1 text-left shadow-sm transition" :class="`${skillTestReviewEventFrameTone(item.event)} ${isSkillTestReviewExpectationSelected(item.event) ? 'ring-2 ring-orange-300/80' : ''}`" :style="skillTestReviewTimelineEventLeftStyle(item.event)" :data-tooltip="skillTestReviewEventTooltip(item.event)" :aria-pressed="isSkillTestReviewExpectationSelected(item.event)" @click.stop="openSkillTestReviewEvent(item.event)">
                    <span class="material-symbols-outlined shrink-0 text-[16px]" x-text="skillTestTimelineLaneIcon(item.event.lane_id)"></span>
                    <span class="flex min-w-0 flex-1 flex-col justify-center pr-3 pb-3">
                      <span class="block font-mono text-[10px] leading-3" x-text="formatSkillTestTimelineMs(item.event.at_ms)"></span>
                      <span class="block truncate text-xs font-semibold leading-4" x-text="skillTestTimelineEventLabel(item.event)"></span>
                    </span>
                    <span class="pointer-events-none absolute bottom-1 right-1 z-10 inline-flex max-w-[calc(100%-0.5rem)] shrink-0 justify-center whitespace-nowrap rounded-full border px-1.5 text-[9px] font-semibold leading-3" :class="skillTestReviewEventBadgeTone(item.event)" x-text="skillTestReviewEventStatusLabel(item.event)"></span>
                    <template x-if="skillTestReviewRuntimeOutputsForExpectation(item.event).length > 0">
                      <span class="pointer-events-none absolute right-1 top-1 z-10 flex max-w-[2.75rem] flex-wrap justify-end gap-0.5">
                        <template x-for="outputEvent in skillTestReviewRuntimeOutputsForExpectation(item.event)" :key="outputEvent.id">
                          <span class="h-1.5 w-1.5 rounded-full border border-cyan-200/80 bg-cyan-400 shadow-[0_0_4px_rgba(34,211,238,0.65)]"></span>
                        </template>
                      </span>
                    </template>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </div>

        <div class="grid min-h-14 shrink-0 grid-cols-[3.5rem_5.5rem_minmax(0,1fr)] items-center border-t border-slate-800 bg-slate-950/35 pt-2">
          <div class="flex items-center justify-center border-r border-slate-800/60">
            <span class="whitespace-nowrap text-sm font-semibold text-slate-300">时间</span>
          </div>
          <div class="border-r border-slate-800/60 px-2">
            <p class="mono-field" x-text="skillTestReviewProgressLabel()"></p>
          </div>
          <div class="relative h-12 px-3">
            <template x-for="tick in skillTestReviewTicks()" :key="tick.ms">
              <div class="absolute top-0 h-full border-l border-slate-800/80" :style="`left: calc(${tick.percent}% + ${tick.percent === 0 ? '0.75rem' : tick.percent === 100 ? '-0.75rem' : '0rem'})`">
                <span class="absolute top-0 whitespace-nowrap font-mono text-[10px] text-slate-500" :style="tick.percent === 100 ? 'right: 0.25rem' : 'left: 0.25rem'" x-text="formatSkillTestTimelineMs(tick.ms)"></span>
              </div>
            </template>
            <input type="range" min="0" :max="skillTestReviewDurationMs()" step="1000" class="absolute inset-x-3 bottom-1 accent-orange-500" :value="skillTestReviewPlayheadMsValue()" @input="updateSkillTestReviewPlayhead($event.target.value)" />
          </div>
        </div>
      </section>

      <aside class="flex min-h-0 flex-col overflow-hidden bg-slate-950/20">
        <div class="min-h-0 flex-1 overflow-auto divide-y divide-slate-800" data-skill-test-review-content>
          <template x-if="skillTestReviewSelectedLane()">
            <section class="divide-y divide-slate-800">
              <div class="flex items-start justify-between gap-3 p-3">
                <div class="flex min-w-0 items-center gap-3">
                  <span class="material-symbols-outlined rounded-md border p-1 text-[18px]" :class="skillTestTimelineLaneTone(skillTestReviewSelectedLane().id)" x-text="skillTestTimelineLaneIcon(skillTestReviewSelectedLane().id)"></span>
                  <div class="min-w-0">
                    <p class="truncate text-sm font-semibold text-slate-100" x-text="`${skillTestTimelineLaneLabel(skillTestReviewSelectedLane())}信道`"></p>
                    <p class="mono-field mt-1 truncate" x-text="skillTestReviewSelectedLane().id"></p>
                  </div>
                </div>
                <button type="button" class="button-secondary h-8 w-8 px-0" title="关闭" aria-label="关闭" @click="closeSkillTestReviewLaneDetail()">
                  <span class="material-symbols-outlined text-[16px]">close</span>
                </button>
              </div>

              <div class="grid grid-cols-2 text-xs">
                <div class="border-b border-r border-slate-800 p-3">
                  <p class="field-label">方向</p>
                  <p class="mt-1 font-semibold text-slate-100" x-text="skillTestTimelineLaneGroupLabel(skillTestReviewSelectedLane().id)"></p>
                </div>
                <div class="border-b border-slate-800 p-3">
                  <p class="field-label">事件数</p>
                  <p class="mono-field mt-1" x-text="`${skillTestReviewSelectedLaneEvents().length} 个事件`"></p>
                </div>
                <div class="border-b border-r border-slate-800 p-3">
                  <p class="field-label">时间范围</p>
                  <p class="mono-field mt-1" x-text="skillTestReviewLaneRangeLabel(skillTestReviewSelectedLane().id)"></p>
                </div>
                <div class="border-b border-slate-800 p-3">
                  <p class="field-label">当前时间</p>
                  <p class="mono-field mt-1" x-text="skillTestReviewProgressLabel()"></p>
                </div>
                <div class="border-r border-slate-800 p-3">
                  <p class="field-label">已到达</p>
                  <p class="mono-field mt-1" x-text="`${skillTestReviewLaneReachedCount(skillTestReviewSelectedLane().id)} 个事件`"></p>
                </div>
                <div class="p-3">
                  <p class="field-label">真实输出</p>
                  <p class="mono-field mt-1" x-text="`${skillTestReviewLaneRuntimeOutputCount(skillTestReviewSelectedLane().id)} 个`"></p>
                </div>
              </div>

              <section>
                <div class="flex items-center justify-between gap-3 p-3">
                  <p class="text-sm font-semibold text-slate-100">时间信息</p>
                  <span class="mono-field" x-text="skillTestReviewLaneRangeLabel(skillTestReviewSelectedLane().id)"></span>
                </div>
                <template x-if="skillTestReviewSelectedLaneEvents().length === 0">
                  <p class="border-t border-slate-800 px-3 py-4 text-sm text-slate-400">该信道暂无事件。</p>
                </template>
                <div class="divide-y divide-slate-800 border-t border-slate-800">
                  <template x-for="item in skillTestReviewSelectedLaneEvents()" :key="item.render_key">
                    <button type="button" class="min-w-0 w-full p-3 text-left transition hover:bg-slate-900/45" @click="openSkillTestReviewEvent(item.event)">
                      <div class="flex items-center justify-between gap-2">
                        <span class="mono-field" x-text="formatSkillTestTimelineMs(item.event.at_ms)"></span>
                        <span class="status-badge" :class="skillTestReviewEventBadgeTone(item.event)" x-text="skillTestReviewEventStatusLabel(item.event)"></span>
                      </div>
                      <p class="mt-2 truncate text-sm font-semibold text-slate-100" x-text="skillTestTimelineEventLabel(item.event)"></p>
                    </button>
                  </template>
                </div>
              </section>
            </section>
          </template>

          <template x-if="skillTestReviewExpandedEvent()">
            <section class="divide-y divide-slate-800">
              <div class="flex items-start justify-between gap-3 p-3">
                <div class="flex min-w-0 items-start gap-3">
                  <span class="material-symbols-outlined rounded-md border p-1 text-[18px]" :class="skillTestTimelineLaneTone(skillTestReviewExpandedEvent().lane_id)" x-text="skillTestTimelineLaneIcon(skillTestReviewExpandedEvent().lane_id)"></span>
                  <div class="min-w-0">
                    <p class="mono-field truncate" x-text="`${skillTestTimelineLaneLabel({ id: skillTestReviewExpandedEvent().lane_id })} · ${formatSkillTestTimelineMs(skillTestReviewExpandedEvent().at_ms || 0)}`"></p>
                    <h2 class="mt-1 truncate text-sm font-semibold text-slate-100" x-text="skillTestReviewEventTitle(skillTestReviewExpandedEvent())"></h2>
                  </div>
                </div>
                <button type="button" class="button-secondary h-8 w-8 px-0" title="关闭" aria-label="关闭" @click="closeSkillTestReviewEvent()">
                  <span class="material-symbols-outlined text-[16px]">close</span>
                </button>
              </div>
              <div class="grid grid-cols-2 text-xs">
                <template x-for="meta in skillTestReviewEventMetadata(skillTestReviewExpandedEvent())" :key="meta.label">
                  <div class="border-b border-slate-800 p-3 odd:border-r">
                    <p class="field-label" x-text="meta.label"></p>
                    <p class="mono-field mt-1 break-words" x-text="meta.value"></p>
                  </div>
                </template>
              </div>
              <section class="p-3">
                <p class="field-label">事件内容</p>
                <div class="mt-3 divide-y divide-slate-800 border-t border-slate-800">
                  <template x-for="section in skillTestReviewEventContentSections(skillTestReviewExpandedEvent())" :key="section.id">
                    <article class="py-3">
                      <div class="flex items-center justify-between gap-3">
                        <p class="text-xs font-semibold text-slate-100" x-text="section.title"></p>
                        <span class="mono-field shrink-0" x-show="section.meta" x-text="section.meta"></span>
                      </div>
                      <pre class="mt-2 max-w-full overflow-auto whitespace-pre-wrap break-words text-xs leading-5 text-slate-200" x-text="section.content"></pre>
                    </article>
                  </template>
                </div>
              </section>
              <template x-if="skillTestReviewExpandedEvaluation(skillTestReviewExpandedEvent())">
                <section class="p-3">
                  <div class="flex items-center justify-between gap-3">
                    <p class="text-sm font-semibold text-slate-100">Judge 结论</p>
                    <span class="status-badge" :class="statusBadgeTone(skillTestReviewExpandedEvaluation(skillTestReviewExpandedEvent()).status)" x-text="formatStatus(skillTestReviewExpandedEvaluation(skillTestReviewExpandedEvent()).status)"></span>
                  </div>
                  <div class="mt-3 grid grid-cols-2 border-y border-slate-800 text-xs">
                    <div class="border-r border-slate-800 p-3">
                      <p class="field-label">Confidence</p>
                      <p class="mono-field mt-1" x-text="Number(skillTestReviewExpandedEvaluation(skillTestReviewExpandedEvent()).confidence || 0).toFixed(2)"></p>
                    </div>
                    <div class="p-3">
                      <p class="field-label">Model</p>
                      <p class="mono-field mt-1 break-words" x-text="skillTestReviewExpandedEvaluation(skillTestReviewExpandedEvent()).judge_model || 'N/A'"></p>
                    </div>
                  </div>
                  <p class="mt-3 whitespace-pre-wrap break-words text-sm leading-6 text-slate-300" x-text="skillTestReviewExpandedEvaluation(skillTestReviewExpandedEvent()).reason || '暂无 Judge 结论。'"></p>
                </section>
              </template>
              <details open class="p-3">
                <summary class="cursor-pointer text-sm font-semibold text-slate-100">原始事件 JSON</summary>
                <pre class="mt-3 max-w-full overflow-auto whitespace-pre-wrap break-all border-t border-slate-800 pt-3 text-xs leading-5 text-slate-200" x-text="skillTestReviewExpandedEventRawJson(skillTestReviewExpandedEvent())"></pre>
              </details>
            </section>
          </template>

          <section class="space-y-2 p-3">
            <div class="flex items-center justify-between gap-3">
              <p class="text-sm font-semibold text-slate-100" x-text="skillTestReviewPanelTab === 'judge' ? 'Judge Debug' : 'Terminal Transcript'"></p>
              <div class="inline-flex rounded-md border border-slate-800 bg-black/20 p-0.5">
                <button type="button" class="rounded px-2 py-1 text-xs font-semibold transition" :class="skillTestReviewPanelTab === 'transcript' ? 'bg-orange-500 text-slate-950' : 'text-slate-300 hover:bg-slate-900/70'" @click="skillTestReviewPanelTab = 'transcript'">Transcript</button>
                <button type="button" class="rounded px-2 py-1 text-xs font-semibold transition" :class="skillTestReviewPanelTab === 'judge' ? 'bg-orange-500 text-slate-950' : 'text-slate-300 hover:bg-slate-900/70'" @click="skillTestReviewPanelTab = 'judge'">Judge</button>
              </div>
            </div>
            <p class="mono-field" x-show="skillTestReviewPanelTab === 'transcript'" x-text="`${filteredSkillTestReviewTerminalEvents().length} events before cursor`"></p>
            <p class="mono-field" x-show="skillTestReviewPanelTab === 'judge'" x-text="selectedSkillTestReviewExpectationEvent() ? selectedSkillTestReviewExpectationEvent().id : 'no semantic assertion selected'"></p>
          </section>

          <section x-show="skillTestReviewPanelTab === 'transcript'">
            <template x-if="filteredSkillTestReviewTerminalEvents().length === 0">
              <div class="empty-state py-16">
                <span class="material-symbols-outlined text-[30px] text-slate-400">forum</span>
                <p class="mt-3 text-sm text-slate-500">当前时间点以前暂无终端事件。</p>
              </div>
            </template>
            <div class="divide-y divide-slate-800 border-t border-slate-800">
              <template x-for="event in filteredSkillTestReviewTerminalEvents()" :key="event.id || event.seq_no">
                <article class="min-w-0 p-3">
                  <div class="flex items-center justify-between gap-3">
                    <div class="flex min-w-0 items-center gap-3">
                      <span class="status-badge" :class="terminalDirectionTone(event.direction)" x-text="terminalDirectionLabel(event.direction)"></span>
                      <div class="min-w-0">
                        <p class="truncate text-sm font-semibold text-slate-100" x-text="event.event_kind"></p>
                        <p class="mono-field mt-1" x-text="formatDateTime(event.occurred_at)"></p>
                      </div>
                    </div>
                    <span class="mono-field" x-text="`#${event.seq_no}`"></span>
                  </div>
                  <pre class="mt-3 max-w-full overflow-hidden whitespace-pre-wrap break-all border-t border-slate-800 pt-3 text-xs leading-5 text-slate-200" x-text="formatTerminalPayload(event.payload_inline)"></pre>
                </article>
              </template>
            </div>
          </section>

          <section x-show="skillTestReviewPanelTab === 'judge'" class="space-y-3 p-3">
            <template x-if="!selectedSkillTestReviewExpectationEvent()">
              <div class="empty-state py-16">
                <span class="material-symbols-outlined text-[30px] text-slate-400">rule</span>
                <p class="mt-3 text-sm text-slate-500">请选择时间轴中的语义断言事件。</p>
              </div>
            </template>
            <template x-if="selectedSkillTestReviewExpectationEvent()">
              <div class="divide-y divide-slate-800 border-t border-slate-800">
                <section class="p-3">
                  <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                      <p class="truncate text-sm font-semibold text-slate-100" x-text="selectedSkillTestReviewExpectationEvent().id"></p>
                      <p class="mono-field mt-1" x-text="formatSkillTestTimelineMs(selectedSkillTestReviewExpectationEvent().at_ms)"></p>
                    </div>
                    <span class="status-badge shrink-0" :class="statusBadgeTone(selectedSkillTestReviewEvaluation()?.status || skillTestReviewStepStatus(selectedSkillTestReviewExpectationEvent()))" x-text="skillTestReviewEventStatusLabel(selectedSkillTestReviewExpectationEvent())"></span>
                  </div>
                  <p class="mt-3 whitespace-pre-wrap break-words text-sm leading-6 text-slate-100" x-text="selectedSkillTestReviewExpectationEvent().expectation"></p>
                  <div class="mt-3 grid grid-cols-2 border-y border-slate-800 text-xs">
                    <div class="border-b border-r border-slate-800 p-3">
                      <p class="field-label">Confidence</p>
                      <p class="mono-field mt-1" x-text="selectedSkillTestReviewEvaluation() ? Number(selectedSkillTestReviewEvaluation().confidence || 0).toFixed(2) : 'N/A'"></p>
                    </div>
                    <div class="border-b border-slate-800 p-3">
                      <p class="field-label">Model</p>
                      <p class="mono-field mt-1 truncate" x-text="selectedSkillTestReviewEvaluation()?.judge_model || 'N/A'"></p>
                    </div>
                    <div class="border-r border-slate-800 p-3">
                      <p class="field-label">Provider</p>
                      <p class="mono-field mt-1 truncate" x-text="selectedSkillTestReviewEvaluation()?.judge_provider || 'N/A'"></p>
                    </div>
                    <div class="p-3">
                      <p class="field-label">Prompt Hash</p>
                      <p class="mono-field mt-1 truncate" x-text="selectedSkillTestReviewEvaluation()?.prompt_hash || 'N/A'"></p>
                    </div>
                  </div>
                  <p class="mt-3 whitespace-pre-wrap break-words text-xs leading-5 text-slate-300" x-text="selectedSkillTestReviewEvaluation()?.reason || '暂无 Judge 结论。'"></p>
                </section>

                <details open class="p-3">
                  <summary class="cursor-pointer text-sm font-semibold text-slate-100">大模型输入 Payload</summary>
                  <p class="mt-2 text-xs text-slate-400" x-text="selectedSkillTestReviewJudgeInputNotice()"></p>
                  <pre class="mt-3 max-w-full overflow-hidden whitespace-pre-wrap break-all border-t border-slate-800 pt-3 text-xs leading-5 text-slate-200" x-text="formatSkillTestReviewDebugJson(selectedSkillTestReviewJudgePromptPayload())"></pre>
                </details>

                <details class="p-3" x-show="selectedSkillTestReviewJudgeRequest()">
                  <summary class="cursor-pointer text-sm font-semibold text-slate-100">System Prompt</summary>
                  <pre class="mt-3 max-w-full overflow-hidden whitespace-pre-wrap break-all border-t border-slate-800 pt-3 text-xs leading-5 text-slate-200" x-text="selectedSkillTestReviewJudgeRequest()?.system_prompt || ''"></pre>
                </details>

                <details class="p-3" x-show="selectedSkillTestReviewJudgeRequest()">
                  <summary class="cursor-pointer text-sm font-semibold text-slate-100">User Prompt</summary>
                  <pre class="mt-3 max-w-full overflow-hidden whitespace-pre-wrap break-all border-t border-slate-800 pt-3 text-xs leading-5 text-slate-200" x-text="selectedSkillTestReviewJudgeRequest()?.user_prompt || ''"></pre>
                </details>

                <details open class="p-3">
                  <summary class="cursor-pointer text-sm font-semibold text-slate-100">大模型原始输出</summary>
                  <pre class="mt-3 max-w-full overflow-hidden whitespace-pre-wrap break-all border-t border-slate-800 pt-3 text-xs leading-5 text-slate-200" x-text="selectedSkillTestReviewJudgeRawOutput() || '暂无原始输出'"></pre>
                </details>

                <details open class="p-3">
