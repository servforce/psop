<template x-if="deleteModalOpen && deleteTargetSkill">
  <div class="fixed inset-0 z-40 flex items-center justify-center bg-slate-950/55 px-4 py-6 backdrop-blur-sm" @click.self="closeDeleteModal()" @keydown.escape.window="closeDeleteModal()">
    <section class="modal-panel max-w-md">
      <div class="flex items-start gap-3 px-5 pt-5">
        <span class="inline-flex size-9 shrink-0 items-center justify-center rounded-md border border-rose-500/20 bg-rose-500/10 text-rose-200">
          <span class="material-symbols-outlined text-[19px]">delete</span>
        </span>
        <div class="min-w-0 flex-1">
          <h2 class="text-base font-semibold text-slate-100">删除 PSkill</h2>
          <p class="mt-1 text-sm leading-6 text-slate-400">该 Skill 会被标记为已归档，对应 GitLab 仓库项目也会同步归档。</p>
        </div>
        <button type="button" class="icon-button -mr-2 -mt-1" title="关闭" aria-label="关闭" :disabled="busy.delete" @click="closeDeleteModal()">
          <span class="material-symbols-outlined text-[18px]">close</span>
        </button>
      </div>

      <form class="space-y-4 px-5 pb-5 pt-4" @submit.prevent="deleteSkill()">
        <div class="rounded-md border border-slate-800 bg-slate-900/50 px-3 py-2.5">
          <p class="text-sm leading-6 text-slate-300">
            输入
            <strong class="font-semibold text-slate-100" x-text="deleteTargetSkill.name"></strong>
            确认删除。
          </p>
        </div>

        <label class="field-block">
          <span class="field-label">PSkill 名称</span>
          <input x-model="deleteForm.confirmation_name" class="input-field" :placeholder="deleteTargetSkill.name" required />
        </label>

        <div class="flex justify-end gap-2 pt-1">
          <button type="button" class="button-secondary" title="取消" aria-label="取消" :disabled="busy.delete" @click="closeDeleteModal()">
            <span class="material-symbols-outlined text-[18px]">close</span>
            <span>取消</span>
          </button>
          <button type="submit" class="button-danger" title="确认删除并归档" aria-label="确认删除并归档" data-confirm-disabled="true" :disabled="busy.delete || !isDeleteConfirmationValid()">
            <span class="material-symbols-outlined text-[18px]">archive</span>
            <span x-text="busy.delete ? '删除中...' : '确认删除并归档'"></span>
          </button>
        </div>
      </form>
    </section>
  </div>
</template>
