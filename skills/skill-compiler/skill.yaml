skill:
  name: 技能编译器
  code: skill-compiler
  version: 0.1.0
  purpose: 将一个标准 Skill 目录编译成可被 Run Server 直接消费的最小运行产物，并输出构建报告。
  target_user:
    - 维护 PSOP Skills 的开发者
    - 需要验证 Skill 结构与编译结果的维护者
  inputs:
    required:
      - 单 Skill 目录路径
    directory_requirements:
      required_files:
        - SKILL.md
        - skill.yaml
      required_directories:
        - prompts
        - references
        - examples
        - tests
    extension_policy:
      allow_custom_entries: true
      consume_custom_entries_in_v1: false
      report_unconsumed_entries: true
  outputs:
    primary:
      - build/manifest.json
      - build/skill-package.json
      - build/execution-graph.json
      - build/build-report.json
    artifact_contract:
      manifest:
        required_fields:
          - skill_code
          - skill_version
          - build_version
          - schema_version
          - entry_step_id
          - generated_at
          - graph_hash_algo
          - graph_hash
          - compat.run_server_min_version
      skill_package:
        required_fields:
          - name
          - purpose
          - inputs_contract
          - outputs_contract
          - global_constraints
          - references_index
      execution_graph:
        required_fields:
          - graph_version
          - entry_step_id
          - steps
          - transitions
        step_required_fields:
          - id
          - title
          - type
          - required_inputs
          - output_schema
          - executor
          - timeout_sec
          - completion_condition
        transition_required_fields:
          - from_step_id
          - on_status
          - to_step_id
          - priority
        step_type_enum:
          - collect_input
          - task
        step_status_enum:
          - succeeded
          - failed
          - waiting_input
          - timed_out
        transition_on_status_enum:
          - succeeded
          - failed
          - waiting_input
          - timed_out
        required_inputs_schema:
          item_required_fields:
            - key
            - source_path
            - value_type
            - required
            - missing_message
          source_path_prefix:
            - scene.
            - context.
          value_type_enum:
            - string
            - number
            - boolean
            - object
            - array
          rules_supported:
            - min_length
            - max_length
            - enum
        executor_schema:
          collect_input:
            required_fields:
              - kind
              - collect_mode
            fixed_values:
              kind: collect_input
              collect_mode: merge_scene_input
          task:
            required_fields:
              - kind
              - instruction
              - model_profile
              - temperature
              - max_tokens
            fixed_values:
              kind: llm
        completion_condition_schema:
          required_fields:
            - mode
            - success_status
            - failure_status
          mode_enum:
            - input_ready
            - executor_success
          success_status_fixed: succeeded
          failure_status_enum:
            - failed
            - timed_out
        transition_match_rules:
          - 先筛选 from_step_id 等于当前 step id 且 on_status 等于当前 step status 的 transition
          - 按 priority 升序排序
          - 同优先级按声明顺序选择第一条
          - 命中后跳转到 to_step_id
          - 无命中时仅允许 succeeded 且无后继定义场景终态成功
        graph_hash_spec:
          graph_hash_algo: sha256
          canonical_json:
            - UTF-8 编码
            - 递归按 key 字典序排序
            - 无额外空白
      build_report:
        required_fields:
          - status
          - errors
          - warnings
          - notes
          - unconsumed_extensions
    report_sections:
      - errors
      - warnings
      - notes
      - unconsumed_extensions
  workflow_steps:
    - id: check_directory_structure
      title: 检查目录结构
      objective: 确认目标目录存在且满足最小 Skill 结构要求。
    - id: validate_skill_yaml
      title: 校验 skill.yaml
      objective: 解析并检查关键字段是否存在且格式基本正确。
    - id: read_supporting_files
      title: 读取辅助文件
      objective: 读取 SKILL.md 与相关目录内容，确认最小完整性。
    - id: generate_runtime_bundle
      title: 生成最小运行产物草稿
      objective: 执行 scripts/compile.py，生成 manifest、skill-package 与 execution-graph 草稿。
    - id: generate_build_report
      title: 生成构建报告
      objective: 输出结构化构建报告，并记录错误、警告和未消费扩展内容。
  artifacts:
    output_directory: build
    required_outputs:
      - manifest.json
      - skill-package.json
      - execution-graph.json
      - build-report.json
  run_server_consumption:
    loading_phase:
      - 校验 manifest.schema_version
      - 校验 manifest.compat.run_server_min_version
      - 校验 manifest.graph_hash_algo 等于 sha256
      - 校验 manifest.graph_hash 与 execution-graph 一致
    init_phase:
      - 使用 manifest.entry_step_id 初始化 run.current_step_id
    runtime_phase:
      - 仅消费 execution-graph 进行步骤推进
      - collect_input 步骤先检查 required_inputs
      - 输入不足则进入 waiting_input
      - task 步骤按 executor 调用执行器
      - transition 按 from_step_id + on_status + priority 规则匹配
    rejection_phase:
      - 产物缺少契约字段时拒绝执行并返回可定位错误
  failure_policy:
    hard_fail:
      - 缺少 SKILL.md
      - 缺少 skill.yaml
      - 缺少 prompts 目录
      - 缺少 references 目录
      - 缺少 examples 目录
      - 缺少 tests 目录
      - skill.yaml 无法解析
      - skill.yaml 缺少关键字段
      - 编译产物缺少契约必需字段
      - transition.on_status 不在枚举内
      - required_inputs 结构不满足协议
      - executor 结构不满足协议
    warning_only:
      - SKILL.md 与 skill.yaml 描述轻微不一致
      - references 内容过于简单
      - examples 内容过于简单
      - tests/checklist.md 内容过于简单
      - 存在未消费的扩展内容
  constraints:
    - 当前版本只处理单 Skill 目录。
    - 编译步骤通过 scripts/compile.py 执行。
    - 当前版本不调用外部网络服务。
    - 当前版本优先完成最小编译闭环。
    - 自定义扩展内容默认只记录，不参与正式编译。
